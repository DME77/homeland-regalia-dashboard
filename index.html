// Generic MEP-sheet parser. Detects each table block, identifies stage-boolean columns,
// and classifies each row as done/delay/pending. Tags entries with contractor + tower.
function parseMEPSheet(md, contractorTag, defaultTower) {
  const lines = splitTableRows(md);
  const items = [];
  let blockType = null; // 'flat-stage' | 'tower-flat' | 'lvl' | 'lobby' | 'loose-flat' | 'planning' | null
  let stageIdxs = [], stageNames = [];
  let iFloor = -1, iFlat = -1, iArea = -1, iSubArea = -1, iLvl = -1, iAreaName = -1, iRem = -1, iLobbyFloor = -1, iLooseLabel = -1;
  let curFloor = '', curFlat = '', curLvl = '', curTower = '';
  let lastTowerSeen = ''; // tracks the tower from the most recent tower-flat block, used by lobby blocks
  const NON_STAGE = /(FLOOR|FLAT|AREAS?|AREA NAME|FLAT NAMES?|REMARKS?|LVL|LEVEL|SUB AREA|LOBBIES|SR\.?\s*NO|S\.?\s*NO|RECORD|TIMESTEMP|DEPLOYED|PROJECT|CONTRACTOR|FLAT WISE|FLOOR WISE|HANDOVER|STUCK POINT|MISCELLANEOUS|PLANNING|ACTUAL|DRAWINGS? READY|MATERIAL AND|MASONRY|BLOCK WORK)/i;
  // STAGE_HINTS: header keyword prefixes that suggest a column tracks an execution stage.
  // Uses prefix matching (no trailing \b) so DRAWING/DRAWINGS, FRAME/FRAMING, SIZE/SIZES, APPROVED/APPROVAL all match.
  const STAGE_HINTS = /\b(WORK|INSTALL|FRAM|GLASS|MATERIAL|TEST|FIX|PLASTER|GRANITE|PAINT|FREEZE|ORDER|RECEIV|RCVD|DWG|DRAW|HOD|SIZE|CONFIRM|PRIMER|FABRIC|HARDWARE|SHUTTER|HANDOVER|DOOR|FLASH|CIVIL|TILE|CHANNEL|RAILING|BAFFLE|CAVITY|FIXTURE|APPROV|REMARK|PORTAL|SKIRT|SLIDING|CLAD|CANOPY|SIGNAGE|LOGO|TEXTURE|GLAZZ|GLAZ)/i;
  function inferTower(label) {
    const u = (label||'').toUpperCase();
    const m = u.match(/T0?(\d)\b|TOWER\s*0?(\d)/);
    if (m) return 'T' + (m[1] || m[2]);
    if (/CLUB|COMM|LOBBY|LOBBIES|KIDS AREA|SPORTS|BANQUET|MINIPLEX|GYM|KITCHEN VENT|STILT|STILIT|WASHROOM|OVAL CAFE|DISPENSAY|DISPENSARY|RECEPTION/i.test(label)) return 'COMM';
    if (/BSMT|BASEMENT|NTA|FIRE PUMP|PUMP ROOM/i.test(label)) return 'BSMT';
    return defaultTower || 'OTHER';
  }
  for (const line of lines) {
    const c = parseRow(line);
    const head = c.map(h => (h||'').toUpperCase().trim());
    const hasPlanning  = head.some(h => h.includes('TIMESTEMP') || h.includes('DEPLOYED LINK') || h.includes('PLANNING TIME'));
    const hasLobby     = head[0] && head[0].includes('LOBBIES') && head[1] && head[1].includes('FLOOR');
    const hasTowerFlat = head.some(h => h.includes('AREA NAME'));
    const hasFlatStage = head[0] && head[0].includes('FLOOR') && head[1] && head[1].includes('FLAT');
    const hasLvl       = head[0] && head[0].includes('LVL');
    // Loose-flat fallback: row has 3+ stage-hint columns and isn't a sqft-summary block
    const stageColCount = head.filter(h => h && STAGE_HINTS.test(h)).length;
    const hasSummaryNoise = head.some(h => h && (h.includes('SQFT') || h.includes('ACHIVE') || h.includes('ACHIVED') || /\bPLAN\b/.test(h) || /\bBALANCE\b/.test(h)));
    const hasLooseFlat = !hasPlanning && head.length >= 3 && stageColCount >= 3 && !hasSummaryNoise;
    const isHeader = hasPlanning || hasLobby || hasTowerFlat || hasFlatStage || hasLvl || hasLooseFlat;
    if (isHeader) {
      iFloor = head.findIndex(h => h.startsWith('FLOOR'));
      iFlat  = head.findIndex(h => h === 'FLAT' || h.startsWith('FLAT'));
      iArea  = head.findIndex(h => h === 'AREAS' || h === 'AREA');
      iSubArea = head.findIndex(h => h.includes('SUB AREA'));
      iLvl   = head.findIndex(h => h === 'LVL' || h.startsWith('LEVEL'));
      iAreaName = head.findIndex(h => h.includes('AREA NAME'));
      iRem   = head.findIndex(h => h.includes('REMARK'));
      iLobbyFloor = hasLobby ? head.findIndex(h => h === 'FLOOR' || h.startsWith('FLOOR')) : -1;
      if (hasPlanning) { blockType = 'planning'; stageIdxs = []; continue; }
      if (hasLobby) blockType = 'lobby';
      else if (hasTowerFlat) blockType = 'tower-flat';
      else if (hasFlatStage) blockType = 'flat-stage';
      else if (hasLvl) blockType = 'lvl';
      else if (hasLooseFlat) blockType = 'loose-flat';
      stageIdxs = []; stageNames = [];
      iLooseLabel = -1;
      if (blockType === 'loose-flat') {
        // Find the label column: the first non-stage-hint column from the left
        // (commonly Area, Location, Shops, Vendor Name, Window). If all cols are stage-like,
        // there's no label col and the contractor name is used instead.
        for (let k = 0; k < head.length; k++) {
          if (head[k] && !STAGE_HINTS.test(head[k]) && !NON_STAGE.test(head[k])) {
            iLooseLabel = k;
            break;
          }
        }
        // Stages = remaining cols whose header matches STAGE_HINTS
        head.forEach((h, k) => {
          if (!h) return;
          if (k === iLooseLabel) return;
          if (!STAGE_HINTS.test(h)) return;
          if (NON_STAGE.test(h)) return;
          stageIdxs.push(k);
          stageNames.push(h);
        });
      } else {
        head.forEach((h, k) => {
          if (!h) return;
          if (NON_STAGE.test(h)) return;
          stageIdxs.push(k);
          stageNames.push(h);
        });
      }
      curFloor = curFlat = curLvl = curTower = '';
      continue;
    }
    if (!blockType || blockType === 'planning' || stageIdxs.length === 0) continue;
    if (iFloor >= 0 && c[iFloor]) curFloor = c[iFloor];
    if (iFlat  >= 0 && c[iFlat])  curFlat  = c[iFlat];
    if (iLvl   >= 0 && c[iLvl])   curLvl   = c[iLvl];
    let label = '', areaForTower = '';
    if (blockType === 'tower-flat') {
      const an = (c[iAreaName]||'').trim();
      if (!an) continue;
      areaForTower = an;
      label = an;
    } else if (blockType === 'lvl') {
      const a = iArea>=0 ? (c[iArea]||'').trim() : '';
      const sa = iSubArea>=0 ? (c[iSubArea]||'').trim() : '';
      if (!a && !sa) continue;
      label = `Lvl ${curLvl} – ${a}${sa?' – '+sa:''}`;
    } else if (blockType === 'lobby') {
      const fl = iLobbyFloor>=0 ? (c[iLobbyFloor]||'').trim() : '';
      if (!fl) continue;
      label = `Lobby Floor ${fl}`;
    } else if (blockType === 'loose-flat') {
      const lbl = iLooseLabel >= 0 ? (c[iLooseLabel]||'').trim() : '';
      if (iLooseLabel >= 0 && !lbl) continue;
      label = lbl || contractorTag;
      areaForTower = label;
    } else {
      // flat-stage: either FLOOR|FLAT|AREAS|…stages (MEP) or FLOOR|FLAT|…stages (Facade per-flat)
      const ar = iArea>=0 ? (c[iArea]||'').trim() : '';
      if (iArea >= 0) {
        if (!ar) continue;
        label = `Floor ${curFloor || '?'} · Flat ${curFlat || '?'} · ${ar}`;
      } else {
        // No Areas column — treat each row as one flat
        if (!curFlat) continue;
        areaForTower = curFlat;
        label = `${curFloor || '?'} · ${curFlat}`;
      }
    }
    if (blockType === 'lobby') {
      curTower = lastTowerSeen || defaultTower || 'OTHER';
    } else {
      curTower = inferTower(areaForTower || curFlat || label);
      if (curTower && curTower.startsWith('T')) lastTowerSeen = curTower;
    }
    const states = stageIdxs.map(i => (c[i] || '').trim());
    const trueCount = states.filter(s => s.toUpperCase() === 'TRUE').length;
    const naCount = states.filter(s => /^NA$/i.test(s) || s === '').length;
    const noteStates = states.filter(s => {
      const u = s.toUpperCase();
      return u !== 'TRUE' && u !== 'FALSE' && u !== 'NA' && s !== '';
    });
    const totalReal = stageIdxs.length - naCount;
    const remark = (iRem>=0 ? (c[iRem]||'').trim() : '') || noteStates.slice(0,3).join('; ');
    let status;
    if (totalReal > 0 && trueCount === totalReal) status = 'done';
    else if (trueCount === 0 && noteStates.length === 0) status = 'pending';
    else status = 'delay';
    items.push({
      contractor: contractorTag,
      tower: curTower,
      label,
      done: trueCount, total: totalReal || stageIdxs.length,
      states, stageNames,
      status, remark,
    });
  }
  return items;
}

// Interior execution — multi-tab workbook with 13+ contractor sheets per tower/floor range.
// Each tab in the source workbook becomes a separate markdown table block in the MCP output.
// ─── Interior stage name matcher ──────────────────────────────────────────
// Maps any spreadsheet column header to one of the 13 canonical stage names.
// Returns the canonical name string, or null if not a tracked stage.
// Name-based (not column-index) so it works across all contractor tabs
// regardless of their physical column layout.
function _matchesInteriorStage(rawHeader) {
  const h = (rawHeader || '').toUpperCase().replace(/[^A-Z0-9]/g, ' ').replace(/\s+/g, ' ').trim();
  // More-specific rules first to prevent false matches
  if (/SERVANT/.test(h) && /CEIL/.test(h))                             return 'SERVANT WASHROOM CEILING';
  if (/SERVANT/.test(h) && /TILE/.test(h))                             return 'SERVANT WASHROOM TILE';
  if (/WASHROOM/.test(h) && /WALL/.test(h) && /TILE/.test(h))         return 'WASHROOM WALL TILES';
  if (/WASHROOM/.test(h) && /CEIL/.test(h))                            return 'WASHROOM CEILING';
  if (/WASHROOM/.test(h) && /FLOOR/.test(h))                           return 'WASHROOM FLOORING';
  if (/KITCHEN/.test(h) && /TILE/.test(h))                             return 'KITCHEN TILES';
  if (/TILE/.test(h)    && /FLOOR/.test(h))                            return 'TILE FLOORING WORK';
  if (/PELM[EO]?N?T/.test(h))                                          return 'PELMENT WORK';
  if (/POP/.test(h)     && /PLASTER/.test(h))                          return 'POP PLASTER WORK';
  if (/GI/.test(h)      && (/ANGLE/.test(h) || /FRAME/.test(h)))      return 'GI ANGLE/FRAME MEMBER FIXING WORK';
  if (/GYPSUM/.test(h)  && /PLASTER/.test(h))                          return 'GYPSUM PLASTER WORK';
  return null;
}

// Interior execution — multi-tab workbook with 13+ contractor sheets per tower/floor range.
// Header style varies (Area Name | UNIT NO | "]" | SIDE+Area Name | Floor+Area). Detection looks for
// an explicit area-like column OR Interior-stage hint words (Levelling/Gypsum/POP Plaster/Tile Flooring).
// Tower comes from row labels (T03/11 → T3). Contractor is inferred from tower + floor range based on
// the known per-floor-range assignment in the workbook.
function parseInteriorExecution(md, contractorTag, defaultTower) {
  const lines = splitTableRows(md);
  const items = [];
  let inBlock = false;
  let stageIdxs = [], stageNames = [];
  let iAreaCol = -1;
  function inferContractor(tower, floor, flat) {
    if (tower === 'T3') {
      if (floor <= 5)  return 'VD Associates · T3 F1-F5';
      if (floor <= 13) return 'SHDZ · T3 F9-F13';
      if (floor <= 16) return 'Yukti · T3 F14-F16';
      return 'Worth Soul · T3 F17-F18';
    }
    if (tower === 'T4') return 'T2B · T4';
    if (tower === 'T5') {
      if (floor === 1)  return 'Inexplus · T5';                                // T05/11 only → INEXPLUS
      if (floor <= 12)  return (flat % 10 === 2) ? 'Inexplus · T5' : 'Deswal · T5'; // floors 2-12: unit splits
      if (floor <= 18)  return 'Deswal · T5';                                  // floors 13-18 → DESWAL (both units)
      return 'Inexplus · T5';                                                   // floors 19+ → INEXPLUS (both units)
    }
    if (tower === 'T6') {
      if (floor <= 3)  return 'SHZ · T6 F2-F3';
      if (floor <= 10) return 'Systile/Prajapati · T6 F4-F10';
      return 'T2B · T6 F11+';
    }
    return 'Interior';
  }
  for (const line of lines) {
    const c = parseRow(line);
    const head = c.map(h => (h||'').toUpperCase().trim());
    // Detect a header row — look for explicit area-like column headers or interior stage hints
    const hasAreaCol = head.some(h => h === 'AREA NAME' || h === 'UNIT NO' || h === 'AREA' || h.includes('AREA NAME') || h.includes('UNIT NO'));
    const hasInteriorStages = head.filter(h => /LEVELLING|GYPSUM|POP|TILE|GRANITE|PELMET|PELMENT|CARCASS|WARDROBE|VANITY|LIGHT|DOOR|WINDOW|PAINT|HANDOVER|CEILING|FLOORING|FIXTURE/.test(h)).length >= 3;
    const isHeaderRow = (hasAreaCol || hasInteriorStages) && head.some(h => h && h.length > 0);
    if (isHeaderRow) {
      // Skip APP STAFF SHEET-style headers (Work | Status | Incharge)
      if (head[0] === 'WORK' && head[1] === 'STATUS') { inBlock = false; continue; }
      if (hasAreaCol) {
        iAreaCol = head.findIndex(h => h === 'AREA NAME' || h === 'UNIT NO' || h.includes('AREA NAME') || h.includes('UNIT NO') || h === 'AREA');
      } else {
        iAreaCol = 0; // fallback — first col holds the row label
      }
      stageIdxs = []; stageNames = [];
      // Track only the 13 canonical interior stages — matched by column header name,
      // not column index, so it works regardless of each tab's physical layout.
      for (let k = 0; k < head.length; k++) {
        if (k === iAreaCol) continue;
        const h = head[k];
        if (!h) continue;
        const canonName = _matchesInteriorStage(h);
        if (!canonName) continue;
        stageIdxs.push(k);
        stageNames.push(canonName); // use canonical name so cards always show consistent labels
      }
      inBlock = true;
      continue;
    }
    if (!inBlock) continue;
    const areaName = (c[iAreaCol]||'').trim();
    if (!areaName) continue;
    // Match T03/11, T04/22 etc.
    const tm = areaName.match(/T0?(\d)\/(\d+)/);
    if (!tm) continue;
    const tower = 'T' + tm[1];
    const flat  = parseInt(tm[2]);
    const floor = Math.floor(flat / 10);
    const contractor = inferContractor(tower, floor, flat);
    const states  = stageIdxs.map(k => (c[k]||'').trim());
    const naCount = states.filter(s => /^NA$/i.test(s) || s === '').length;
    const trueCount = states.filter(s => s.toUpperCase() === 'TRUE').length;
    // Interior rule: ONLY cells with an actual past date mark a flat as Delayed.
    // Text notes, future dates, and in-progress rows (some TRUE, no overdue dates) stay Pending.
    const delayNotes = states.filter(s => {
      const u = s.toUpperCase();
      if (u === 'TRUE' || u === 'FALSE' || u === 'NA' || s === '') return false;
      return _isPastDateCell(s); // only overdue dated cells → delay
    });
    // Scheduled (today/future) dated cells → "On Schedule"; undated rows → Pending.
    const scheduleNotes = states.filter(s => _isFutureDateCell(s));
    const totalReal = stageIdxs.length - naCount;
    let status;
    if (totalReal > 0 && trueCount === totalReal) status = 'done';
    else if (delayNotes.length > 0)               status = 'delay';
    else if (scheduleNotes.length > 0)            status = 'on-schedule';
    else                                          status = 'pending';
    const remark = (status === 'on-schedule' ? scheduleNotes : delayNotes).slice(0, 3).join('; ');
    // For delayed flats: find the EARLIEST overdue dated cell and the stage (header)
    // it sits in — that's where the flat is first stuck.
    let delayStage = '', delayDate = '', delayDateObj = null;
    if (status === 'delay') {
      states.forEach((s, j) => {
        if (!_isPastDateCell(s)) return;
        const d = _cellDate(s);
        if (d && (!delayDateObj || d < delayDateObj)) { delayDateObj = d; delayDate = s.trim(); delayStage = stageNames[j] || ''; }
      });
    }
    items.push({
      contractor,
      tower,
      label:   areaName,
      done:    trueCount,
      total:   totalReal || stageIdxs.length,
      states, stageNames,
      status, remark,
      delayStage, delayDate,
    });
  }
  return items;
}

// Civil execution / Civil Facade — shared parser. Both sheets use per-tower flat-stage blocks
// (Floor No. | Flat no. | …stage cols…) without explicit tower labels in headers (mostly).
// Tower assignment is by block index (block 0 → T1, block 1 → T2, …, block 5 → T6).
// Headers like "Tower 4\n\nFloor No." override the implicit numbering.
// Sheets have non-flat-stage blocks (basement, club, punch list) after T6 — these are skipped.
function parseCivilByTowerBlocks(md, contractorTag, defaultTower) {
  const lines = splitTableRows(md);
  const items = [];
  const TOWER_BY_BLOCK = ['T1', 'T2', 'T3', 'T4', 'T5', 'T6'];
  let blockIdx = -1;
  let curTower = '';
  let stageIdxs = [], stageNames = [];
  let iFloor = -1, iFlat = -1, iRem = -1;
  let curFloor = '';
  let active = false;
  for (const line of lines) {
    const c = parseRow(line);
    const head = c.map(h => (h||'').toUpperCase().trim());
    const isFlatStageHeader = head[0] && head[0].includes('FLOOR') && head[1] && head[1].includes('FLAT');
    if (isFlatStageHeader) {
      blockIdx++;
      // Explicit "Tower N" prefix in header[0] overrides block index
      const towerMatch = head[0].match(/TOWER\s*(\d)/);
      if (towerMatch) curTower = 'T' + towerMatch[1];
      else if (blockIdx < TOWER_BY_BLOCK.length) curTower = TOWER_BY_BLOCK[blockIdx];
      else { active = false; continue; }
      iFloor = 0; iFlat = 1;
      iRem = head.findIndex(h => h.includes('REMARK'));
      stageIdxs = []; stageNames = [];
      for (let k = 2; k < head.length; k++) {
        if (k === iRem) continue;
        if (head[k]) { stageIdxs.push(k); stageNames.push(head[k]); }
      }
      curFloor = '';
      active = true;
      continue;
    }
    // Any other header (SO N O / GRANITE FIXXING etc.) deactivates parsing
    if (head[0] && !active && head[0].length > 0) continue;
    if (head[0] && (head[0].includes('SO N') || head[0].startsWith('SO NO') || head[0].includes('GRANITE FIXXING'))) {
      active = false;
      continue;
    }
    if (!active) continue;
    if (c[iFloor] && c[iFloor].trim()) curFloor = c[iFloor].trim();
    const flat = (c[iFlat] || '').trim();
    if (!flat) continue;
    const states = stageIdxs.map(k => (c[k]||'').trim());
    const trueCount = states.filter(s => s.toUpperCase() === 'TRUE').length;
    const naCount = states.filter(s => /^NA$/i.test(s) || s === '').length;
    const noteStates = states.filter(s => {
      const u = s.toUpperCase();
      return u !== 'TRUE' && u !== 'FALSE' && u !== 'NA' && s !== '';
    });
    const totalReal = stageIdxs.length - naCount;
    const remark = (iRem>=0 ? (c[iRem]||'').trim() : '') || noteStates.slice(0,3).join('; ');
    let status;
    if (totalReal > 0 && trueCount === totalReal) status = 'done';
    else if (trueCount === 0 && noteStates.length === 0) status = 'pending';
    else status = 'delay';
    items.push({
      contractor: contractorTag,
      tower:      curTower,
      label:      `Floor ${curFloor || '?'} · Flat ${flat}`,
      done:       trueCount,
      total:      totalReal || stageIdxs.length,
      states, stageNames,
      status, remark,
    });
  }
  return items;
}

// Landscape Civil — extracts the per-tower drain wall block (T6/T5/T4/T3 with Front Available / Plan / Achieved)
// and the Road (Commercial) block. Other blocks (overall sqft, weekly progress) are skipped.
function parseLandscapeCivil(md, contractorTag, defaultTower) {
  const lines = splitTableRows(md);
  const items = [];
  let blockType = null; // 'tower' | 'road' | null
  let towerCols = [];
  for (const line of lines) {
    const c = parseRow(line);
    const head = c.map(h => (h||'').toUpperCase().trim());
    // Tower-block header: e.g. "-/STEPS | T6 /FRONT AVAILABLE | T6 /PLAN | T6 /ACHIVED | T6 /ISSUE/REMARKS | T5/FRONT AVAILABLE | …"
    if (head.some(h => /^T\d.*FRONT AVAILABLE/.test(h))) {
      blockType = 'tower';
      towerCols = [];
      let i = 1;
      while (i < head.length) {
        const m = head[i] && head[i].match(/^T(\d)/);
        if (m) {
          towerCols.push({ tower: 'T' + m[1], available: i, plan: i+1, achieved: i+2, remark: i+3 });
          i += 4;
        } else { i++; }
      }
      continue;
    }
    // Road block header: ROAD (COMMERCIAL) | PLAN | ACHIVED | OUTER FROM DRAIN
    if (head[0] && head[0].includes('ROAD')) {
      blockType = 'road';
      continue;
    }
    // Other blocks deactivate parsing
    const isOtherHeader = head[0] && (
      head[0].includes('DRAIN WALL') || head[0].includes('-/STEPS') ||
      head[0].includes('TOTAL') || head[0].includes('FEB') || head[0].includes('TARGETS')
    );
    if (isOtherHeader) { blockType = null; continue; }
    if (blockType === 'tower') {
      const workName = (c[0]||'').trim();
      if (!workName) continue;
      for (const tc of towerCols) {
        const available = (c[tc.available]||'').trim();
        const plan      = (c[tc.plan]||'').trim();
        const achieved  = (c[tc.achieved]||'').trim();
        const remark    = (c[tc.remark]||'').trim();
        const states = [available, plan, achieved];
        const trueCount = states.filter(s => s.toUpperCase() === 'TRUE').length;
        const falseCount = states.filter(s => s.toUpperCase() === 'FALSE').length;
        let status;
        if (trueCount === 3) status = 'done';
        else if (falseCount === 3) status = 'pending';
        else status = 'delay';
        items.push({
          contractor: contractorTag,
          tower:      tc.tower,
          label:      `${tc.tower} · ${workName}`,
          done:       trueCount,
          total:      3,
          states,
          stageNames: ['Front Available', 'Plan', 'Achieved'],
          status,
          remark,
        });
      }
    } else if (blockType === 'road') {
      const workName = (c[0]||'').trim();
      if (!workName || workName === 'TARGETS') continue;
      const plan     = (c[1]||'').trim();
      const achieved = (c[2]||'').trim();
      const outer    = (c[3]||'').trim();
      const states = [plan, achieved, outer];
      const doneCount = states.filter(s => /^DONE$/i.test(s)).length;
      let status;
      if (doneCount === 3) status = 'done';
      else if (doneCount === 0) status = 'pending';
      else status = 'delay';
      items.push({
        contractor: contractorTag,
        tower:      'COMM',
        label:      `Commercial Road · ${workName}`,
        done:       doneCount,
        total:      3,
        states,
        stageNames: ['Plan', 'Achieved', 'Outer from Drain'],
        status,
        remark:     outer && !/^DONE$/i.test(outer) ? `Outer: ${outer}` : '',
      });
    }
  }
  return items;
}

// Drawings Status — section-grouped pending-drawings tracker.
// Layout: header row (Sr.no. | desc | Submitted by | Dependency | Status | Remarks) followed by
// alternating section markers (`|  | TOWER-1 |...`) and data rows. Tower-6 onward drops the Remarks column.
// DWG "Final list" tab: | (idx) | Sr.no. | Required Drawings | Submitted by |
// Dependency 1 | Dependency 2 | Timeline | Status | Remarks | Updated by | Issue date
// Columns are located by header name so layout shifts don't break it.
function parseDrawings(md) {
  const lines = splitTableRows(md);
  const items = [];
  function inferTower(s) {
    const u = (s || '').toUpperCase();
    const m = u.match(/\bT-?\s*0?(\d)\b/) || u.match(/TOWER\s*-?\s*(\d)/);
    if (m) return 'T' + m[1];
    if (/BASEMENT|\bB1\b|\bB2\b|\bUB\b|\bLB\b|STILT/.test(u)) return 'BSMT';
    if (/CLUB|COMM|LANDSCAPE|GROUND|POOL|SPA|OVAL|TERRACE/.test(u)) return 'COMM';
    return 'OTHER';
  }
  let idx = null;
  for (const line of lines) {
    const c = parseRow(line).map(x => (x || '').trim());
    if (!idx) {
      if (c.some(h => /required\s*drawings/i.test(h))) {
        idx = {
          drawing:   c.findIndex(h => /required\s*drawings/i.test(h)),
          submitted: c.findIndex(h => /submitted\s*by/i.test(h)),
          dep1:      c.findIndex(h => /dependency\s*1/i.test(h)),
          dep2:      c.findIndex(h => /dependency\s*2/i.test(h)),
          timeline:  c.findIndex(h => /timeline/i.test(h)),
          status:    c.findIndex(h => /^status/i.test(h)),
          remarks:   c.findIndex(h => /remark/i.test(h)),
        };
      }
      continue;
    }
    const get = k => (idx[k] >= 0 ? (c[idx[k]] || '').trim() : '');
    const desc = get('drawing');
    if (!desc) continue;
    if (/priority\s*\d/i.test(c.join(' '))) continue;   // skip the colour-legend rows
    const dep1 = get('dep1'), dep2 = get('dep2'), timeline = get('timeline');
    const statusRaw = get('status'), remarks = get('remarks'), submittedBy = get('submitted');
    // Classify: Status column first, then fall back to the Remarks text.
    const blob = (statusRaw + ' ' + remarks).toLowerCase();
    let cls;
    if (/\b(done|completed|complete|approved|issued)\b/.test(blob)
        && !/\bnot\b|pending|awaited|under\s*(review|working|discussion)|tbd|to be|required|cancel|hold/.test(blob)) cls = 'done';
    else if (/hold|cancel/.test(blob)) cls = 'delay';
    else cls = 'pending';
    const remarkParts = [];
    if (dep2)        remarkParts.push(`Dep-2: ${dep2}`);
    if (submittedBy) remarkParts.push(`By: ${submittedBy}`);
    if (remarks)     remarkParts.push(remarks);
    items.push({
      contractor: '',
      tower:      inferTower(desc),
      label:      desc,
      done:       cls === 'done' ? 1 : 0,
      total:      1,
      states:     [statusRaw || (cls === 'done' ? 'Done' : 'Pending')],
      stageNames: ['Status'],
      status:     cls,
      dep1:       dep1 || '—',     // Dependency 1 (drives the Dependency filter)
      dep2,
      submittedBy,
      timeline,
      statusText: statusRaw,
      remark:     remarkParts.join(' · '),
    });
  }
  return items;
}

// PLANNER HLR — first markdown table is the "Common areas" tab. Header looks like:
//   Area | CIVIL STATUS | INTERIOR BOQ/DWG | PLUMBING | ELECTRICAL | FIRE FIGHTING |
//   HVAC | INTERIOR | PURCHASABLE LIST | Signages | HO to HHFMT
// Strict rule: only literal TRUE counts as Done. Anything else (FALSE / empty
// / dates / text notes) = Pending. NA cells are excluded from totals.
function parseCommonAreas(md) {
  const lines = splitTableRows(md);
  // Locate the Common areas header row.
  let headerIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    const c = parseRow(lines[i]);
    if ((c[0]||'').trim().toLowerCase() === 'area'
        && /CIVIL\s*STATUS/i.test(c[1]||'')
        && /INTERIOR/i.test(c[2]||'')) {
      headerIdx = i;
      break;
    }
  }
  if (headerIdx < 0) return [];
  const headers = parseRow(lines[headerIdx]);
  const stageNames = headers.slice(1).map(h => (h||'').trim());
  const items = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const c = parseRow(lines[i]);
    const area = (c[0] || '').trim();
    if (!area) break;
    // Another header row marks the start of a different table — stop.
    if (area.toLowerCase() === 'area' || area.toLowerCase() === 'level'
        || area.toLowerCase() === 's.no.' || area.toLowerCase() === 'so no'
        || area.toLowerCase() === 'lift details' || area.toLowerCase() === 'item') break;
    const states = stageNames.map((_, j) => (c[j+1] || '').trim());
    // Signages and HO to HHFMT are NOT execution stages — exclude them from the
    // combined status / progress / pending counts (they still show in column mode).
    const isCounted = n => !/signage/i.test(n) && !/hhfmt|ho\s*to\s*h/i.test(n);
    const counted = stageNames.map((n, j) => ({ n, j })).filter(x => isCounted(x.n));
    const trueCount  = counted.filter(x => states[x.j].toUpperCase() === 'TRUE').length;
    const naCount    = counted.filter(x => /^NA$/i.test(states[x.j]) || states[x.j] === '').length;
    const totalReal  = counted.length - naCount;
    const pending = [];
    counted.forEach(({ n, j }) => {
      const s = states[j], u = s.toUpperCase();
      if (u === 'NA' || u === 'N/A' || s === '' || u === 'TRUE') return;
      pending.push({ stage: n, value: s });
    });
    // Row-level status. Per-request semantics for Common areas:
    //   • all non-NA stages TRUE         → Done
    //   • some TRUE, some not            → Pending (in progress)
    //   • zero TRUE                      → Delayed (nothing started, overdue)
    let status;
    if (totalReal > 0 && trueCount === totalReal) status = 'done';
    else if (trueCount === 0) status = 'delay';     // nothing started
    else status = 'pending';                         // in progress
    items.push({
      area,
      stageNames,
      states,
      done: trueCount,
      total: totalReal,
      naCount,
      pending,
      status,
    });
  }
  return items;
}

// Watcon (pool & spa Water Construction) — lives in the same PLANNER HLR file as
// COMMON AREAS, on a tab named "WATCON". The table has two header rows:
//   Row A (location grouping): blank,blank,blank,Basement -2 P1,,,Basement -1 P2,
//                              First floor Club level 9200 P3,,Club terrace P4
//   Row B (pool names):        S.no. | Dept. | Work | Main pool | Indoor pool | Kids pool |
//                              Kids Fun pool | Jacuzzi Male | Jacuzzi Female | Infinity edge pool
// Each data row carries S.no, Dept (DWG / Execution), Work description, then a
// per-pool status (TRUE / FALSE / NA / date / free-text note). We extract pools,
// rows, and infer pool→location grouping from the merged header above.
function parseWatcon(md) {
  const lines = splitTableRows(md);
  let headerIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    const c = parseRow(lines[i]);
    if (/^s\.?no/i.test((c[0]||'').trim())
        && /dept/i.test(c[1]||'')
        && /work/i.test(c[2]||'')
        && c.slice(3).some(x => /Main pool|Indoor pool|Infinity edge|Jacuzzi/i.test(x||''))) {
      headerIdx = i;
      break;
    }
  }
  if (headerIdx < 0) return null;
  const headers = parseRow(lines[headerIdx]);
  const poolHeaders = headers.slice(3).map(h => (h||'').replace(/&#10;/g,' ').replace(/\s+/g,' ').trim());

  // Pool → location group is hardcoded by pool name because the Drive export
  // drops the merged-cell location row above the header. Mapping mirrors the
  // sheet's P1/P2/P3/P4 grouping (mechanical-room location for SS tank / pumps).
  function locationOf(name) {
    const n = (name || '').toLowerCase();
    if (n.includes('infinity edge')) return 'P4 · Club terrace';
    if (n.includes('jacuzzi'))       return 'P3 · First floor Club (9200)';
    if (n.includes('kids fun'))      return 'P2 · Basement -1';
    if (n.includes('main pool') || n.includes('indoor pool') ||
        (n.includes('kids pool') && !n.includes('fun')))
      return 'P1 · Basement -2';
    return '';
  }
  const pools = poolHeaders.map((name, i) => ({ idx: i + 3, name, group: locationOf(name) }));

  // Dept is only set on the section's first row (e.g. "DWG" on row 2, "Execution"
  // on row 9). Forward-fill so every row carries its department.
  let curDept = '';
  const rows = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const c = parseRow(lines[i]);
    const sno = (c[0] || '').trim();
    const rawDept = (c[1] || '').trim();
    const work = (c[2] || '').replace(/&#10;/g,' ').replace(/\s+/g,' ').trim();
    if (!sno && !rawDept && !work) break;
    if (/^s\.?no/i.test(sno) && /dept/i.test(rawDept)) break;     // next table header
    const a0 = (sno || rawDept || work).toLowerCase();
    if (a0 === 'area' || a0 === 'level' || a0 === 'lift details' || a0 === 'item') break;
    if (!work) continue;
    if (rawDept) curDept = rawDept;
    const states = pools.map(p => (c[p.idx] || '').replace(/&#10;/g,' ').replace(/\s+/g,' ').trim());
    rows.push({ sno, dept: curDept, work, states });
  }

  return { pools, rows };
}

// Krishna Facade — bespoke parser for the work-item-list layout (no boolean stages).
// Two blocks per sheet: block 1 = Staircase CNC Jali, block 2 = Regalia LOGO.
// Each row is one work item with Work / Scope (assignee) / Completion dates / Remarks columns.
function parseKrishnaFacade(md, contractorTag, defaultTower) {
  const lines = splitTableRows(md);
  const items = [];
  const blockNames = ['Staircase CNC Jali', 'Regalia LOGO'];
  let blockIdx = -1;
  let iWork = -1, iScope = -1, iDate = -1, iRem = -1;
  for (const line of lines) {
    const c = parseRow(line);
    const head = c.map(h => (h||'').toUpperCase().trim());
    const isHeader = (head[0] && (head[0].includes('S NO') || head[0].includes('S.NO'))) &&
      head.some(h => h === 'WORK') &&
      head.some(h => h.includes('COMPLETION'));
    if (isHeader) {
      blockIdx++;
      iWork  = head.findIndex(h => h === 'WORK');
      iScope = head.findIndex(h => h === 'SCOPE');
      iDate  = head.findIndex(h => h.includes('COMPLETION'));
      iRem   = head.findIndex(h => h.includes('REMARK'));
      continue;
    }
    if (blockIdx < 0 || iWork < 0) continue;
    const work     = (c[iWork] || '').trim();
    const scope    = iScope >= 0 ? (c[iScope] || '').trim() : '';
    const dateText = iDate  >= 0 ? (c[iDate]  || '').trim() : '';
    const remarkText = iRem >= 0 ? (c[iRem]   || '').trim() : '';
    if (!work) continue;
    let status, stageState;
    if (!dateText) {
      status = 'pending';
      stageState = 'Not scheduled';
    } else if (/after question|hold|TBD|to be|tendering|pending|need/i.test(dateText)) {
      status = 'pending';
      stageState = dateText;
    } else if (/done|complete|^TRUE$/i.test(dateText)) {
      status = 'done';
      stageState = dateText;
    } else {
      status = 'delay'; // a date or scheduled note — treat as in-progress / requires follow-up
      stageState = dateText;
    }
    const blockName = blockNames[blockIdx] || `Block ${blockIdx + 1}`;
    const remarkParts = [];
    if (scope)      remarkParts.push(`Assigned: ${scope}`);
    if (dateText)   remarkParts.push(dateText);
    if (remarkText) remarkParts.push(remarkText);
    items.push({
      contractor: contractorTag,
      tower:      defaultTower || 'COMM',
      label:      `${blockName} · ${work}`,
      done:       status === 'done' ? 1 : 0,
      total:      1,
      states:     [stageState],
      stageNames: ['Status'],
      status,
      remark:     remarkParts.join(' · '),
    });
  }
  return items;
}

// ─── Baffle Ceiling — per-tower sqft summary (T-01 … T-06 tabs) ────────────
// Each T-0X tab has two data rows: "Framing Work[…]" and "Baffle Sheet Installation[…]"
// Columns: 0=label | 1=Total SQft | 2=Achieved SQft | 3=% | 4=Balance | 5+= milestones/remark
// renderStyle:'sqft' triggers the custom sqft table in renderWork.
function parseBaffleCeilingTab(csv, towerLabel) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i <= csv.length; i++) {
    const ch = i < csv.length ? csv[i] : '\n';
    if (inQ) {
      if (ch === '"' && csv[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') inQ = false;
      else field += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && csv[i+1] === '\n') i++;
        row.push(field.trim());
        if (row.some(c => c)) rows.push(row);
        row = []; field = '';
      } else field += ch;
    }
  }
  if (field || row.length) { row.push(field.trim()); if (row.some(c => c)) rows.push(row); }

  const parseNum = v => { const n = parseFloat((v||'').replace(/[,%\s]/g,'').replace(/sqft/gi,'')); return isNaN(n) ? 0 : n; };
  const items = [];

  for (const r of rows) {
    const label0 = (r[0]||'').trim().toUpperCase();
    const isFraming = label0.startsWith('FRAMING');
    const isBaffle  = label0.startsWith('BAFFLE') || label0.includes('SHEET INSTALL');
    if (!isFraming && !isBaffle) continue;

    const workType = isFraming ? 'Framing Work' : 'Baffle Sheet Installation';
    const total    = parseNum(r[1]);
    const achieved = parseNum(r[2]);
    if (total === 0) continue;
    const balance  = Math.max(total - achieved, 0);
    const pct      = Math.round(achieved / total * 100);

    // Remark = last meaningful text cell from col 5 onward
    let remark = '';
    for (let k = r.length - 1; k >= 5; k--) {
      const v = (r[k]||'').trim();
      if (v && !/^\d+(\.\d+)?$/.test(v) && !/^\d{1,2}[-\/]\w+/.test(v) && v.length > 2) { remark = v; break; }
    }

    items.push({
      contractor: 'Baffle Ceiling',
      tower: towerLabel,
      workType,
      label: workType,
      done: achieved, total,
      status: pct >= 100 ? 'done' : pct > 0 ? 'delay' : 'pending',
      remark,
      sqftData: { total, achieved, balance, pct },
      renderStyle: 'sqft',
    });
  }
  return items;
}

// Club Facade summary parser — shared across Club facade Art N Glass, Club Area Kazmi,
// and Club Tile (Sr Innovation). All three sheets use the same layout:
//   Vendor Name | Work | /Floor No. | Side | Civil Work | Material on site |
//   Total in SQft | Achived in SQft | Balance in SQft | Plan/Achieve dates… | Total Completation Date
// ─── Commercial Z1 parser ───────────────────────────────────────────────────
// Tracks 3 key stages per shop: Door Material Rcvd At Site, Door Installation,
// Canopy MS Work. renderStyle:'pct' tells the table to show % instead of chips.
// Pending / blocked stages are listed in the remark column automatically.
function parseCommercialZ1(md, contractor, defaultTower) {
  const lines = splitTableRows(md);
  const items = [];
  let iLabel = -1, iDoorMat = -1, iDoorInst = -1, iCanopy = -1, inBlock = false;

  for (const line of lines) {
    const c    = parseRow(line);
    const head = c.map(h => (h || '').trim());
    const U    = head.map(h => h.toUpperCase());

    const hasDoorMat  = U.some(h => h.includes('DOOR') && (h.includes('MATERIAL') || h.includes('RCVD') || h.includes('SITE')));
    const hasDoorInst = U.some(h => h.includes('DOOR') && h.includes('INSTALL'));
    const hasCanopy   = U.some(h => h.includes('CANOPY'));

    if (hasDoorMat || hasDoorInst || hasCanopy) {
      iLabel    = 0;
      iDoorMat  = U.findIndex(h => h.includes('DOOR') && (h.includes('MATERIAL') || h.includes('RCVD') || h.includes('SITE')));
      iDoorInst = U.findIndex(h => h.includes('DOOR') && h.includes('INSTALL'));
      // First CANOPY column = Canopy MS Work (primary stage)
      iCanopy   = U.findIndex(h => h.includes('CANOPY'));
      inBlock = true;
      continue;
    }

    if (!inBlock) continue;

    const label = (c[iLabel] || '').trim();
    if (!label || /^(area|shops?$|s\.?\s*no|homeland)/i.test(label)) continue;
    if (!/\d/.test(label) && !/shop|stall|unit|kiosk/i.test(label)) continue;

    function cellStat(val) {
      const v = (val || '').trim().toUpperCase();
      if (v === 'TRUE')  return 'done';
      if (v === 'FALSE') return 'pending';
      if (v === '' || v === 'NA') return 'na';
      return 'delay'; // Hold Due To Civil Work, etc.
    }

    const stages = [];
    [
      { idx: iDoorMat,  name: 'Door Material' },
      { idx: iDoorInst, name: 'Door Install'  },
      { idx: iCanopy,   name: 'Canopy'        },
    ].forEach(({ idx, name }) => {
      if (idx < 0) return;
      const st = cellStat(c[idx]);
      if (st === 'na') return; // skip N/A columns for this shop
      stages.push({ shortName: name, status: st, raw: (c[idx] || '').trim() });
    });

    if (stages.length === 0) continue;

    const doneCount  = stages.filter(s => s.status === 'done').length;
    const delayCount = stages.filter(s => s.status === 'delay').length;
    let status;
    if (doneCount === stages.length)           status = 'done';
    else if (doneCount === 0 && delayCount === 0) status = 'pending';
    else                                        status = 'delay';

    // Pending/blocked stages → shown in Remarks
    const remark = stages
      .filter(s => s.status !== 'done')
      .map(s => s.status === 'delay' ? `${s.shortName} (${s.raw})` : s.shortName)
      .join(', ');

    items.push({
      contractor,
      tower: defaultTower || 'COMM',
      label,
      done: doneCount, total: stages.length,
      status, remark,
      stageNames: stages.map(s => s.shortName),
      states: stages.map(s => s.status === 'done' ? 'TRUE' : 'FALSE'),
      stageBreakdown: stages,
      renderStyle: 'pct',   // stages column shows % only
    });
  }
  return items;
}

// Each summary row is one work type (Framing Work / Glass Work / Tile Work).
// The follow-up per-floor-side detail block is skipped — too granular and date-heavy.
function parseClubFacadeSummary(md, contractorTag, defaultTower) {
  const lines = splitTableRows(md);
  const items = [];
  let inSummary = false;
  let curVendor = '';
  let iVendor = -1, iWork = -1, iFloor = -1, iSide = -1;
  let iTotal = -1, iAchieved = -1, iBalance = -1, iCompletion = -1;
  for (const line of lines) {
    const c = parseRow(line);
    const head = c.map(h => (h||'').toUpperCase().trim());
    const isSummaryHeader = (
      head[0] && head[0].includes('VENDOR NAME') &&
      head.some(h => h.includes('TOTAL IN SQFT')) &&
      head.some(h => h.includes('ACHIVED'))
    );
    if (isSummaryHeader) {
      inSummary = true;
      iVendor     = head.findIndex(h => h.includes('VENDOR NAME'));
      iWork       = head.findIndex(h => h === 'WORK' || h.includes('CLUB TILE WORK') || (h.includes('WORK') && !h.includes('CIVIL') && !h.includes('FRAMING') && !h.includes('GLASS') && !h.includes('TILE')));
      iFloor      = head.findIndex(h => h.includes('FLOOR NO'));
      iSide       = head.findIndex(h => h === 'SIDE');
      iTotal      = head.findIndex(h => h.includes('TOTAL IN SQFT'));
      iAchieved   = head.findIndex(h => h.includes('ACHIVED IN SQFT'));
      iBalance    = head.findIndex(h => h.includes('BALANCE IN SQFT'));
      iCompletion = head.findIndex(h => h.includes('TOTAL COMPLETATION DATE'));
      curVendor = '';
      continue;
    }
    // Other-header detection — exit summary mode
    const isOtherHeader = head[0] && (
      head[0].includes('AREA NAME') ||
      (head[0].includes('FLOOR NO') && !head[0].includes('VENDOR'))
    );
    if (isOtherHeader) { inSummary = false; continue; }
    if (!inSummary) continue;
    const vendor = iVendor >= 0 ? (c[iVendor]||'').trim() : '';
    if (vendor) curVendor = vendor;
    const work = iWork >= 0 ? (c[iWork]||'').trim() : '';
    if (!work) continue;
    const floor      = iFloor      >= 0 ? (c[iFloor]||'').trim()      : '';
    const side       = iSide       >= 0 ? (c[iSide]||'').trim()       : '';
    const totalRaw   = iTotal      >= 0 ? (c[iTotal]||'').toString()  : '';
    const achievedRaw= iAchieved   >= 0 ? (c[iAchieved]||'').toString() : '';
    const balanceRaw = iBalance    >= 0 ? (c[iBalance]||'').toString() : '';
    const completion = iCompletion >= 0 ? (c[iCompletion]||'').trim() : '';
    const total    = parseFloat(totalRaw.replace(/,/g,''))    || 0;
    const achieved = parseFloat(achievedRaw.replace(/,/g,'')) || 0;
    const balance  = parseFloat(balanceRaw.replace(/,/g,''))  || 0;
    const pct = total > 0 ? Math.round((achieved / total) * 100) : 0;
    let status;
    if (total > 0 && achieved >= total) status = 'done';
    else if (/COMPLETE|^DONE$/i.test(completion)) status = 'done';
    else if (achieved === 0 && !completion) status = 'pending';
    else status = 'delay';
    const labelParts = [];
    if (floor) labelParts.push(floor);
    if (side)  labelParts.push(side);
    labelParts.push(work);
    const remarkParts = [];
    if (curVendor) remarkParts.push(`Vendor: ${curVendor}`);
    if (total > 0) remarkParts.push(`${achieved.toLocaleString()}/${total.toLocaleString()} sqft (${pct}%)`);
    if (balance > 0) remarkParts.push(`Balance: ${balance.toLocaleString()} sqft`);
    if (completion) remarkParts.push(completion);
    items.push({
      contractor: contractorTag,
      tower:      defaultTower || 'COMM',
      label:      labelParts.join(' · ') || work,
      done:       status === 'done' ? 1 : 0,
      total:      1,
      states:     [`${pct}%`],
      stageNames: ['Progress'],
      status,
      remark:     remarkParts.join(' · '),
    });
  }
  return items;
}

// Sports Arena Window — bespoke parser. Two blocks with different column layouts:
//   Block 1: Area Name | Location | Window | <5 stages> | HOD       (Elevation A, Elevation C)
//   Block 2: Window | <blank>     | Sizes  | <5 stages> | HOD       (Elevation D — Window col holds the type, blank col holds location)
// Block 1 ends with a marker row `|  |  | Elevation D |  |...` that announces the upcoming block.
function parseSportsArenaWindow(md, contractorTag, defaultTower) {
  const lines = splitTableRows(md);
  const items = [];
  let blockType = null;
  let stageIdxs = [], stageNames = [];
  let iArea = -1, iLocation = -1, iWindow = -1;
  let curArea = '', curLocation = '';
  for (const line of lines) {
    const c = parseRow(line);
    const head = c.map(h => (h||'').toUpperCase().trim());
    // Block 1 header
    if (head[0] === 'AREA NAME' && head[1] === 'LOCATION' && head[2] === 'WINDOW') {
      blockType = 'main';
      iArea = 0; iLocation = 1; iWindow = 2;
      stageIdxs = []; stageNames = [];
      for (let k = 3; k < head.length; k++) {
        if (head[k]) { stageIdxs.push(k); stageNames.push(head[k]); }
      }
      curArea = ''; curLocation = '';
      continue;
    }
    // Block 2 header — head[0]='WINDOW' and head[2] starts with SIZES
    if (head[0] === 'WINDOW' && head[2] && head[2].includes('SIZES')) {
      blockType = 'elevD';
      iArea = -1; iLocation = 1; iWindow = 0;
      stageIdxs = []; stageNames = [];
      for (let k = 2; k < head.length; k++) {
        if (head[k]) { stageIdxs.push(k); stageNames.push(head[k]); }
      }
      // Don't reset curArea — we may have already set it via the marker row below
      if (!curArea) curArea = 'Elevation D';
      curLocation = '';
      continue;
    }
    if (!blockType) continue;
    // Inline "Elevation D" marker row inside Block 1: |  |  | Elevation D |  |...
    if (blockType === 'main' && head[2] === 'ELEVATION D' && !head[0] && !head[1]) {
      curArea = 'Elevation D';
      curLocation = '';
      continue;
    }
    // Forward-fill area & location
    if (blockType === 'main') {
      if (c[iArea] && c[iArea].trim()) curArea = c[iArea].trim();
      if (c[iLocation] && c[iLocation].trim()) curLocation = c[iLocation].trim();
    } else if (blockType === 'elevD') {
      if (c[iLocation] && c[iLocation].trim()) curLocation = c[iLocation].trim();
    }
    const window = (c[iWindow]||'').trim();
    if (!window) continue;
    const states = stageIdxs.map(k => (c[k]||'').toUpperCase().trim());
    const trueCount = states.filter(s => s === 'TRUE').length;
    const falseCount = states.filter(s => s === 'FALSE').length;
    const total = stageIdxs.length;
    let status;
    if (total > 0 && trueCount === total) status = 'done';
    else if (trueCount === 0 && falseCount === 0) status = 'pending';
    else status = 'delay';
    const labelParts = [curArea, curLocation, window].filter(Boolean);
    items.push({
      contractor: contractorTag,
      tower:      defaultTower || 'COMM',
      label:      labelParts.join(' · '),
      done:       trueCount,
      total,
      states,
      stageNames,
      status,
      remark:     '',
    });
  }
  return items;
}

    return `<div class="live-bar">
      <span class="dot" style="background:#22c55e;box-shadow:0 0 0 3px #bbf7d0"></span>

      <span style="color:#94a3b8;margin-left:6px">· ${escapeHtml(source)}</span>

  }
  return `<div class="live-bar"><span class="dot" style="background:#ef4444"></span><span style="color:#dc2626;font-weight:600">${escapeHtml(state)}</span></div>`;
}

            <div style="font-size:10px;color:${color};margin-top:3px">${pct}%</div>
          </div>`;
        }).join('')}
      </div>`;
    }
    // ── Interior stage summary cards (shown when a specific contractor is selected) ──
    let interiorStageSummaryHtml = '';
    if (sub.key === 'interior' && activeWorkItem !== 'all' && items.length > 0) {
      // Collect unique stage names from the filtered items (already restricted to cols E:O + Y:Z)
      const allStageNames = [];
      items.forEach(item => {
        if (!item.stageNames) return;
        item.stageNames.forEach(n => { if (n && !allStageNames.includes(n)) allStageNames.push(n); });
      });
      function _intStageIcon(name) {
        const u = (name||'').toUpperCase();
        if (u.includes('GYPSUM'))                           return '🪵';
        if (u.includes('GI ANGLE') || u.includes('GI FR')) return '🔩';
        if (u.includes('POP'))                              return '🎨';
        if (u.includes('PELM'))                             return '🪟';
        if (u.includes('KITCHEN'))                          return '🍳';
        if (u.includes('SERVANT'))                          return '🪣';
        if (u.includes('FRONT BALCONY') || (u.includes('FRONT') && u.includes('BAL'))) return '🌅';
        if (u.includes('REAR BALCONY')  || (u.includes('REAR')  && u.includes('BAL'))) return '🌄';
        if (u.includes('FLOOR'))                            return '🟫';
        if (u.includes('WALL'))                             return '🧱';
        if (u.includes('CEIL'))                             return '🔲';
        if (u.includes('TILE'))                             return '⬜';
        return '📋';
      }
      const stageSummary = allStageNames.map(stageName => {
        let done = 0, delay = 0, applicable = 0;
        const total = items.length; // always use full flat count so all cards share the same denominator
        items.forEach(item => {
          if (!item.stageNames) return;
          const idx = item.stageNames.indexOf(stageName);
          if (idx < 0) return;
          const v = (item.states[idx] || '').trim();
          if (/^NA$/i.test(v) || v === '') return; // NA/empty = not yet tracked (counts as pending)
          applicable++; // cell has a real value (TRUE / FALSE / date / note)
          // Interior rule: only overdue dated cells count as delayed; notes/future dates stay pending
          if (v.toUpperCase() === 'TRUE') done++;
          else if (_isPastDateCell(v))    delay++;
        });
        const pct = total > 0 ? Math.round(done / total * 100) : 0;
        return { name: stageName, done, delay, total, pct, applicable };
      }).filter(s => s.applicable > 0); // hide stages where every flat is NA (not this contractor's scope)

      if (stageSummary.length > 0) {
        interiorStageSummaryHtml = `
          <div style="margin-bottom:20px">
            <div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">📊 Stage Summary — ${escapeHtml(activeWorkItem)}</div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:10px">
              ${stageSummary.map(s => {
                const color  = s.pct === 100 ? '#16a34a' : s.pct === 0 ? '#64748b' : '#b45309';
                const bg     = s.pct === 100 ? '#f0fdf4' : s.pct === 0 ? 'var(--card-bg)' : '#fffbeb';
                const border = s.pct === 100 ? '#86efac' : s.pct === 0 ? 'var(--card-border)' : '#fcd34d';
                const bar    = s.pct === 100 ? '#22c55e' : s.pct === 0 ? '#cbd5e1' : '#f59e0b';
                return `<div style="background:${bg};border:2px solid ${border};border-radius:12px;padding:12px 10px 10px;text-align:center">
                  <div style="font-size:22px;margin-bottom:4px">${_intStageIcon(s.name)}</div>
                  <div style="font-size:10px;font-weight:700;color:${color};line-height:1.3;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.3px">${escapeHtml(s.name)}</div>
                  <div style="font-size:24px;font-weight:800;color:${color};line-height:1">${s.done}<span style="font-size:13px;font-weight:400;color:#94a3b8">/${s.total}</span></div>
                  <div style="margin:6px auto 0;height:5px;background:var(--bar-bg);border-radius:3px;max-width:80px"><div style="height:5px;width:${s.pct}%;background:${bar};border-radius:3px;transition:width 0.4s"></div></div>
                  <div style="font-size:11px;font-weight:700;color:${color};margin-top:3px">${s.pct}%</div>
                  ${s.delay > 0 ? `<div style="font-size:10px;color:#dc2626;margin-top:3px">⚠️ ${s.delay} delayed</div>` : ''}
                </div>`;
              }).join('')}
            </div>
          </div>`;
      }
    }

    const labelHeader = showLabelCol ? `<th>${escapeHtml(itemLabel)}</th>` : '';
    // ── sqft table (Baffle Ceiling) vs generic table ──
    const tableHtml = filtered.length === 0
      ? `<div class="empty">No items in this status.</div>`
      : isSqftMode
        ? `<table><thead><tr>
            <th>#</th>
            ${showTowerCol ? '<th>Tower</th>' : ''}
            ${showWorkTypeCol ? '<th>Work Type</th>' : ''}
            <th style="text-align:right">Total (SQft)</th>
            <th style="text-align:right">Achieved (SQft)</th>
            <th style="text-align:right">Balance (SQft)</th>
            <th>Work Completion</th>
            <th>Remark</th>
          </tr></thead><tbody>${
          display.map((r,i) => {
            const d = r.sqftData || { total:0, achieved:0, balance:0, pct:0 };
            const p = d.total > 0 ? Math.round(d.achieved/d.total*100) : 0;
            const c = p===100?'#16a34a':p===0?'#94a3b8':'#b45309';
            const bg= p===100?'#dcfce7':p===0?'#f1f5f9':'#fef3c7';
            return `<tr>
              <td>${i+1}</td>
              ${showTowerCol?`<td style="font-weight:700;color:#1e3a5f">${escapeHtml(r.tower||'—')}</td>`:''}
              ${showWorkTypeCol?`<td style="font-weight:600;color:#475569">${escapeHtml(r.workType||'—')}</td>`:''}
              <td style="text-align:right;font-weight:600">${(d.total||0).toLocaleString()}</td>
              <td style="text-align:right;color:#16a34a;font-weight:600">${(d.achieved||0).toLocaleString()}</td>
              <td style="text-align:right;color:${d.balance>0?'#dc2626':'#16a34a'};font-weight:600">${(d.balance||0).toLocaleString()}</td>
              <td><span style="font-size:13px;font-weight:700;padding:2px 8px;border-radius:6px;background:${bg};color:${c}">${p}%</span></td>
              <td style="color:${r.remark?'#6b7280':'#d1d5db'};font-style:${r.remark?'normal':'italic'}">${escapeHtml(r.remark||'—')}</td>
            </tr>`;
          }).join('')
          }</tbody></table>${filtered.length>cap?`<div style="padding:10px 12px;font-size:11px;color:#94a3b8;text-align:center">Showing first ${cap} of ${filtered.length}</div>`:''}`
        : `<table><thead><tr><th>#</th>${labelHeader}${showTowerCol?'<th>Tower</th>':''}<th>Location</th>${showStuckCol?'<th>Stuck at (stage · earliest date)</th>':''}<th>Work Completion</th><th style="text-align:center">Status</th><th>Remark</th></tr></thead><tbody>${
          display.map((r,i) => `<tr>
            <td>${i+1}</td>

            ${showTowerCol?`<td style="font-weight:600;color:#1e3a5f">${escapeHtml(r.tower||'—')}</td>`:''}
            <td class="loc">${escapeHtml(r.label)}</td>
            ${showStuckCol?`<td>${r.delayStage ? `<span style="font-weight:700;color:#b91c1c">${escapeHtml(r.delayStage)}</span>${r.delayDate?` <span class="pill" style="background:#fee2e2;color:#dc2626;font-size:10px">${escapeHtml(r.delayDate)}</span>`:''}` : '<span style="color:#d1d5db">—</span>'}</td>`:''}
            <td>${(() => {
                const pct = Math.round((r.done / Math.max(r.total, 1)) * 100);
                const c  = pct === 100 ? '#16a34a' : pct === 0 ? '#94a3b8' : '#b45309';

                return `<span style="font-size:13px;font-weight:700;padding:2px 8px;border-radius:6px;background:${bg};color:${c}">${pct}%</span>`;

            <td style="text-align:center"><span class="pill" style="${pillStyles[r.status]}">${pillText[r.status]}</span></td>

    container.innerHTML = `
      <div class="eyebrow">${sub.icon} ${escapeHtml(sub.label)}${breadcrumb} <span class="tag live">LIVE</span></div>
      ${subnav}
      ${liveBar('live', allItems.length, SOURCE_LABELS[sub.key]||'')}

    container.querySelectorAll('.sub-btn[data-key]').forEach(b => {

function _hvacIsMeta(name) {
  return /^(levels?|area|areas|area name|floor|basement|s\.?\s*no\.?|record|tower[-\s]?\d*)$/i.test((name || '').trim());
}
// One HVAC stage cell → status contribution.
// NA/N-A → not applicable (excluded). TRUE → done. blank/FALSE/text → not done.
function _hvacCellDone(v) { return /^true$/i.test((v || '').trim()); }
function _hvacCellNA(v)   { const u = (v || '').trim().toUpperCase(); return u === 'NA' || u === 'N/A'; }
// Parse one HVAC tab → { stageNames:[], items:[{group,label,stages:[{name,val}],done,total,pending[],status}] }
function parseHvacTab(csv) {
  const rows = _kwCsvRows(csv);
  if (!rows.length) return { stageNames: [], items: [] };
  let h = 0;
  while (h < rows.length && rows[h].filter(c => (c || '').trim()).length < 4) h++;
  const header = (rows[h] || []).map(c => (c || '').trim());
  const stageCols = [], labelCols = [];
  header.forEach((nm, i) => { if (!nm) return; (_hvacIsMeta(nm) ? labelCols : stageCols).push({ i, name: nm }); });
  const grpIdx = labelCols.length ? labelCols[0].i : 0;
  let grp = '';
  const items = [];
  for (let r = h + 1; r < rows.length; r++) {
    const c = (rows[r] || []).map(x => (x || '').trim());
    if (c[grpIdx]) grp = c[grpIdx];
    let label = '';
    for (let k = labelCols.length - 1; k >= 1; k--) { if (c[labelCols[k].i]) { label = c[labelCols[k].i]; break; } }
    if (!label) continue;   // skip filler rows with no area/floor label
    const stages = stageCols.map(sc => ({ name: sc.name, val: c[sc.i] || '' }));
    let done = 0, total = 0; const pending = [];
    stages.forEach(s => {
      if (_hvacCellNA(s.val)) return;       // not applicable
      total++;
      if (_hvacCellDone(s.val)) done++;
      else pending.push(s);
    });
    const status = total === 0 ? 'pending' : (done === total ? 'done' : (done === 0 ? 'pending' : 'progress'));
    items.push({ group: grp, label, stages, done, total, pending, status });
  }
  return { stageNames: stageCols.map(s => s.name), items };
}

// ─── HANDOVER (per-tower 5-stage flat pipeline) ────────────────────────────
// Stages are sequential: 1st stage → snag shared → 2nd stage → ready+locked → open for visit.
const HO_STAGES = [
  { key:'s1',    label:'1st Stage',      full:'First stage of handover',      match:/first stage/i,            c:'#0e7490', activeBg:'#cffafe', ring:'#a5f3fc' },
  { key:'snag',  label:'Snag Shared',    full:'Snag List shared for stage 2', match:/snag/i,                   c:'#7c3aed', activeBg:'#f3e8ff', ring:'#e9d5ff' },
  { key:'s2',    label:'2nd Stage',      full:'Second stage of handover',     match:/second stage/i,           c:'#b45309', activeBg:'#fffbeb', ring:'#fcd34d' },
  { key:'ready', label:'Ready & Locked', full:'Flat ready and Locked',        match:/ready.*lock/i,            c:'#16a34a', activeBg:'#f0fdf4', ring:'#86efac' },
];
function hoTrue(v) { return /^true$/i.test((v || '').trim()); }
// Furthest stage reached (index into HO_STAGES), or -1 if not started.
function hoFurthest(stages) { let f = -1; stages.forEach((v, i) => { if (hoTrue(v)) f = i; }); return f; }
function hoStatusPill(stages) {
  const f = hoFurthest(stages);
  if (f < 0) return `<span class="pill" style="background:#f1f5f9;color:#64748b">Not started</span>`;
  const s = HO_STAGES[f];
  return `<span class="pill" style="background:${s.activeBg};color:${s.c}">${escapeHtml(s.label)}</span>`;
}
function hoCell(v) {
  if (hoTrue(v)) return `<span class="pill" style="background:#dcfce7;color:#16a34a">✓</span>`;
  if (/^false$/i.test((v||'').trim())) return `<span class="pill" style="background:#f1f5f9;color:#94a3b8">✗</span>`;
  const t = (v||'').trim();
  return t ? `<span class="pill" style="background:#fef3c7;color:#b45309;font-size:9px">${escapeHtml(t)}</span>` : `<span style="color:#cbd5e1">—</span>`;
}
// Parse one tower tab → [{tower, flat, type, stages:[5]}]. Column order differs
// between towers (T1-3: Floor before Area; T4-6: Area before Floor) so columns are
// located by header name, not index.
function parseHandoverTab(csv, towerLabel) {
  const rows = _kwCsvRows(csv);
  const out = [];
  let started = false, iArea = -1, iType = -1, sIdx = [];
  for (const r of rows) {
    const cells = r.map(c => (c || '').trim());
    if (!started) {
      const up = cells.map(c => c.toUpperCase());
      if (up.some(u => u === 'AREA NAME') && up.some(u => /FIRST STAGE/.test(u))) {
        iArea = up.findIndex(u => u === 'AREA NAME');
        iType = up.findIndex(u => /TYPES?\s+OF\s+FLAT/.test(u));
        sIdx  = HO_STAGES.map(s => cells.findIndex(h => s.match.test(h)));
        started = true;
      }
      continue;
    }
    const flat = (cells[iArea] || '').trim();
    if (!/T0?\d\s*\/\s*\d+/i.test(flat)) continue;   // data rows only
    out.push({
      tower: towerLabel,
      flat:  flat.replace(/\s+/g, ''),
      type:  iType >= 0 ? (cells[iType] || '') : '',
      stages: sIdx.map(i => i >= 0 ? (cells[i] || '') : ''),
    });
  }
  return out;
}
function hoCard(group, key, label, num, active, palette, desc) {
  const c = palette.c, bg = active ? palette.activeBg : '#fff';
  const border = active ? c : '#e2e8f0', rb = palette.ring;

    style="flex:0 0 auto;min-width:130px;border-color:${border};background:${bg};box-shadow:${active?'0 0 0 3px '+rb:'0 1px 4px rgba(0,0,0,0.05)'}">
    <div class="card-num" style="color:${c};font-size:22px">${num}</div>

    ${desc ? `<div class="card-desc" style="font-size:10px;color:#64748b">${desc}</div>` : ''}
  </button>`;
}
function hoTowerPct(rows) {
  if (!rows.length) return '—';
  const li = HO_STAGES.length - 1;   // final tracked stage (Ready & Locked)
  const done = rows.filter(r => hoTrue(r.stages[li])).length;
  return `${done}/${rows.length} · ${Math.round(done / rows.length * 100)}%`;
}

function wpStatusPill(key) {
  const t = WP_STATUS_TABS.find(s => s.key === key) || WP_STATUS_TABS[2];
  return `<span class="pill" style="background:${t.bg};color:${t.color}">${escapeHtml(t.label)}</span>`;
}
// Parse one tower tab CSV → [{tower, floor, flat, area, testing, plaster, pcc, remark}]
function parseWaterproofTab(csv, towerLabel) {
  const rows = _kwCsvRows(csv);
  const out = [];
  let started = false, floor = '', flat = '';
  let iFloor = 0, iFlat = 1, iArea = 2, iT = -1, iP = -1, iC = -1, iRem = -1;
  for (const r of rows) {
    const cells = r.map(c => (c || '').trim());
    const up = cells.map(c => c.toUpperCase());
    if (!started) {
      // Header row carries FLOOR + the stage columns.
      if (up.includes('FLOOR') && up.some(u => u === 'TESTING')) {
        iFloor = up.indexOf('FLOOR');
        iFlat  = up.indexOf('FLAT');
        iArea  = up.findIndex(u => /^AREAS?$/.test(u));
        iT     = up.findIndex(u => u === 'TESTING');
        iP     = up.findIndex(u => u === 'PLASTER');
        iC     = up.findIndex(u => u === 'PCC');
        iRem   = up.findIndex(u => u === 'REMARKS');
        if (iArea < 0) iArea = 2;
        started = true;
      }
      continue;
    }
    if (cells[iFloor]) floor = cells[iFloor];
    if (cells[iFlat])  flat  = cells[iFlat];
    const area = (cells[iArea] || '').trim();
    if (!area) continue;   // skip filler / blank-area rows
    out.push({
      tower:   towerLabel,
      floor, flat, area,
      testing: cells[iT] || '',
      plaster: cells[iP] || '',
      pcc:     cells[iC] || '',
      remark:  iRem >= 0 ? (cells[iRem] || '') : '',
    });
  }
  return out;
}
function wpCard(group, key, label, num, active, palette, desc) {
  const c = palette.c, bg = active ? palette.activeBg : '#fff';
  const border = active ? c : '#e2e8f0', rb = palette.ring;
  return `<button class="card${active?' active':''}" data-wpgroup="${group}" data-wpkey="${escapeHtml(key)}"
    style="flex:0 0 auto;min-width:130px;border-color:${border};background:${bg};box-shadow:${active?'0 0 0 3px '+rb:'0 1px 4px rgba(0,0,0,0.05)'}">
    <div class="card-num" style="color:${c};font-size:22px">${num}</div>
    <div class="card-label" style="font-size:11px">${escapeHtml(label)}</div>
    ${desc ? `<div class="card-desc" style="font-size:10px;color:#64748b">${desc}</div>` : ''}
  </button>`;
}
// Unique flats in a set of area-rows (a flat = tower + floor + flat id).
function wpFlatCount(rows) {
  return new Set(rows.map(r => `${r.tower}|${r.floor}|${r.flat}`)).size;
}
function wpTowerPct(rows) {
  if (!rows.length) return '—';
  const done = rows.filter(r => r.status === 'done').length;
  return `${rows.length} areas · ${Math.round(done / rows.length * 100)}% done`;
}

// ─── Commercial Kitchen parser & renderer ────────────────
// Source: Main Kitchen final details.xlsx (1NOqYCKjDQRQ_UHeT65vncPPQD5wgMgyu).
// The sheet has three stacked sub-sections (HAKS items / CB items / ID items),
// each with the same 10-column header:
//   S.no. | Areas | Sub areas | ITEM NO | QTY | CATEGORY | DESCRIPTION |
//   Vendor | Delivery status | Commissioning status
// Drive's NL CSV concatenates all rows with spaces between sections, so we
// detect each section's header (begins with "S.no.") and tag rows accordingly.
function parseCommercialKitchen(raw) {
  const fields = csvParseFields(raw);
  const sectionStarts = [];
  fields.forEach((f, i) => {
    const t = (f || '').trim();
    if (/(^|\s)S\.no\.$/i.test(t)) sectionStarts.push(i);
  });
  const sections = [];
  for (let s = 0; s < sectionStarts.length; s++) {
    const start = sectionStarts[s];
    const end   = s + 1 < sectionStarts.length ? sectionStarts[s+1] : fields.length;
    const headerField = (fields[start] || '').trim();
    const labelMatch  = headerField.match(/^(.+?)\s+S\.no\.$/i);
    const sectionLabel = labelMatch ? labelMatch[1].trim() : 'CB items';
    // Detect column count by walking forward from `start` until we find a field
    // that ends with "<header text> <digit>" — that's where the row data begins.
    // Common headers end with "Commissioning status" and the first row's S.no.
    // is glued onto it as "Commissioning status 1".
    let colCount = 0;
    let glueDigit = '';
    for (let k = 1; k < 20 && start + k < end; k++) {
      const f = (fields[start + k] || '').trim();
      const m = f.match(/^(.+?)\s+(\d+)$/);
      if (m && /commissioning|status/i.test(m[1])) {
        colCount = k + 1;
        glueDigit = m[2];
        fields[start + k] = m[1].trim();
        break;
      }
    }
    if (!colCount) {
      // Couldn't auto-detect; assume 9 (current sheet) and assume no glue.
      colCount = 9;
    }
    let dataStart = start + colCount;
    let endAfterSplice = end;
    if (glueDigit) {
      fields.splice(dataStart, 0, glueDigit);
      // Splice inserts at dataStart — shift all later section-start indices
      // and this section's end boundary by 1 so subsequent iterations land on
      // the correct header fields. Without this, sections 2..N read the wrong
      // start fields and their labels fall back to "CB items".
      endAfterSplice = end + 1;
      for (let j = s + 1; j < sectionStarts.length; j++) sectionStarts[j]++;
    }
    const rows = [];
    const timelines = [];
    let cursor = dataStart;
    while (cursor < endAfterSplice && !/\d/.test((fields[cursor]||''))) cursor++;
    while (cursor < endAfterSplice) {
      const cur0 = fields[cursor] || '';
      if (!/^\s*\d+$/.test(cur0)) {
        // Field sitting between rows — capture a date like "13-Jun" as the
        // Timelines value for the row just read (this column is otherwise skipped).
        const t = cur0.trim();
        if (rows.length && /^\d{1,2}[-\s][A-Za-z]{3,}/.test(t) && !timelines[rows.length - 1]) {
          timelines[rows.length - 1] = t;
        }
        cursor++; continue;
      }
      const row = [];
      for (let k = 0; k < colCount && cursor + k < endAfterSplice; k++) {
        const cur = fields[cursor + k] || '';
        if (k > 0 && /^\s+\d+$/.test(cur)) break;
        row.push(cur.trim());
      }
      const collected = row.length;
      while (row.length < colCount) row.push('');
      rows.push(row.slice(0, colCount));
      timelines.push('');
      cursor += Math.max(collected, 1);
    }
    sections.push({ label: sectionLabel, rows, colCount, timelines });
  }
  return { sections };
}
function _kitchenStatusClass(v) {
  const u = String(v || '').trim().toLowerCase();
  if (!u || u === '-') return 'pending';
  if (/received|done|complete|installed|commissioned/.test(u)) return 'received';
  return 'pending';
}
// Normalise commissioning cell text → one of the 5 granular status keys
function _comStatusNorm(v) {
  const u = String(v || '').trim().toLowerCase();
  if (!u || u === '-') return 'not-received';
  if (/commission|done|complete|installed/.test(u)) return 'commissioned';
  if (/mep/.test(u))    return 'mep-clearance';
  if (/size/.test(u))   return 'size-issue';
  if (/hold/.test(u))   return 'hold';
  if (/fitout/.test(u)) return 'fitout-item';
  if (/not\s*rec|not\s*rcv/.test(u)) return 'not-received';
  return 'not-received';
}
// Kitchen-specific extractor — bypasses the generic unwrapMcp (which assumes
// pipe-table content and falls back to "longest string", incorrectly picking
// the JSON wrapper over CSV content). Walks the response and returns
// res.fileContent if present, or any string containing the kitchen header.
function unwrapKitchenContent(res) {
  function walk(o, depth) {
    if (depth > 10 || o == null) return null;
    if (typeof o === 'string') {
      const t = o.trim();
      if (t.startsWith('{') || t.startsWith('[')) {
        try { const r = walk(JSON.parse(o), depth + 1); if (r) return r; } catch {}
      }
      if (/S\.no\.,\s*Areas|Main Kitchen \(Stilt\)/i.test(o)) return o;
      return null;
    }
    if (Array.isArray(o)) {
      for (const v of o) { const r = walk(v, depth + 1); if (r) return r; }
      return null;
    }
    if (typeof o === 'object') {
      if (typeof o.fileContent === 'string') return o.fileContent;
      for (const v of Object.values(o)) { const r = walk(v, depth + 1); if (r) return r; }
    }
    return null;
  }
  return walk(res, 0);
}

// Per-flat pipeline tracker. Each tower tab has, per flat: Area Name, Vendor,

// Only the three milestones are surfaced (RFM + Site Readiness are hidden).
// idx = column index within each scope's 5-cell array
// [0 RFM, 1 Measurement, 2 Site Readiness, 3 Carcass Delivered, 4 Installation]
const KW_SHOWN = [
  { label:'Measured',  full:'Measurement',       idx:1 },
  { label:'Carcass',   full:'Carcass Delivered', idx:3 },
  { label:'Installed', full:'Installation',      idx:4 },
];

// Carcass Delivered → Installation), plus Not-Started and Blocked.
// Ordered in pipeline sequence: Not Started → Measured → Carcass Delivered →
// Installed (so the status cards read left-to-right in the real work order).
const KW_STATUSES = [
  { key:'notstarted', label:'Not Started',      c:'#475569', activeBg:'#f1f5f9', ring:'#cbd5e1' },
  { key:'measured',   label:'Measured',         c:'#b45309', activeBg:'#fef3c7', ring:'#fde68a' },

  { key:'installed',  label:'Installed',        c:'#16a34a', activeBg:'#dcfce7', ring:'#86efac' },
  { key:'blocked',    label:'Hold / No Consent',c:'#dc2626', activeBg:'#fee2e2', ring:'#fca5a5' },
];
const KW_STATUS_STYLE = Object.fromEntries(KW_STATUSES.map(s => [s.key, { bg:s.activeBg, c:s.c }]));
function _kwTruthy(v) { return /^\s*true\s*$/i.test(String(v || '')); }
// Row-based CSV → array of arrays (quote-aware, preserves row boundaries).
function _kwCsvRows(csv) {
  const rows = []; let row = [], field = '', inQ = false;
  for (let i = 0; i < csv.length; i++) {
    const ch = csv[i];
    if (inQ) {
      if (ch === '"') { if (csv[i+1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === ',') { row.push(field); field = ''; }
    else if (ch === '\n' || ch === '\r') {
      if (ch === '\r' && csv[i+1] === '\n') i++;
      row.push(field); rows.push(row); row = []; field = '';
    } else field += ch;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}
// Parse one tower tab → [{flat, vendor, kitchen:[5], wardrobe:[5], note}]
function parseKitchenWardrobe(csv) {
  const rows = _kwCsvRows(csv);
  const out = [];
  for (const r of rows) {
    const flat = (r[0] || '').trim();
    // Data rows start with a flat id like "T03/11" (a stray "T03163" also appears).
    if (!/^T0\d\s*\/?\s*\d{2,3}$/i.test(flat)) continue;
    const cells = r.slice(0, 12).map(c => (c || '').trim());
    while (cells.length < 12) cells.push('');
    out.push({
      flat:     flat.replace(/\s+/g, ''),
      vendor:   cells[1],
      kitchen:  cells.slice(2, 7),
      wardrobe: cells.slice(7, 12),
      note:     cells.slice(2).filter(Boolean).join(' '),
    });
  }
  return out;
}
// Classify one scope's 5 stage cells (+ vendor) into a KW_STATUSES key.
function kwClassify(stages, vendor) {
  if (_kwTruthy(stages[4])) return 'installed';
  if (_kwTruthy(stages[3])) return 'carcass';
  if (_kwTruthy(stages[1])) return 'measured';
  const blob = (vendor + ' ' + stages.join(' ')).toLowerCase();
  if (/no\s*consent|hold|sample/.test(blob)) return 'blocked';
  return 'notstarted';
}
// Distinguish real vendors from the "not ordered" markers in the Vendor column.
const KW_NOT_ORDERED = [
  { key:'hold',       label:'Hold',         c:'#7f1d1d', activeBg:'#fef2f2', ring:'#ef4444' },
  { key:'no-consent', label:'No Consent',   c:'#dc2626', activeBg:'#fee2e2', ring:'#fca5a5' },
  { key:'sample',     label:'Sample Flats', c:'#c2410c', activeBg:'#ffedd5', ring:'#fdba74' },
];
function kwVendorKind(vendor) {
  const v = (vendor || '').toLowerCase();
  if (/no\s*consent/.test(v)) return 'no-consent';
  if (/hold/.test(v))         return 'hold';
  if (/sample/.test(v))       return 'sample';
  return 'real';
}
function kwStatusPill(key) {
  const s = KW_STATUS_STYLE[key] || { bg:'#f1f5f9', c:'#64748b' };
  const label = (KW_STATUSES.find(x => x.key === key) || {}).label || key;
  return `<span class="pill" style="background:${s.bg};color:${s.c}">${escapeHtml(label)}</span>`;
}
// One boolean/free-text stage cell → compact pill
function kwStageCell(v) {
  const t = (v || '').trim();
  if (!t) return `<span style="color:#cbd5e1">—</span>`;
  if (/^true$/i.test(t))  return `<span class="pill" style="background:#dcfce7;color:#16a34a">✓</span>`;
  if (/^false$/i.test(t)) return `<span class="pill" style="background:#f1f5f9;color:#94a3b8">✗</span>`;
  return `<span class="pill" style="background:#fef3c7;color:#b45309;font-size:9px">${escapeHtml(t)}</span>`;
}
function kwColorCard(group, key, label, count, active, palette, desc) {

}

function kwTowerPct(rows) {
  if (!rows.length) return '—';
