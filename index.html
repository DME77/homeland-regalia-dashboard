<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Homeland Regalia — Live Dashboard</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<style>
/* ── Theme variables ─────────────────────────────────────── */
:root {
  --bg: #f1f5f9;
  --body-color: #1e3a5f;
  --card-bg: #fff;
  --card-border: #e2e8f0;
  --tbl-alt: #fafafa;
  --tbl-head-bg: #f9fafb;
  --th-color: #6b7280;
  --td-color: #374151;
  --sub-btn-bg: #fff;
  --sub-btn-color: #374151;
  --eyebrow-color: #64748b;
  --kpi-border: #e2e8f0;
  --bar-bg: #e5e7eb;
  --placeholder-bg: #fff;
  --placeholder-border: #cbd5e1;
  --placeholder-color: #64748b;
  --footer-color: #94a3b8;
  --loading-color: #94a3b8;
  --tab-active-bg: #f1f5f9;
  --tab-active-color: #1e3a5f;
  color-scheme: light;
}
html.dark {
  --bg: #0f172a;
  --body-color: #e2e8f0;
  --card-bg: #1e293b;
  --card-border: #334155;
  --tbl-alt: #1a2740;
  --tbl-head-bg: #1e293b;
  --th-color: #94a3b8;
  --td-color: #cbd5e1;
  --sub-btn-bg: #1e293b;
  --sub-btn-color: #cbd5e1;
  --eyebrow-color: #94a3b8;
  --kpi-border: #334155;
  --bar-bg: #334155;
  --placeholder-bg: #1e293b;
  --placeholder-border: #475569;
  --placeholder-color: #94a3b8;
  --footer-color: #64748b;
  --loading-color: #64748b;
  --tab-active-bg: #0f172a;
  --tab-active-color: #e2e8f0;
  color-scheme: dark;
}
* { box-sizing: border-box; }
body { margin:0; font-family:'Segoe UI', system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--body-color); transition:background 0.3s,color 0.3s; }

/* ── Header / Banner ─────────────────────────────────────── */
.header {
  position: relative;
  color: #fff;
  overflow: hidden;
  min-height: 190px;
}
.header-bg {
  position: absolute; inset: 0;
  background: url('banner.jpg') center 55% / cover no-repeat;
  z-index: 0;
}
/* Very light overlay — image is already dark */
.header-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(5,5,10,0.35) 0%,
    rgba(5,5,10,0.50) 55%,
    rgba(5,5,10,0.82) 100%
  );
  z-index: 1;
}
.header-content {
  position: relative; z-index: 2;
  padding: 22px 24px 0;
}
.header-top {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 14px;
}
/* Real logo image */
.h-logo {
  width: 78px;
  height: 78px;
  object-fit: contain;
  flex-shrink: 0;
  filter: drop-shadow(0 2px 16px rgba(201,168,76,0.45));
}
.h-text { flex: 1; }
.h-brand {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.70);
  margin-bottom: 4px;
  font-weight: 700;
}
/* HOMELAND REGALIA in matching gold */
.h-project {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 2px;
  line-height: 1.1;
  color: #c9a84c;
  text-shadow: 0 1px 10px rgba(0,0,0,0.6);
  text-transform: uppercase;
}
/* Decorative divider line like in logo image */
.h-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 6px 0 5px;
}
.h-divider-line {
  flex: 1;
  max-width: 60px;
  height: 1px;
  background: linear-gradient(to right, transparent, #c9a84c);
}
.h-divider-line.right {
  background: linear-gradient(to left, transparent, #c9a84c);
}
.h-divider-dot {
  width: 5px; height: 5px;
  border: 1px solid #c9a84c;
  transform: rotate(45deg);
  opacity: 0.8;
}
.h-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.80);
}
.h-sub {
  font-size: 10.5px;
  color: rgba(255,255,255,0.42);
  margin-top: 8px;
  letter-spacing: 0.3px;
  padding-bottom: 18px;
}

/* ── Header action buttons ──────────────────────────────── */
.header-actions {
  position: absolute; top: 16px; right: 16px; z-index: 3;
  display: flex; gap: 8px; align-items: center;
}
#reload-btn {
  background: rgba(201,168,76,0.18);
  color: #c9a84c;
  border: 1px solid rgba(201,168,76,0.45);
  border-radius: 10px;
  padding: 9px 18px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  line-height: 1;
  font-family: inherit;
  transition: background 0.15s;
  letter-spacing: 0.2px;
}
#reload-btn:hover { background: rgba(201,168,76,0.30); }
#theme-toggle {
  background: rgba(255,255,255,0.10);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 10px;
  padding: 9px 13px;
  font-size: 16px;
  cursor: pointer;
  line-height: 1;
  font-family: inherit;
  transition: background 0.15s;
}
#theme-toggle:hover { background: rgba(255,255,255,0.20); }

/* ── Tab nav ─────────────────────────────────────────────── */
.tabnav { display:flex; gap:3px; flex-wrap:wrap; }
.tab-btn { padding:8px 16px; border-radius:8px 8px 0 0; border:none; font-weight:700; font-size:12px; white-space:nowrap; background:rgba(201,168,76,0.12); color:rgba(255,255,255,0.80); cursor:pointer; transition:all 0.15s; font-family:inherit; }
.tab-btn:hover { background:rgba(201,168,76,0.22); color:#fff; }
.tab-btn.active { background:var(--tab-active-bg); color:var(--tab-active-color); border-top: 2px solid #c9a84c; }

/* ── Body & components ──────────────────────────────────── */
.body { padding:22px 18px 24px; }
.eyebrow { font-size:11px; font-weight:700; color:var(--eyebrow-color); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:12px; }
.subnav { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-bottom:18px; }
.sub-btn { flex:0 0 auto; padding:10px 14px 8px; border-radius:10px; border:2px solid var(--card-border); background:var(--sub-btn-bg); color:var(--sub-btn-color); cursor:pointer; min-width:96px; text-align:center; transition:all 0.18s; font-family:inherit; }
.sub-btn.active { border-color:#2d5986; background:#1e3a5f; color:#fff; transform:translateY(-2px); box-shadow:0 4px 12px rgba(30,58,95,0.22); }
.sub-btn .icon { font-size:18px; margin-bottom:3px; }
.sub-btn .label { font-weight:700; font-size:11px; line-height:1.2; }
.sub-btn .meta { font-size:10px; opacity:0.75; margin-top:3px; }
.live-bar { display:flex; align-items:center; gap:8px; margin-bottom:14px; font-size:12px; flex-wrap:wrap; }
.dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.cards { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
.card { flex:1 1 110px; border:2px solid var(--card-border); border-radius:12px; padding:13px 10px 11px; background:var(--card-bg); cursor:pointer; text-align:left; transition:all 0.18s; font-family:inherit; }
.card.active { transform:translateY(-2px); }
.card-icon { font-size:18px; }
.card-num { font-size:26px; font-weight:800; line-height:1.1; margin-top:4px; }
.card-label { font-size:12px; font-weight:700; color:var(--td-color); margin-top:2px; }
.card-desc { font-size:11px; color:#9ca3af; }
.tbl-wrap { background:var(--card-bg); border-radius:14px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,0.07); border:1px solid var(--card-border); }
.tbl-head { padding:12px 18px; display:flex; align-items:center; gap:8px; }
.tbl-title { font-weight:700; font-size:13px; }
.tbl-count { margin-left:auto; color:#fff; border-radius:20px; padding:2px 12px; font-size:12px; font-weight:700; }
table { width:100%; border-collapse:collapse; }
th { padding:10px 12px; font-size:11px; font-weight:700; color:var(--th-color); text-align:left; text-transform:uppercase; letter-spacing:0.5px; background:var(--tbl-head-bg); }
td { padding:10px 12px; font-size:12px; color:var(--td-color); border-top:1px solid var(--card-border); vertical-align:top; }
tr:nth-child(even) td { background:var(--tbl-alt); }
.pill { border-radius:20px; padding:3px 10px; font-size:11px; font-weight:600; display:inline-block; white-space:nowrap; }
.loc { font-weight:700; color:#1e3a5f; }
.empty { padding:40px; text-align:center; color:#9ca3af; font-size:13px; }
.loading { padding:40px; text-align:center; color:var(--loading-color); font-size:13px; }
.error { margin:0; padding:18px; background:#fef2f2; border:1px solid #fca5a5; border-radius:12px; color:#dc2626; font-size:12px; line-height:1.5; }
.kpis { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
.kpi { flex:1 1 110px; border:2px solid var(--kpi-border); border-radius:13px; padding:14px 12px 12px; background:var(--card-bg); }
.kpi-icon { font-size:20px; }
.kpi-num { font-size:26px; font-weight:800; line-height:1.1; margin-top:3px; }
.kpi-label { font-size:12px; font-weight:700; color:var(--td-color); margin-top:2px; }
.bar-outer { flex:1; background:var(--bar-bg); border-radius:99px; height:8px; overflow:hidden; }
.bar-inner { height:100%; border-radius:99px; }
.bar-row { display:flex; align-items:center; gap:8px; }
.bar-pct { font-size:11px; font-weight:700; min-width:34px; text-align:right; }
.placeholder { background:var(--placeholder-bg); border:1px dashed var(--placeholder-border); border-radius:14px; padding:32px 20px; text-align:center; color:var(--placeholder-color); }
.placeholder .ph-icon { font-size:32px; margin-bottom:8px; }
.placeholder .ph-title { font-size:14px; font-weight:700; color:var(--body-color); margin-bottom:6px; }
.placeholder .ph-sub { font-size:12px; color:var(--placeholder-color); line-height:1.5; max-width:520px; margin:0 auto; }
.footer { text-align:center; font-size:11px; color:var(--footer-color); padding:16px 18px 28px; }
.tag { font-size:10px; padding:2px 6px; border-radius:4px; background:#dbeafe; color:#1d4ed8; font-weight:700; vertical-align:middle; margin-left:6px; }
.tag.live { background:#dcfce7; color:#16a34a; }
.tag.todo { background:#fef3c7; color:#b45309; }
</style>
</head>

<div class="header">
  <div class="header-bg"></div>

  <div class="header-actions">

<div class="footer" id="footer">Use the Reload button at the top of this view to refresh all live data.</div>

}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function unwrapMcp(res) {
  // Recursively walk the response and pick the string that contains the most
  // markdown-table rows. Handles every wrapping shape callMcpTool might return:
  // plain string, {fileContent}, {result:{fileContent}}, {content:[{type:"text",text:...}]},
  // double-JSON-encoded payloads, {data}/{response} envelopes, etc.
  const strings = [];
  function walk(o, depth) {
    if (depth > 8 || o == null) return;
    if (typeof o === 'string') {
      strings.push(o);
      const t = o.trim();
      if (t.startsWith('{') || t.startsWith('[')) {
        try { walk(JSON.parse(o), depth + 1); } catch {}
      }
      return;
    }
    if (Array.isArray(o)) { o.forEach(v => walk(v, depth + 1)); return; }
    if (typeof o === 'object') {
      if (typeof o.fileContent === 'string') strings.push(o.fileContent);
      if (typeof o.text === 'string') strings.push(o.text);
      Object.values(o).forEach(v => walk(v, depth + 1));
    }
  }
  walk(res, 0);
  let best = '', bestScore = 0;
  for (const s of strings) {
    if (!s || typeof s !== 'string') continue;
    const lines = s.split('\n');
    const pipeLines = lines.reduce((n, l) => n + (l.trim().startsWith('|') ? 1 : 0), 0);
    if (pipeLines > bestScore) { bestScore = pipeLines; best = s; }
  }
  if (best) return best;
  // Fallback: longest string seen
  return strings.reduce((a, b) => (b && b.length > a.length ? b : a), '');
}

function csvToPipeRows(csv) {
  // Minimal CSV parser → pipe-table lines. Handles quoted fields, escaped quotes,
  // embedded newlines inside quotes.
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < csv.length; i++) {
    const ch = csv[i];
    if (inQuotes) {
      if (ch === '"') {
        if (csv[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(field); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && csv[i + 1] === '\n') i++;
        row.push(field); rows.push(row);
        row = []; field = '';
      } else field += ch;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  // Emit pipe-table rows. Replace embedded newlines with spaces (the existing
  // parsers handle Drive's "&#10;" entity, but a real newline would split rows).
  return rows
    .filter(r => r.some(c => (c || '').length > 0))
    .map(r => '| ' + r.map(c => (c || '').replace(/\n/g, ' ').replace(/\r/g, '').trim()).join(' | ') + ' |')
    .join('\n');
}

// Cache of Last-Modified header values per fileId, captured from CSV export responses.
// The Last-Modified header is in the CORS safe-list, so it's accessible cross-origin.
const _sheetLastModified = {};

async function fetchSheetTab(fileId, gid) {
  const base = `https://docs.google.com/spreadsheets/d/${fileId}/export?format=csv`;
  const url  = gid != null ? `${base}&gid=${gid}` : base;
  const r = await fetch(url, { credentials: 'omit' });
  if (!r.ok) throw new Error(`HTTP ${r.status} fetching ${fileId}${gid != null ? ' tab ' + gid : ''} — make sure the sheet is shared "Anyone with link → Viewer".`);
  // Capture Last-Modified from CDN response (reflects actual sheet edit time)
  if (!_sheetLastModified[fileId]) {
    const lm = r.headers.get('last-modified');
    if (lm) _sheetLastModified[fileId] = lm;
  }
  const csv = await r.text();
  return csvToPipeRows(csv);
}

function formatIstTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleString('en-IN', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: true,
    });
  } catch { return '—'; }
}
function splitTableRows(md) {
  return md.split('\n').map(l => l.trim())
    .filter(l => l && l.startsWith('|') && !/^\|[\s:|\-]+\|$/.test(l));
}
function parseRow(line) {
  return line.split('|').slice(1, -1).map(c => c.trim());
}

// Tendering: simple tabular
function parseTendering(md) {
  const lines = splitTableRows(md);
  if (lines.length < 2) return [];
  const headers = parseRow(lines[0]);
  const idx = (n) => headers.findIndex(h => h.toLowerCase().includes(n.toLowerCase()));
  const iProj = idx('project'),  iLoc  = idx('location'), iPts  = idx('points'),
        iSt   = idx('status'),   iVen  = idx('vendor'),   iAuth = idx('approval'),
        iRem  = idx('remarks');
  return lines.slice(1).map((line, i) => {
    const c = parseRow(line);
    const rawStatus = (c[iSt]||'').toLowerCase().replace(/\s+/g,'');
    return {
      n:         i + 1,
      project:   (c[iProj] ||'').trim(),
      location:  (c[iLoc]  ||'').trim(),
      scope:     (c[iPts]  ||'').trim(),
      authority: (c[iAuth] ||'').trim(),
      vendor:    (c[iVen]  ||'').trim(),
      remark:    (c[iRem]  ||'').trim(),
      status:    rawStatus === 'done' ? 'done' : 'pending', // inprogress merged into pending
    };
  }).filter(r => r.scope || r.location); // drop blank rows
}

// Interior Labour: 9 trades × 10 contractors matrix + TOTAL/REQUIRED rows
// Sheet structure (direct CSV fetch):
//   Row 0: "DAILY MANPOWER REPORT" | date | (empty…)   ← merged title/date row
//   Row 1: S.NO | CONTRACTOR'S NAME | HOI | VD | SH … ← real header with contractor names
//   Row 2+: 1 | trade name | count | count …           ← data rows
//   Row N: TOTAL | - | 173 | 8 …
//   Row N+1: REQUIRED | - | 170 | 15 …
function parseInteriorLabour(md) {
  const lines = splitTableRows(md);
  if (lines.length < 3) return { contractors: [], trades: [], reportDate: '' };

  // Extract report date from title row (Row 0: "DAILY MANPOWER REPORT" | date | ...)
  let reportDate = '';
  const titleCells = parseRow(lines[0]);
  for (const cell of titleCells) {
    const t = (cell || '').trim();
    if (t && /\d{1,2}[-\/]\w+/.test(t) && !/REPORT|MANPOWER/i.test(t)) {
      reportDate = t; break;
    }
  }

  // Find the real header row — the one whose col[0] looks like "S.NO" / "S NO"
  // or whose col[1] contains "CONTRACTOR". Falls back to row 0.
  let headerRowIdx = 0;
  for (let i = 0; i < Math.min(lines.length, 6); i++) {
    const c = parseRow(lines[i]);
    const col0 = (c[0] || '').toUpperCase().replace(/[\s.]/g, '');
    const col1 = (c[1] || '').toUpperCase();
    if (col0 === 'SNO' || col0 === 'SRNO' || col1.includes('CONTRACTOR')) {
      headerRowIdx = i;
      break;
    }
  }

  const headers = parseRow(lines[headerRowIdx]);
  // Contractor names are in cols 2 onwards. Strip any date-like prefixes
  // (e.g. "22/05/26" → keep as-is if no slash gives a useful name, else
  // take the last segment after the last slash).
  const stripSection = (h) => {
    const s = (h || '').trim();
    if (!s) return s;
    const k = s.lastIndexOf('/');
    if (k < 0) return s;
    const after = s.slice(k + 1).trim();
    // If the part after the slash is purely numeric (a date fragment), return the whole string
    return /^\d+$/.test(after) ? s : after;
  };
  const contractorNames = headers.slice(2).map(stripSection);

  const trades = [];
  let totals = null, required = null;
  for (let i = headerRowIdx + 1; i < lines.length; i++) {
    const c = parseRow(lines[i]);
    const first = (c[0] || '').toUpperCase();
    if (first.includes('TOTAL')) {
      totals = c.slice(2).map(v => parseInt(v) || 0);
    } else if (first.includes('REQUIRED')) {
      required = c.slice(2).map(v => parseInt(v) || 0);
    } else if (c[1] && !isNaN(parseInt(c[0]))) {
      const tradeName = c[1].trim();
      const perContractor = c.slice(2).map(v => parseInt(v) || 0);
      trades.push({ name: tradeName, byContractor: perContractor, total: perContractor.reduce((s,n)=>s+n,0) });
    }
  }
  const contractors = contractorNames
    .map((name, ci) => ({
      name: (name || '').trim(),
      present:   totals   ? (totals[ci]   || 0) : 0,
      committed: required ? (required[ci] || 0) : 0,
      trades: trades.reduce((acc, t) => { acc[t.name] = t.byContractor[ci] || 0; return acc; }, {}),
    }))
    .filter(c => c.name); // drop blank-name columns (empty trailing cells)
  return { contractors, trades, reportDate };
}

// MEP Manpower: simple 4-column daily sheet.
//   Columns: Contractor Type | Contractor Name | Committed | Today's Manpower
// Each row = one MEP contractor. Contractor Type is one of
//   ELECTRICAL / FIRE FIGHTING / PLUMBING / Mechanical (case-insensitive).
function parseMEPLabour(md) {
  const lines = splitTableRows(md);
  if (lines.length < 2) return [];
  // Try to extract a report date from the first row if it looks like a title (not a header)
  let _mepReportDate = '';
  const firstCells = parseRow(lines[0]);
  const looksLikeTitle = !firstCells.some(h => /contractor\s*(type|name)|committed|manpower/i.test(h||''));
  if (looksLikeTitle) {
    for (const cell of firstCells) {
      const t = (cell || '').trim();
      if (t && /\d{1,2}[-\/]\w+/.test(t)) { _mepReportDate = t; break; }
    }
  }
  const headers = parseRow(looksLikeTitle ? lines[1] || lines[0] : lines[0]).map(h => (h||'').toLowerCase().trim());
  const startIdx = looksLikeTitle ? 2 : 1;
  const findIdx = (re, fallback) => {
    const i = headers.findIndex(h => re.test(h));
    return i >= 0 ? i : fallback;
  };
  const iType = findIdx(/^contractor\s*type$/, 0);
  const iName = findIdx(/^contractor\s*name$/, 1);
  const iCom  = findIdx(/committed/, 2);
  const iTot  = findIdx(/manpower|today/, 3);
  const out = [];
  out._reportDate = _mepReportDate; // attach so caller can read it
  for (let i = startIdx; i < lines.length; i++) {
    const c = parseRow(lines[i]);
    const type = (c[iType] || '').trim();
    const name = (c[iName] || '').trim();
    if (!type || !name) continue;
    out.push({
      type,
      vendor:    name,
      activity:  type,
      person:    '',
      committed: parseInt((c[iCom] || '').trim()) || 0,
      present:   parseInt((c[iTot] || '').trim()) || 0,
      remarks:   '',
    });
  }
  return out;
}
function mepTypeMatchesSub(type, sub) {
  const t = (type || '').toUpperCase().trim();
  if (sub === 'mechanical') return /MECH/.test(t);
  if (sub === 'plumbing')   return /PLUMB/.test(t);
  if (sub === 'electrical') return /ELEC/.test(t);
  if (sub === 'fire')       return /FIRE/.test(t);
  return false;
}



// Facade Labour: simple 5-column DPR sheet (FACADE DPR REPORT).
//   Columns: S NO. | ACTIVITIES | VENDOR | Committed | Total
// Each row = one vendor. Committed = expected headcount, Total = actual present.
function parseFacadeLabour(md) {
  const lines = splitTableRows(md);
  if (lines.length < 2) return { vendors: [] };

  // Find the real header row — the sheet has a title row (e.g. "HLR-77 REGALIA … 28-May")
  // before the actual column headers, so scan up to the first 5 rows for ACTIVITIES + VENDOR.
  let headerRowIdx = -1;
  let iAct = -1, iVen = -1, iCom = -1, iTot = -1, iRem = -1;
  for (let r = 0; r < Math.min(lines.length, 6); r++) {
    const h = parseRow(lines[r]).map(c => (c||'').toUpperCase().trim());
    const act = h.findIndex(x => x === 'ACTIVITIES' || x.endsWith('/ACTIVITIES'));
    const ven = h.findIndex(x => x === 'VENDOR'     || x.endsWith('/VENDOR'));
    if (act >= 0 && ven >= 0) {
      headerRowIdx = r;
      iAct = act;
      iVen = ven;
      iCom = h.findIndex(x => /COMMIT/.test(x));
      iTot = h.findIndex(x => x === 'TOTAL' || x.endsWith('/TOTAL'));
      iRem = h.findIndex(x => /REMARK/.test(x));
      break;
    }
  }
  if (headerRowIdx < 0) return { vendors: [] };

  // Also capture the report date from the title row if present (row before header)
  let reportDate = '';
  if (headerRowIdx > 0) {
    const titleRow = parseRow(lines[headerRowIdx - 1]);
    const dateCell = titleRow.find(c => /\d{1,2}[-\/]\w+/.test(c||''));
    if (dateCell) reportDate = dateCell.trim();
  }

  const vendors = [];
  for (let i = headerRowIdx + 1; i < lines.length; i++) {
    const c = parseRow(lines[i]);
    const vendor = (c[iVen] || '').trim();
    if (!vendor) continue;
    // Skip summary/total rows (vendor cell looks like a number-only string or "TOTAL")
    if (/^total$/i.test(vendor) || /^\d+$/.test(vendor)) continue;
    const activity  = (c[iAct] || '').trim();
    const present   = parseInt((iTot >= 0 ? c[iTot] : '') || '0') || 0;
    const committed = parseInt((iCom >= 0 ? c[iCom] : '') || '0') || 0;
    const remarks   = iRem >= 0 ? (c[iRem] || '').trim() : '';
    vendors.push({ vendor, activity, person:'', present, committed, remarks, reportDate });
  }
  return { vendors, reportDate };
}

// Waterproofing: 6 tower blocks. For each row (flat × area), classify status from booleans.
function parseWaterproof(md) {
  const lines = splitTableRows(md);
  const items = [];
  let curTower = null;
  let curFloor = '', curFlat = '';
  let id = 0;
  // Stage column indices found dynamically per tower header.
  let stageIdx = []; // indices of the 9 boolean stage columns
  let iFloor = 0, iFlat = 1, iArea = 2, iRem = -1;
  for (const line of lines) {
    const c = parseRow(line);
    const first = (c[0]||'').toUpperCase();
    // Detect new tower-block header row
    const towerMatch = first.match(/TOWER\s*(\d)/);
    if (towerMatch) {
      curTower = 'T' + towerMatch[1];
      // Recompute column indices from this header
      stageIdx = [];
      c.forEach((h, k) => {
        const u = (h||'').toUpperCase();
        if (u.includes('CLEANING') || u.includes('REPAIR') || u.includes('GOLA') ||
            u.includes('PRIMER') || u.includes('1ST COAT') || u.includes('2ND COAT') ||
            u.includes('TESTING') || u.includes('PLASTER') || u.includes('PCC')) {
          stageIdx.push(k);
        }
        if (u.includes('REMARKS')) iRem = k;
      });
      continue;
    }
    if (!curTower) continue;
    // Forward-fill floor and flat
    if (c[iFloor]) curFloor = c[iFloor];
    if (c[iFlat])  curFlat  = c[iFlat];
    const area = (c[iArea]||'').trim();
    if (!area) continue;
    // Compute stage statuses
    const states = stageIdx.map(k => (c[k]||'').toUpperCase().trim());
    if (states.length === 0) continue;
    const trueCount = states.filter(s => s === 'TRUE').length;
    const falseCount = states.filter(s => s === 'FALSE').length;
    const remark = (c[iRem]||'').trim();
    let status;
    if (trueCount === states.length) status = 'done';
    else if (falseCount === states.length && !remark) status = 'pending';
    else status = 'delay';
    items.push({
      n: ++id,
      tower:  curTower,
      area:   `${curTower} – F${curFloor} / ${curFlat} – ${area}`,
      scope:  states.map((s,k)=>`${(headersWP[stageIdx[k]]||'').toUpperCase()}: ${s}`).join(' · '),
      status, remark,
      stages: stageIdx.map((k,j) => ({ name: (headersWP[k]||'').toUpperCase(), state: states[j] })),
    });
  }
  return items;
}
let headersWP = []; // captured by parseWaterproof on first header line

// More robust waterproof parser using captured headers
function parseWaterproofV2(md) {
  const lines = splitTableRows(md);
  const items = [];
  let curTower = null, curFloor = '', curFlat = '';
  let stageIdx = [], stageNames = [];
  let iFloor = 0, iFlat = 1, iArea = 2, iRem = -1;
  for (const line of lines) {
    const c = parseRow(line);
    const first = (c[0]||'').toUpperCase();
    const towerMatch = first.match(/TOWER\s*(\d)/);
    if (towerMatch) {
      curTower = 'T' + towerMatch[1];
      stageIdx = []; stageNames = [];
      c.forEach((h, k) => {
        const u = (h||'').toUpperCase();
        if (/(CLEANING|REPAIR|GOLA|PRIMER|1ST COAT|2ND COAT|TESTING|PLASTER|PCC)/.test(u)) {
          stageIdx.push(k);
          stageNames.push(u.replace(/.*\//,'').trim());
        }
        if (u.includes('REMARKS')) iRem = k;
      });
      curFloor = ''; curFlat = '';
      continue;
    }
    if (!curTower || stageIdx.length === 0) continue;
    if (c[iFloor]) curFloor = c[iFloor];
    if (c[iFlat])  curFlat  = c[iFlat];
    const area = (c[iArea]||'').trim();
    if (!area) continue;
    const states = stageIdx.map(k => (c[k]||'').toUpperCase().trim());
    const trueCount = states.filter(s => s === 'TRUE').length;
    const falseCount = states.filter(s => s === 'FALSE').length;
    const remark = (c[iRem]||'').trim();
    let status;
    if (trueCount === states.length) status = 'done';
    else if (falseCount === states.length && !remark) status = 'pending';
    else status = 'delay';
    items.push({
      tower: curTower,
      flat: `${curFloor} / ${curFlat}`,
      area,
      label: `${curTower} – Flr ${curFloor} · Flat ${curFlat} · ${area}`,
      states, stageNames,
      done: trueCount, total: states.length,
      status, remark,
    });
  }
  return items;
}

// ─── SPANDREL GLAZING ─────────────────────────────────────
// Custom parser for the Spandrel Glazing sheet (3 tabs: Tower 1, Tower 5, Tower 6).
// Done = "Glass installation" column is TRUE (T1) or "Sprandle panel and Glass installation" (T5/T6)
// Remark when DONE    = Side flashing and smoke seal column value
// Remark when PENDING = HOD / Remarks column (reason for pending)
// GIDs confirmed: Tower 1 = default tab (first), Tower 5 = 1293627169, Tower 6 = 1657055676

function parseSpandrelTabCsv(csv, towerLabel) {
  if (!csv || csv.trim().length < 30) return [];
  // Parse CSV → 2D rows
  const rows = [];
  let cur = [], field = '', inQ = false;
  for (let i = 0; i <= csv.length; i++) {
    const ch = i < csv.length ? csv[i] : '\n';
    if (inQ) {
      if (ch === '"' && csv[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') inQ = false;
      else field += ch;
    } else {
      if (ch === ',') { cur.push(field.trim()); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && csv[i+1] === '\n') i++;
        cur.push(field.trim()); field = '';
        if (cur.some(f => f)) rows.push(cur);
        cur = [];
      }
      else if (ch === '"') inQ = true;
      else field += ch;
    }
  }
  if (rows.length < 2) return [];

  // Locate header row (must contain FLOOR or FLAT)
  let hIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 6); i++) {
    const h = rows[i].map(c => (c||'').toUpperCase());
    if (h.some(c => c.includes('FLOOR') || c.includes('FLAT'))) { hIdx = i; break; }
  }
  if (hIdx < 0) return [];

  const H = rows[hIdx].map(c => (c||'').toUpperCase().trim());

  const iFloor      = H.findIndex(h => h.includes('FLOOR'));
  const iFlat       = H.findIndex((h,i) => (h.includes('FLAT') || h === 'FLAT NO.' || h === 'FLAT NO') && i !== iFloor);
  // Glass installation: T5/T6 have combined "SPRANDLE...GLASS"; T1 has separate "GLASS INSTALLATION"
  const iCombined   = H.findIndex(h => h.includes('SPRANDLE') && h.includes('GLASS'));
  const iGlassOnly  = H.findIndex(h => h.includes('GLASS') && h.includes('INSTALL') && !h.includes('SPRANDLE') && !h.includes('RECEIV'));
  // Resolve: use combined for T5/T6, glass-install for T1
  const iGlassDone  = iCombined >= 0 ? iCombined : iGlassOnly;
  // Side flashing and smoke seal (shown in remark when flat is done)
  const iSideFlash  = H.findIndex(h => h.includes('SIDE') && (h.includes('FLASH') || h.includes('SMOKE')));
  // Pending reason (HOD / Remarks)
  const iRem        = H.findIndex(h => h.includes('REMARK') || h === 'HOD');

  const isDoneVal = v => { const u=(v||'').trim().toUpperCase(); return u==='TRUE'||u==='1'||u==='YES'||u==='DONE'||u==='✓'; };
  const fmtBool   = v => { const u=(v||'').trim().toUpperCase(); if(!u) return '—'; return isDoneVal(v)?'Done':'Pending'; };

  const items = [];
  let curFloor = '';
  for (let i = hIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    if (iFloor >= 0 && (row[iFloor]||'').trim()) curFloor = row[iFloor].trim();
    const flatNo = (iFlat >= 0 ? row[iFlat] || '' : '').trim();
    if (!flatNo) continue;
    const label = curFloor ? `F${curFloor} – ${flatNo}` : flatNo;

    if (iGlassDone < 0) continue; // can't determine status without the key column
    const glassDone = isDoneVal(row[iGlassDone]);
    const anyVal    = (row[iGlassDone]||'').trim() !== '';
    const status    = glassDone ? 'done' : anyVal ? 'delay' : 'pending';

    let remark = '';
    if (glassDone) {
      // Show side flashing status in remark
      if (iSideFlash >= 0) {
        const sfVal = (row[iSideFlash]||'').trim();
        remark = sfVal ? `Side flash: ${fmtBool(sfVal)}` : '';
      }
    } else {
      // Show reason why pending
      remark = iRem >= 0 ? (row[iRem]||'').trim() : '';
    }

    items.push({ contractor:'Spandrel Glazing', tower: towerLabel, label,
      done: glassDone ? 1 : 0, total: 1, status, remark });
  }
  return items;
}

async function loadSpandrelGlazing(fileId) {
  const all = [];
  // Tower 1: default/first tab (no GID param)
  // Tower 5: GID 1293627169
  // Tower 6: GID 1657055676
  const tabs = [
    { gid: null,       tower: 'T1' },
    { gid: 1293627169, tower: 'T5' },
    { gid: 1657055676, tower: 'T6' },
  ];
  const results = await Promise.all(tabs.map(async ({ gid, tower }) => {
    try {
      const csv = await fetchSheetTabRaw(fileId, gid);
      return parseSpandrelTabCsv(csv, tower);
    } catch { return []; }
  }));
  results.forEach(r => all.push(...r));
  return all;
}

// ─── GRC EXECUTION ────────────────────────────────────────
// Custom per-tower parser for the GRC sheet (6 tabs: Tower-01 … Tower-06).
// Key columns detected dynamically: GRC Installation (various headings per tower),
// GRC Plaster, GRC Mesh Installation, GRC Final Checking.
// Status:  done  = GRC Final Checking TRUE
//          delay = any GRC work done but Final not yet checked
//          pending = nothing started
// GIDs: T1=598820856, T2=33284386, T3=1519503501,
//       T4=472680717, T5=1532291845, T6=1744511062

function parseGRCTabCsv(csv, towerLabel) {
  if (!csv || csv.trim().length < 30) return [];
  // ── CSV → 2D rows ──────────────────────────────────────────
  const rows = [];
  let cur = [], field = '', inQ = false;
  for (let i = 0; i <= csv.length; i++) {
    const ch = i < csv.length ? csv[i] : '\n';
    if (inQ) {
      if (ch === '"' && csv[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') inQ = false;
      else field += ch;
    } else {
      if (ch === ',') { cur.push(field.trim()); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && csv[i+1] === '\n') i++;
        cur.push(field.trim()); field = '';
        if (cur.some(f => f)) rows.push(cur);
        cur = [];
      } else if (ch === '"') inQ = true;
      else field += ch;
    }
  }
  if (rows.length < 2) return [];

  // ── Locate header row: must contain FLOOR and GRC ──────────
  let hIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 8); i++) {
    const h = rows[i].map(c => (c||'').toUpperCase());
    if (h.some(c => /FLOOR/.test(c)) && h.some(c => c.includes('GRC'))) { hIdx = i; break; }
  }
  if (hIdx < 0) return [];
  const H = rows[hIdx].map(c => (c||'').toUpperCase().trim());

  // ── Column indices ──────────────────────────────────────────
  const iContractor = H.findIndex(h => h.includes('CONTRACT'));
  const iMesh    = H.findIndex(h => h.includes('GRC') && h.includes('MESH'));
  const iFinal   = H.findIndex(h => h.includes('GRC') && (h.includes('FINAL') || h.includes('CHECK')));
  const iPlaster = H.findIndex(h => h.includes('GRC') && h.includes('PLASTER'));

  // Sub-header row: area names can sit ABOVE the header (some towers) or BELOW it (T6).
  // Detect T6 pattern: row after header has meaningful text in GRC columns (not TRUE/FALSE/floor).
  const rowAbove = hIdx > 0 ? rows[hIdx - 1].map(c => (c||'').trim()) : [];
  const rowBelow = hIdx + 1 < rows.length ? rows[hIdx + 1].map(c => (c||'').trim()) : [];
  const belowHasAreas = rowBelow.some((v, k) =>
    H[k] && H[k].includes('GRC') && v && v.length > 3 &&
    !/^(TRUE|FALSE)$/i.test(v) && !/\d+\s*(ST|ND|RD|TH)?\s*FLOOR/i.test(v)
  );
  const subHeaderRow = belowHasAreas ? rowBelow : rowAbove;
  // When area names row is below the header, skip it when iterating floor data
  const dataStartIdx = belowHasAreas ? hIdx + 2 : hIdx + 1;

  // Helper: clean a raw cell string into a display-friendly area name
  function cleanAreaName(raw) {
    return raw
      .replace(/([a-z])([A-Z])/g, '$1 $2')  // split camelCase (e.g. KothiSideStaircase)
      .replace(/[\-\/]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  // Helper: derive a human-readable side/area name from header text + sub-header fallback
  function extractSide(headerText, colIdx, fallbackIdx) {
    // 1. Try to pull area name from the column header itself (T1-T5 pattern)
    //    e.g. "GRC INSTALLATION - OVAL CAFE SIDE SHAFT" → "Oval Cafe Side Shaft"
    let s = headerText
      .replace(/GRC\s*INSTALLATION/g, '')
      .replace(/^GRC\s*/g, '')
      .replace(/[\-\/]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
    if (s) s = s.replace(/\w+/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());

    // 2. If header gave nothing (standalone "GRC"), scan the sub-header row leftward from colIdx.
    //    T6 uses merged cells so the area name sits in the LEFTMOST cell of the merge;
    //    the actual GRC checkbox column is often one or more cells to the right (empty in sub-header).
    if (!s && subHeaderRow.length > 0) {
      for (let j = colIdx; j >= 0; j--) {
        const v = (subHeaderRow[j] || '').trim();
        if (v.length > 2 && !/^(AREA\s*NAMES?|S\.?\s*NO\.?|FLOOR|CONTRACT|TOWER|HOMELAND)/i.test(v)) {
          s = cleanAreaName(v);
          break;
        }
      }
    }

    if (!s) s = `Area ${fallbackIdx + 1}`;
    return s;
  }

  // ── Build grcCols: one entry per GRC Installation column ───
  let fallbackN = 0;
  const grcCols = H.reduce((acc, h, k) => {
    if (!h.includes('GRC')) return acc;
    if (k === iMesh || k === iFinal || k === iPlaster) return acc;
    acc.push({ idx: k, side: extractSide(h, k, fallbackN++) });
    return acc;
  }, []);

  if (grcCols.length === 0) return [];

  // ── Group rows by floor ─────────────────────────────────────
  const floorGroups = [];
  let cur2 = null;
  for (let i = dataStartIdx; i < rows.length; i++) {
    const row = rows[i];
    const c0  = (row[0]||'').trim();
    if (/\d+\s*floor/i.test(c0)) {
      if (cur2) floorGroups.push(cur2);
      cur2 = { label: c0, contractor: (iContractor >= 0 ? (row[iContractor]||'').trim() : ''), rows: [row] };
    } else if (cur2 && (!c0 || /^(front|back|side)$/i.test(c0))) {
      if (!cur2.contractor && iContractor >= 0) { const v=(row[iContractor]||'').trim(); if(v) cur2.contractor=v; }
      cur2.rows.push(row);
    }
  }
  if (cur2) floorGroups.push(cur2);

  // ── Build items: one per floor per GRC Installation column ──
  const items = [];
  for (const g of floorGroups) {
    for (const col of grcCols) {
      const colVals = g.rows.map(r => (r[col.idx]||'').toUpperCase().trim());
      const isDone  = colVals.some(v => v === 'TRUE');
      const hasNote = colVals.find(v => v && v !== 'TRUE' && v !== 'FALSE');
      let status, remark;
      if (isDone)        { status = 'done';    remark = ''; }
      else if (hasNote)  { status = 'delay';   remark = hasNote; }
      else               { status = 'pending'; remark = ''; }
      items.push({
        contractor: g.contractor || 'GRC',
        tower:  towerLabel,
        side:   col.side,
        label:  `${towerLabel} – ${g.label}`,
        done:   isDone ? 1 : 0, total: 1, status, remark,
        stageNames: ['GRC Install'],
        states: [isDone ? 'TRUE' : (hasNote || 'FALSE')],
      });
    }
  }
  return items;
}

// ─── Glass Railing parser ───────────────────────────────────────────────────
// Dedicated per-tower loader (mirrors loadGRCExecution) so each tower tab is
// fetched with an explicit GID and tagged directly — no flat-label inference needed.
// Tracks 3 key stages per flat: Granite Fixing (both sides), Channel, Railing/Glass installation.
function parseGlassRailingTab(csv, towerLabel) {
  // Parse raw CSV into row arrays
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i <= csv.length; i++) {
    const ch = i < csv.length ? csv[i] : '\n';
    if (inQ) {
      if (ch === '"' && csv[i + 1] === '"') { field += '"'; i++; }
      else if (ch === '"') inQ = false;
      else field += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && csv[i + 1] === '\n') i++;
        row.push(field.trim());
        if (row.some(c => c)) rows.push(row);
        row = []; field = '';
      } else field += ch;
    }
  }
  if (field || row.length) { row.push(field.trim()); if (row.some(c => c)) rows.push(row); }
  if (rows.length < 2) return [];

  // Find header row (must have both FLOOR and FLAT)
  let hIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 6); i++) {
    const u = rows[i].map(c => (c || '').toUpperCase());
    if (u.some(h => h.includes('FLOOR')) && u.some(h => h.includes('FLAT'))) { hIdx = i; break; }
  }
  if (hIdx < 0) return [];

  const H = rows[hIdx].map(c => (c || '').toUpperCase().trim());
  const iFloor = H.findIndex(h => h.includes('FLOOR'));
  const iFlat  = H.findIndex(h => h.includes('FLAT') && !h.includes('FLOOR'));

  // Collect column indices for the 3 key stage groups
  const graniteIdxs = H.reduce((a, h, k) => { if (h.includes('GRANITE')) a.push(k); return a; }, []);
  const iChannel    = H.findIndex(h => h.includes('CHANNEL'));
  // Railing/Glass installation — avoid picking up "Railing sizes to vendor"
  const iRailing    = H.findIndex(h => (h.includes('RAILING') || h.includes('GLASS')) && h.includes('INSTALL'));
  const iHOD        = H.findIndex(h => h === 'HOD');

  function cellStat(val) {
    const v = (val || '').trim().toUpperCase();
    if (v === 'TRUE')  return 'done';
    if (v === '' || v === 'FALSE') return 'pending';
    return 'delay'; // broken, Repair, HOLD, rectification, pending, etc.
  }
  function graniteShortName(h) {
    if (h.includes('FRONT') || h.includes('OVAL CAFE')) return 'Granite (Front/Oval)';
    if (h.includes('REAR')  || h.includes('KOTHI') || h.includes('B.R') || h.includes('RAMP')) return 'Granite (Rear/Kothi)';
    return 'Granite';
  }

  const items = [];
  let curFloor = '', curFlat = '';

  for (let i = hIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row.some(c => c)) continue;
    const f0 = (row[iFloor] || '').trim();
    const f1 = (row[iFlat]  || '').trim();
    if (f0) curFloor = f0;
    if (f1) curFlat  = f1;
    if (!curFlat) continue;
    // Skip aggregate/summary rows that have no proper flat label
    if (!/\d/.test(curFlat)) continue;

    // Build named stage breakdown
    const breakdown = [];
    graniteIdxs.forEach(k => {
      breakdown.push({
        shortName: graniteShortName(H[k]),
        status: cellStat(row[k]),
        raw: (row[k] || '').trim(),
      });
    });
    if (iChannel >= 0) {
      breakdown.push({ shortName: 'Channel', status: cellStat(row[iChannel]), raw: (row[iChannel] || '').trim() });
    }
    if (iRailing >= 0) {
      breakdown.push({ shortName: 'Railing/Glass', status: cellStat(row[iRailing]), raw: (row[iRailing] || '').trim() });
    }
    // HOD intentionally excluded from reports
    if (breakdown.length === 0) continue;

    // Railing-delayed rule: if all prerequisite stages (granite + channel) are done

    const railingEntry  = breakdown.find(s => s.shortName === 'Railing/Glass');
    const prereqEntries = breakdown.filter(s => s.shortName !== 'Railing/Glass');
    if (railingEntry && railingEntry.status === 'pending' &&
        prereqEntries.length > 0 && prereqEntries.every(s => s.status === 'done')) {
      railingEntry.status = 'delay';
      railingEntry.raw    = 'Railing pending (granite & plaster done)';
    }

    const doneCount  = breakdown.filter(s => s.status === 'done').length;
    const delayCount = breakdown.filter(s => s.status === 'delay').length;
    let status;
    if (doneCount === breakdown.length)              status = 'done';
    else if (doneCount === 0 && delayCount === 0)    status = 'pending';
    else                                              status = 'delay';

    const remark = breakdown.filter(s => s.status === 'delay').map(s => `${s.shortName}: ${s.raw}`).join('; ');

    items.push({
      contractor: 'Glass Railing',
      tower: towerLabel,
      label: `Fl ${curFloor} · ${curFlat}`,
      done: doneCount, total: breakdown.length,
      status, remark,
      stageNames: breakdown.map(s => s.shortName),
      states: breakdown.map(s => s.status === 'done' ? 'TRUE' : s.status === 'delay' ? s.raw : 'FALSE'),
      stageBreakdown: breakdown,
    });
  }
  return items;
}

// ─── Shared date-aware cell status helper ───────────────────────────────────
// Returns 'done' | 'pending' | 'delay' for a stage cell value.
// Future scheduled dates → pending. Past dates or blocking notes → delay.
function _stageCellStat(v) {
  const u = (v || '').trim().toUpperCase();
  if (u === 'TRUE')  return 'done';
  if (u === '' || u === 'FALSE') return 'pending';
  const MONTHS = { jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11 };
  const raw = (v || '').trim();
  const dm = raw.match(/^(\d{1,2})[-\s]([a-zA-Z]+)(?:[-\s](\d{2,4}))?$/);
  if (dm) {
    const mon = MONTHS[(dm[2]||'').slice(0,3).toLowerCase()];
    if (mon !== undefined) {
      const yr = dm[3] ? (dm[3].length===2 ? 2000+parseInt(dm[3]) : parseInt(dm[3])) : new Date().getFullYear();
      const dt = new Date(yr, mon, parseInt(dm[1]));
      dt.setHours(0,0,0,0);
      const today = new Date(); today.setHours(0,0,0,0);
      return dt >= today ? 'pending' : 'delay';
    }
  }
  return 'delay'; // text notes/remarks → delay
}

// ─── FHC Lacquered Door — per-tower parser ──────────────────────────────────
// Tracks 3 key stages per floor: Granite Fixing, Final Sizes, Door Installation.
// Each floor has 2–3 unit rows; stages are aggregated across all units in a floor.
function parseFHCDoorTab(csv, towerLabel) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i <= csv.length; i++) {
    const ch = i < csv.length ? csv[i] : '\n';
    if (inQ) {
      if (ch === '"' && csv[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') inQ = false;
      else field += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && csv[i+1] === '\n') i++;
        row.push(field.trim());
        if (row.some(c => c)) rows.push(row);
        row = []; field = '';
      } else field += ch;
    }
  }
  if (field || row.length) { row.push(field.trim()); if (row.some(c => c)) rows.push(row); }

  // Find header row (contains FLOOR and at least one stage keyword)
  let hIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 6); i++) {
    const u = rows[i].map(c => (c||'').toUpperCase());
    if (u.some(h => h.includes('FLOOR')) && u.some(h => h.includes('DOOR') || h.includes('GRANITE') || h.includes('FINAL'))) {
      hIdx = i; break;
    }
  }
  if (hIdx < 0) return [];

  const H = rows[hIdx].map(c => (c||'').toUpperCase().trim());
  const iFloor   = H.findIndex(h => h.includes('FLOOR'));
  const iGranite = H.findIndex(h => h.includes('GRANITE'));
  const iFinal   = H.findIndex(h => h.includes('FINAL'));
  const iDoor    = H.findIndex(h => h.includes('DOOR') && h.includes('INSTALL'));

  const stageIdxs = [
    { idx: iGranite, name: 'Granite Fixing' },
    { idx: iFinal,   name: 'Final Sizes'    },
    { idx: iDoor,    name: 'Door Install'   },
  ].filter(s => s.idx >= 0);

  if (stageIdxs.length === 0) return [];

  const cellStat = _stageCellStat;

  // Group rows by floor label
  const floorGroups = [];
  let cur = null;
  for (let i = hIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const f0 = (r[iFloor >= 0 ? iFloor : 0] || '').trim();
    if (/\d+\s*(floor|fl\.?)/i.test(f0)) {
      if (cur) floorGroups.push(cur);
      cur = { label: f0.replace(/\s*(floor|fl\.?)/i, ' Floor').trim(), rows: [r] };
    } else if (cur && r.some(c => c)) {
      cur.rows.push(r);
    }
  }
  if (cur) floorGroups.push(cur);

  const items = [];
  for (const g of floorGroups) {
    // Per-stage: aggregate all units in this floor
    const stages = stageIdxs.map(({ idx, name }) => {
      const vals = g.rows.map(r => cellStat(r[idx] || ''));
      const done  = vals.filter(v => v === 'done').length;
      const delay = vals.filter(v => v === 'delay').length;
      const raw   = g.rows.map(r => (r[idx]||'').trim()).find(v => v && v.toUpperCase() !== 'TRUE' && v.toUpperCase() !== 'FALSE') || '';
      let status;
      if (done === vals.length)            status = 'done';
      else if (done > 0 || delay > 0)      status = 'delay';
      else                                 status = 'pending';
      return { shortName: name, status, raw };
    });

    const doneCount  = stages.filter(s => s.status === 'done').length;
    const delayCount = stages.filter(s => s.status === 'delay').length;
    let status;
    if (doneCount === stages.length)             status = 'done';
    else if (doneCount === 0 && delayCount === 0) status = 'pending';
    else                                          status = 'delay';

    const remark = stages.filter(s => s.status !== 'done')
      .map(s => s.status === 'delay' && s.raw ? `${s.shortName} (${s.raw})` : s.shortName)
      .join(', ');

    items.push({
      contractor: 'FHC Lacquered Door',
      tower: towerLabel,
      label: g.label,
      done: doneCount, total: stages.length,
      status, remark,
      stageNames: stages.map(s => s.shortName),
      states: stages.map(s => s.status === 'done' ? 'TRUE' : 'FALSE'),
      stageBreakdown: stages,
    });
  }
  return items;
}

      label: g.label,
      done: doneCount, total: stages.length,
      status, remark,
      stageNames: stages.map(s => s.shortName),
      states: stages.map(s => s.status === 'done' ? 'TRUE' : 'FALSE'),
      stageBreakdown: stages,
    });
  }
  return items;
}

// ─── Staircase Railing — per-tower parser (T1–T6) ───────────────────────────
// Tracks 2 key stages per floor (RHS + LHS grouped):
//   1. Granite Fixing   (col: GRANITE FOR STAIRCASE RAILING)
//   2. MS Railing Instal. (col: MS railing installation)
// Uses _stageCellStat for date-awareness (past date → delay, future → pending).
// If Granite is done but MS Railing is still pending → promote to delay.
function parseStaircaseRailingTab(csv, towerLabel) {
  // ── CSV → 2D rows ────────────────────────────────────────────────────────
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i <= csv.length; i++) {
    const ch = i < csv.length ? csv[i] : '\n';
    if (inQ) {
      if (ch === '"' && csv[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') inQ = false;
      else field += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && csv[i+1] === '\n') i++;
        row.push(field.trim());
        if (row.some(c => c)) rows.push(row);
        row = []; field = '';
      } else field += ch;
    }
  }
  if (field || row.length) { row.push(field.trim()); if (row.some(c => c)) rows.push(row); }

  // ── Find header row — must have FLOOR and GRANITE or MS ──────────────────
  let hIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 6); i++) {
    const u = rows[i].map(c => (c||'').toUpperCase());
    if (u.some(h => h.includes('FLOOR')) &&
        u.some(h => h.includes('GRANITE') || h.includes('MS RAILING') || h.includes('RAILING INSTALL'))) {
      hIdx = i; break;
    }
  }
  if (hIdx < 0) return [];

  const H = rows[hIdx].map(c => (c||'').toUpperCase().trim());
  const iFloor   = H.findIndex(h => h.includes('FLOOR'));
  const iGranite = H.findIndex(h => h.includes('GRANITE'));
  const iMS      = H.findIndex(h => h.includes('MS') && h.includes('RAILING') || h.includes('RAILING INSTALL'));

  const stageIdxs = [
    { idx: iGranite, name: 'Granite Fixing'      },
    { idx: iMS,      name: 'MS Railing Instal.'  },
  ].filter(s => s.idx >= 0);

  if (stageIdxs.length === 0) return [];

  // ── Group data rows by floor ──────────────────────────────────────────────
  const floorGroups = [];
  let cur = null;
  for (let i = hIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const f0 = (r[iFloor >= 0 ? iFloor : 0] || '').trim();
    if (f0 && /^\d/.test(f0)) {
      if (cur) floorGroups.push(cur);
      cur = { label: /floor/i.test(f0) ? f0 : `Floor ${f0}`, rows: [r] };
    } else if (cur && r.some(c => c)) {
      cur.rows.push(r);
    }
  }
  if (cur) floorGroups.push(cur);

  // ── Build items — one per floor ───────────────────────────────────────────
  const items = [];
  for (const g of floorGroups) {
    const stages = stageIdxs.map(({ idx, name }) => {
      const vals = g.rows.map(r => _stageCellStat(r[idx] || ''));
      const done  = vals.filter(v => v === 'done').length;
      const delay = vals.filter(v => v === 'delay').length;
      // Capture any non-boolean raw text for the remark
      const raw = g.rows.map(r => (r[idx]||'').trim())
        .find(v => v && v.toUpperCase() !== 'TRUE' && v.toUpperCase() !== 'FALSE') || '';
      let status;
      if (done === vals.length)        status = 'done';
      else if (done > 0 || delay > 0)  status = 'delay';
      else                              status = 'pending';
      return { shortName: name, status, raw };
    });

    // Delay-promotion rule: if Granite is done but MS Railing is still pending,
    // the railing is overdue — mark it delayed.
    const granite = stages.find(s => s.shortName === 'Granite Fixing');
    const msRail  = stages.find(s => s.shortName === 'MS Railing Instal.');
    if (granite && msRail && granite.status === 'done' && msRail.status === 'pending') {
      msRail.status = 'delay';
      msRail.raw    = 'Pending after granite done';
    }

    const doneCount  = stages.filter(s => s.status === 'done').length;
    const delayCount = stages.filter(s => s.status === 'delay').length;
    let status;
    if (doneCount === stages.length)              status = 'done';
    else if (doneCount === 0 && delayCount === 0) status = 'pending';
    else                                           status = 'delay';

    const remark = stages.filter(s => s.status !== 'done' && s.raw)
      .map(s => `${s.shortName}: ${s.raw}`).join(', ');

    items.push({
      contractor: 'Staircase Railing',
      tower: towerLabel,
      label: g.label,
      done: doneCount, total: stages.length,
      status, remark,
      stageNames: stages.map(s => s.shortName),
      states: stages.map(s => s.status === 'done' ? 'TRUE' : 'FALSE'),
      stageBreakdown: stages,
    });
  }
  return items;
}
