// ─── VANITY ───────────────────────────────────────────────
// Per-flat column tracker, one tab per tower. Columns vary by tower, so the
// report columns are detected from each tab's header row by name; a column's
// filter is only shown for towers that actually have it.
const VANITY_COLS = [
  { key:'vanity', label:'Vanity on Site', match:/vanity\s*on\s*site/i },
  { key:'t1',     label:'Toilet 1',       match:/toilet\s*1/i },
  { key:'t2',     label:'Toilet 2',       match:/toilet\s*2/i },
  { key:'t3',     label:'Toilet 3',       match:/toilet\s*3/i },
  { key:'t4',     label:'Toilet 4',       match:/toilet\s*4/i },
  { key:'pd',     label:'PD',             match:/^\s*pd\s*$/i },
];
// The per-toilet columns. The sheet's "TOTAL NO OF VANITY" per flat = how many
// of these are done (TRUE); summing TRUE across these = total toilets installed.
const VANITY_TOILET_KEYS = ['t1', 't2', 't3', 't4', 'pd'];
const VANITY_STATUSES = [
  { key:'done',    label:'Done',    c:'#16a34a', activeBg:'#dcfce7', ring:'#86efac' },
  { key:'pending', label:'Pending', c:'#b45309', activeBg:'#fef3c7', ring:'#fde68a' },
  { key:'na',      label:'N/A',     c:'#475569', activeBg:'#f1f5f9', ring:'#cbd5e1' },
  { key:'hold',    label:'Hold',    c:'#dc2626', activeBg:'#fee2e2', ring:'#fca5a5' },
];
function vanityCellStatus(v) {
  const s = String(v || '').trim().toUpperCase();
  if (/HOLD/.test(s))             return 'hold';
  if (s === 'TRUE')               return 'done';
  if (s === 'NA' || s === 'N/A')  return 'na';
  return 'pending';   // FALSE, blank, or free text
}
function vanityPill(v) {
  const t = (v || '').trim();
  if (!t) return `<span style="color:#cbd5e1">—</span>`;
  const st = vanityCellStatus(v);
  if (st === 'done')    return `<span class="pill" style="background:#dcfce7;color:#16a34a">✓</span>`;
  if (st === 'na')      return `<span class="pill" style="background:#f1f5f9;color:#64748b;font-size:9px">NA</span>`;
  if (st === 'hold')    return `<span class="pill" style="background:#fee2e2;color:#dc2626;font-size:9px">HOLD</span>`;
  if (/^false$/i.test(t)) return `<span class="pill" style="background:#f1f5f9;color:#94a3b8">✗</span>`;
  return `<span class="pill" style="background:#fef3c7;color:#b45309;font-size:9px">${escapeHtml(t)}</span>`;
}
// A whole flat is excluded from vanity counts when it's a sample flat or fully
// on hold (any cell is exactly "HOLD", or the remark says HOLD). A *partial*
// hold note like "HOLD DUE TO WATER TANK" in one toilet does NOT exclude the
// flat — its toilets still count (pending).
function vanityFlatExcluded(row) {
  if (/sample/i.test(row.remark || '')) return true;
  if (/^\s*hold\s*$/i.test(row.remark || '')) return true;
  for (const v of Object.values(row.cells)) {
    const u = String(v || '').trim().toUpperCase();
    if (u === 'HOLD') return true;
    if (/sample/i.test(v || '')) return true;
  }
  return false;
}
// Whether a flat's toilet cell counts as a real toilet for the totals.
// Counts blank / FALSE / TRUE / partial-hold-text (a real toilet, just not done);
// excludes NA and "Not Delivered" cells (that vanity isn't on site for this flat),
// and any cell in an excluded (sample / fully-hold) flat.
function vanityCountable(row, colKey) {
  if (!(colKey in row.cells)) return false;
  if (vanityFlatExcluded(row)) return false;
  const u = String(row.cells[colKey] || '').trim().toUpperCase();
  if (u === 'NA' || u === 'N/A') return false;
  if (/^NOT\s*DELIVER/.test(u)) return false;   // "Not Delivered" → exclude like NA
  return true;
}
// A flat is "complete" when every present report column is done or N/A, with ≥1 done.
function vanityRowComplete(cells) {
  const vals = Object.values(cells);
  if (!vals.length) return false;
  let anyDone = false;
  for (const v of vals) {
    const st = vanityCellStatus(v);
    if (st === 'pending' || st === 'hold') return false;
    if (st === 'done') anyDone = true;
  }
  return anyDone;
}
// Parse one tower tab → [{flat, tower, cells:{colKey:value}, remark}]
function parseVanity(csv, towerName) {
  const rows = _kwCsvRows(csv);
  // Header row = first row that names a report column (e.g. "VANITY ON SITE").
  let hIdx = rows.findIndex(r => r.some(c => /vanity\s*on\s*site/i.test(c || '')));
  if (hIdx < 0) return [];
  const header = rows[hIdx].map(c => (c || '').trim());
  // Map each report column to its index in this tower (only if present).
  const colIdx = {};
  VANITY_COLS.forEach(col => {
    const j = header.findIndex(h => col.match.test(h));
    if (j >= 0) colIdx[col.key] = j;
  });
  const remarkIdx = header.findIndex(h => /remark/i.test(h));
  const flatRe = /^T0?\d\s*\/\s*\d{2,3}$/i;
  const out = [];
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const flat = (r[0] || '').trim();
    if (!flatRe.test(flat)) continue;
    const cells = {};
    Object.entries(colIdx).forEach(([k, j]) => { cells[k] = (r[j] || '').trim(); });
    out.push({
      flat:   flat.replace(/\s+/g, ''),
      tower:  towerName,
      cells,
      remark: remarkIdx >= 0 ? (r[remarkIdx] || '').trim() : '',
    });
  }
  return out;
}
// Total toilets/vanities across a set of flats (matches the sheet's
// "TOTAL VANATIES FIXED"). total = countable toilet cells (excl. NA + sample/hold
// flats); installed = TRUE; delivered = toilets in flats whose Vanity-on-Site is TRUE.
function vanityToiletTotals(rows) {
  let installed = 0, total = 0, delivered = 0;
  rows.forEach(r => {
    const isDelivered = vanityCellStatus(r.cells.vanity || '') === 'done';
    VANITY_TOILET_KEYS.forEach(k => {
      if (!vanityCountable(r, k)) return;
      total++;
      if (vanityCellStatus(r.cells[k]) === 'done') installed++;
      if (isDelivered) delivered++;
    });
  });
  return { installed, total, delivered };
}
// Tower-card descriptor: "fixed / total · pct%" (toilets installed of total).
function vanTowerPct(rows) {
  const t = vanityToiletTotals(rows);
  if (!t.total) return '—';
  return `${t.installed} / ${t.total} · ${Math.round(t.installed / t.total * 100)}%`;
}

function doorCellStatus(v) {

function doorPill(v) {

// Countable = a real flat-stage: excludes blank, NA, HOLD and sample flats.
function doorCountable(row, colKey) {
  const st = doorCellStatus(row.cells[colKey]);
  if (st === 'blank' || st === 'na' || st === 'hold') return false;
  if (/sample/i.test(row.phase || '') || /sample/i.test(row.remark || '')) return false;
  return true;
}
function doorRowComplete(row) {
  const keys = Object.keys(row.cells);
  if (!keys.length) return false;
  let anyDone = false;
  for (const k of keys) {
    const st = doorCellStatus(row.cells[k]);
    if (st === 'pending' || st === 'hold' || st === 'blank') return false;
    if (st === 'done') anyDone = true;
  }
  return anyDone;
}

// Parse one tower tab → [{flat, tower, phase, cells:{colKey:value}, remark}]
function parseDoors(csv, towerName) {
  const rows = _kwCsvRows(csv);
  const tnum = ((towerName.match(/(\d+)/) || ['', '0'])[1]).padStart(2, '0');
  let hIdx = rows.findIndex(r => r.some(c => /door\s*frame\s*measurement/i.test(c || '')));
  if (hIdx < 0) return [];
  const header = rows[hIdx].map(c => (c || '').trim());
  const colIdx = {};
  DOOR_COLS.forEach(col => { const j = header.findIndex(h => col.match.test(h)); if (j >= 0) colIdx[col.key] = j; });
  // Flat column: the "Tower-0X" or "Unit No" header.
  let flatIdx = header.findIndex(h => /tower-?\s*0?\d/i.test(h) || /unit\s*no/i.test(h));
  if (flatIdx < 0) flatIdx = 1;
  const remarkIdx = header.findIndex(h => /remark/i.test(h));
  const out = [];
  for (let i = hIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const raw = (r[flatIdx] || '').trim();
    let flat = null;
    if (/^\d{2,3}$/.test(raw)) flat = 'T' + tnum + '/' + raw;          // bare unit (T3)
    else { const m = raw.match(/^T0?(\d)\s*\/?\s*(\d{2,3})$/i); if (m) flat = 'T0' + m[1] + '/' + m[2]; }
    if (!flat) continue;
    const cells = {};
    Object.entries(colIdx).forEach(([k, j]) => { cells[k] = (r[j] || '').trim(); });
    out.push({ flat, tower: towerName, phase: (r[0] || '').trim(), cells, remark: remarkIdx >= 0 ? (r[remarkIdx] || '').trim() : '' });
  }
  return out;
}

// Watcon status report — pool & spa work matrix from the PLANNER HLR sheet.
// Surfaces what's TRUE / pending / blocked / dated, with a dedicated "Purchase
// Orders Needed" section to drive PO decisions for SS tanks, pumps, equipment.
function watconClassify(v) {
  const s = (v || '').trim();
  if (!s) return { kind:'pending', label:'—' };
  if (/^TRUE$/i.test(s))     return { kind:'done',      label:'✓ Done' };
  if (/^FALSE$/i.test(s))    return { kind:'pending',   label:'Pending' };
  if (/^NA$|^N\/A$/i.test(s))return { kind:'na',        label:'NA' };
  // Date patterns: "7 June", "28 May", "14 June", "10 May", "11-May", "9-Jun"
  if (/^\d{1,2}[\s\-]?(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)/i.test(s) ||
      /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[\s\-]?\d{1,2}/i.test(s))
    return { kind:'scheduled', label:s };
  return { kind:'blocked', label:s };
}
// Parse a date cell like "7 June", "28 May", "14 June", "9-Jun", "11-May"
// into a Date object (year defaults to current year, rolling to next year if
// the month is significantly in the past — handles year-boundary scheduling).
function watconParseDate(s) {
  const t = (s || '').trim();
  if (!t) return null;
  const months = { jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11,
    january:0,february:1,march:2,april:3,june:5,july:6,august:7,september:8,october:9,november:10,december:11 };
  // "7 June" / "7-Jun" / "Jun 7" / "June-7"
  let m = t.match(/^(\d{1,2})[\s\-]+([A-Za-z]+)$/);
  if (!m) m = t.match(/^([A-Za-z]+)[\s\-]+(\d{1,2})$/);
  if (!m) return null;
  let day, monStr;
  if (/^\d/.test(m[1])) { day = parseInt(m[1]); monStr = m[2]; }
  else { day = parseInt(m[2]); monStr = m[1]; }
  const mon = months[monStr.toLowerCase()];
  if (mon == null || isNaN(day)) return null;
  const now = new Date();
  let year = now.getFullYear();
  // If the month is more than 6 months before today, assume next year (rolling).
  const probe = new Date(year, mon, day);
  if ((now - probe) > 1000*60*60*24*180) year += 1;
  return new Date(year, mon, day);
}
function watconFormatDate(d) {
  if (!d) return '—';
  return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}
// Compute Pumps Delivery readiness for each pool by walking every prerequisite
// row (DWG approvals through Purchasable material — i.e. everything that must
// land before pumps can show up). Returns one of:
//   "ready"     — all prerequisites Done/NA → schedule pumps immediately
//   "scheduled" — all prerequisites either Done/NA or Scheduled → ready by latest date
//   "pending"   — one or more FALSE/empty prerequisites → list them
//   "blocked"   — one or more free-text blockers → list them
// The user uses this to give the contractor a defendable pump delivery date.
function watconPumpsReadiness(pool, rows, poolIdx) {
  // Treat every row whose work matches the "Pumps delivery" line itself as the
  // milestone; everything ABOVE it (DWG + early Execution) is a prerequisite.
  const pumpIdx = rows.findIndex(r => /pumps?\s+delivery/i.test(r.work));
  const prereq = pumpIdx >= 0 ? rows.slice(0, pumpIdx) : rows;
  const blockers = [], pendings = [], dates = [];
  let allDoneOrNa = true, anyScheduled = false;
  for (const r of prereq) {
    const v = r.states[poolIdx];
    const c = watconClassify(v);
    if (c.kind === 'done' || c.kind === 'na') continue;
    allDoneOrNa = false;
    if (c.kind === 'scheduled') {
      anyScheduled = true;
      const d = watconParseDate(v);
      if (d) dates.push({ d, work:r.work, raw:v });
    } else if (c.kind === 'blocked') {
      blockers.push({ work:r.work, note:v });
    } else { // pending (FALSE / empty)
      pendings.push({ work:r.work });
    }
  }
  if (allDoneOrNa) return { kind:'ready', pool, message:'Ready now — schedule pumps any day.' };
  if (blockers.length) return { kind:'blocked', pool, blockers, pendings, dates };
  if (pendings.length) return { kind:'pending', pool, pendings, dates };
  // Only scheduled items remain. Latest date = earliest pumps can land.
  dates.sort((a,b) => a.d - b.d);
  const last = dates[dates.length - 1];
  return { kind:'scheduled', pool, latest:last, dates };
}

// ─── LABOUR INDEX PARSER ──────────────────────────────────
// Reads the "Labour Index" Google Sheet.
// Expected columns (any order, detected by header keywords):
//   Date  |  Interior Labour File ID  |  Facade Labour File ID  |  MEP Labour File ID
// Date formats accepted: DD-Mon-YY, DD-Mon-YYYY, DD/MM/YYYY, YYYY-MM-DD, "28-May-26", etc.
function parseLabourIndex(csv) {
  const entries = [];
  const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  // Minimal CSV → 2D rows
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i <= csv.length; i++) {
    const ch = i < csv.length ? csv[i] : '\n';
    if (inQ) {
      if (ch === '"' && csv[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') inQ = false;
      else field += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && csv[i+1] === '\n') i++;
        row.push(field.trim());
        if (row.some(c => c)) rows.push(row);
        row = []; field = '';
      } else field += ch;
    }
  }
  if (field || row.length) { row.push(field.trim()); if (row.some(c => c)) rows.push(row); }
  if (rows.length < 2) return entries;

  // Find header row (must have a DATE column)
  let hIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 4); i++) {
    if (rows[i].some(c => /^date$/i.test((c||'').trim()))) { hIdx = i; break; }
  }
  if (hIdx < 0) return entries;

  const H = rows[hIdx].map(c => (c||'').toUpperCase().trim());
  const iDate = H.findIndex(h => h === 'DATE');
  const iInt  = H.findIndex(h => h.includes('INTERIOR'));
  const iFac  = H.findIndex(h => h.includes('FACADE'));
  const iMEP  = H.findIndex(h => h.includes('MEP'));

  function parseEntryDate(s) {
    const v = (s||'').trim();
    if (!v) return null;
    // ISO: YYYY-MM-DD
    const iso = v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (iso) return new Date(+iso[1], +iso[2]-1, +iso[3]);
    // DD-Mon-YY / DD-Mon-YYYY
    const dmy = v.match(/^(\d{1,2})[-\/\s]([a-zA-Z]{3,})[-\/\s]?(\d{2,4})?$/);
    if (dmy) {
      const mon = MONTHS[(dmy[2]||'').slice(0,3).toLowerCase()];
      if (mon === undefined) return null;
      const yr  = dmy[3] ? (+dmy[3] < 100 ? 2000 + +dmy[3] : +dmy[3]) : new Date().getFullYear();
      return new Date(yr, mon, +dmy[1]);
    }
    // DD/MM/YYYY
    const ddmm = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
    if (ddmm) {
      const yr = +ddmm[3] < 100 ? 2000 + +ddmm[3] : +ddmm[3];
      return new Date(yr, +ddmm[2]-1, +ddmm[1]);
    }
    return null;
  }

  for (let i = hIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const dateStr = (r[iDate] || '').trim();
    if (!dateStr) continue;
    const dateObj = parseEntryDate(dateStr);
    if (!dateObj || isNaN(dateObj.getTime())) continue;
    const y = dateObj.getFullYear();
    const m = String(dateObj.getMonth()+1).padStart(2,'0');
    const d = String(dateObj.getDate()).padStart(2,'0');
    entries.push({
      dateStr,
      dateISO: `${y}-${m}-${d}`,
      dateObj,
      interior: iInt >= 0 ? (r[iInt]||'').trim() : '',
      facade:   iFac >= 0 ? (r[iFac]||'').trim() : '',
      mep:      iMEP >= 0 ? (r[iMEP]||'').trim() : '',
    });
  }
  // Newest first
  entries.sort((a,b) => b.dateObj - a.dateObj);
  return entries;
}

      } catch(e) {
        window._labourIndexCache = [];
      }
    }
    const indexEntries = window._labourIndexCache || [];

    // ── Augment with days from all monthly archives (interior + facade) ─────
    const allIndexEntries = [...indexEntries];
    const _allMonthlyYMs = new Set([
      ...LABOUR_INTERIOR_MONTHLY.map(e => e.yearMonth),
      ...LABOUR_FACADE_MONTHLY.map(e => e.yearMonth),
      ...LABOUR_MEP_MONTHLY.map(e => e.yearMonth),
    ]);
    _allMonthlyYMs.forEach(yearMonth => {
      const [yr, mo] = yearMonth.split('-').map(Number);
      const totalDays = new Date(yr, mo, 0).getDate();
      const monAbbr   = new Date(yr, mo-1, 1).toLocaleString('en-US', { month: 'short' });
      for (let d = 1; d <= totalDays; d++) {
        const iso = `${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if (!allIndexEntries.find(e => e.dateISO === iso)) {
          allIndexEntries.push({
            dateISO: iso,
            dateStr: `${String(d).padStart(2,'0')}-${monAbbr}`,
            dateObj: new Date(yr, mo-1, d),
            interior: '', facade: '', mep: '',
          });
        }
      }
    });
    allIndexEntries.sort((a,b) => b.dateObj - a.dateObj);

    // ── Date resolution ────────────────────────────────────────────────────
    const todayDate = new Date();
    const todayStr  = `${todayDate.getFullYear()}-${String(todayDate.getMonth()+1).padStart(2,'0')}-${String(todayDate.getDate()).padStart(2,'0')}`;
    if (!activeLabourDate) activeLabourDate = todayStr;
    const isToday = activeLabourDate === todayStr;

    // Find index entry for the selected date
    const selectedEntry = !isToday ? indexEntries.find(e => e.dateISO === activeLabourDate) : null;

    // Resolve file IDs for facade/MEP (from labourIndex or live)
    const resolvedIds = {
      interior: (selectedEntry?.interior) || FILES.interiorLabour,
      facade:   (selectedEntry?.facade)   || FILES.facadeLabour,
      mep:      (selectedEntry?.mep)      || FILES.mepLabour,
    };

    // ── Detect monthly archive for interior ────────────────────────────────
    // If the selected date falls in a LABOUR_INTERIOR_MONTHLY entry, fetch from
    // that workbook's date-named tab (e.g. "15-May") instead of the live sheet.
    let _monthlyArchive = null;       // interior archive { fileId, tabName }
    let _monthlyFacadeArchive = null; // facade archive   { fileId, tabName }
    // Interior: always use tab-based fetch (incl. today) so the correct daily tab is loaded.
    // FILES.interiorLabour IS the June workbook — fetching without GID gives the wrong first tab.
    if (activeLabourDate) {
      for (const arch of LABOUR_INTERIOR_MONTHLY) {
        if (activeLabourDate.startsWith(arch.yearMonth)) {
          const d  = parseInt(activeLabourDate.slice(8));
          const tab = activeLabourViewMode === 'monthly' ? 'Master'
                    : `${String(d).padStart(2,'0')}-${arch.tabSuffix}`;
          _monthlyArchive = { fileId: arch.fileId, tabName: tab };
          break;
        }
      }
    }
    // Facade: use the monthly archive for any date in an archived month (incl.
    // today) so Present tracks the maintained archive tab — mirrors interior/MEP.
    // Falls back to the live facade file only for dates outside archived months.
    if (activeLabourDate) {
      for (const arch of LABOUR_FACADE_MONTHLY) {
        if (activeLabourDate.startsWith(arch.yearMonth)) {
          const d  = parseInt(activeLabourDate.slice(8));
          const tab = activeLabourViewMode === 'monthly' ? 'Master'
                    : `${String(d).padStart(2,'0')}-${arch.tabSuffix}`;
          _monthlyFacadeArchive = { fileId: arch.fileId, tabName: tab };
          break;
        }
      }
    }
    // MEP: tab-based fetch for any date in an archived month (incl. today), and
    // the "Master" tab for the Monthly Report — mirrors interior so MEP numbers
    // track the selected date instead of always showing the live/today sheet.
    let _monthlyMEPArchive = null; // MEP archive { fileId, tabName }
    if (activeLabourDate) {
      for (const arch of LABOUR_MEP_MONTHLY) {
        if (activeLabourDate.startsWith(arch.yearMonth)) {
          const d  = parseInt(activeLabourDate.slice(8));
          const tab = activeLabourViewMode === 'monthly' ? 'Master'
                    : `${String(d).padStart(2,'0')}-${arch.tabSuffix}`;
          _monthlyMEPArchive = { fileId: arch.fileId, tabName: tab };
          break;
        }
      }
    }

    // ── Fetch data using resolved file IDs ─────────────────────────────────
    // For historical dates we fetch directly (bypassing DATA cache which holds live data)
    const reportDates = [];

    if (activeLabourSub === 'interior' || activeLabourSub === 'all') {
      try {
        let md;
        const usedFileId = _monthlyArchive ? _monthlyArchive.fileId : resolvedIds.interior;
        if (_monthlyArchive) {
          // Fetch tab by name from the monthly archive workbook (e.g. "15-May")
          const csv = await fetchSheetTabRawByName(_monthlyArchive.fileId, _monthlyArchive.tabName);
          md = csvToPipeRows(csv);
        } else {
          md = await fetchSheet(resolvedIds.interior);
        }
        const i  = parseInteriorLabour(md);
        sources.push('Interior Labour');
        sourceFiles.push({ label:'Interior', fileId: usedFileId });
        if (i.reportDate) reportDates.push({ label: 'Interior', date: i.reportDate });
        interiorContractors = i.contractors;   // keep for the category filter
        interiorTrades      = i.trades;         // [{ name, byContractor, total }]
        i.contractors.forEach(c => rows.push({ kind:'interior', vendor: c.name, activity: 'Interior — multi-trade', present: c.present, committed: c.committed, remarks: '' }));
      } catch(e) {
        fetchErrors.push({ label:'Interior Labour', fileId: _monthlyArchive?.fileId || resolvedIds.interior, msg: e.message });
      }
    }
    if (activeLabourSub === 'facade' || activeLabourSub === 'all') {
      try {
        let md;
        const usedFacadeFileId = _monthlyFacadeArchive ? _monthlyFacadeArchive.fileId : resolvedIds.facade;
        if (_monthlyFacadeArchive) {
          const csv = await fetchSheetTabRawByName(_monthlyFacadeArchive.fileId, _monthlyFacadeArchive.tabName);
          md = csvToPipeRows(csv);
        } else {
          md = await fetchSheet(resolvedIds.facade);
        }
        const f  = parseFacadeLabour(md);
        sources.push('Facade Labour');
        sourceFiles.push({ label:'Facade', fileId: usedFacadeFileId });
        if (f.reportDate) reportDates.push({ label: 'Facade', date: f.reportDate });
        f.vendors.forEach(v => rows.push({ kind:'facade', vendor: v.vendor, activity: v.activity || '—', present: v.present, committed: v.committed, remarks: v.remarks || '' }));
      } catch(e) {
        fetchErrors.push({ label:'Facade Labour', fileId: _monthlyFacadeArchive?.fileId || resolvedIds.facade, msg: e.message });
      }
    }
    const MEP_SUBS = ['mechanical', 'plumbing', 'electrical', 'fire'];
    if (MEP_SUBS.includes(activeLabourSub) || activeLabourSub === 'all') {
      try {
        let md;
        const usedMepFileId = _monthlyMEPArchive ? _monthlyMEPArchive.fileId : resolvedIds.mep;
        if (_monthlyMEPArchive) {
          // MEP archive tabs use a single header row → headers=1
          const csv = await fetchSheetTabRawByName(_monthlyMEPArchive.fileId, _monthlyMEPArchive.tabName, 1);
          md = csvToPipeRows(csv);
        } else {
          md = await fetchSheet(resolvedIds.mep);
        }
        const mep = parseMEPLabour(md);
        sources.push('MEP Labour');
        sourceFiles.push({ label:'MEP', fileId: usedMepFileId });
        if (mep._reportDate) reportDates.push({ label: 'MEP', date: mep._reportDate });
        const filtered = activeLabourSub === 'all'
          ? mep : mep.filter(r => mepTypeMatchesSub(r.type, activeLabourSub));
        filtered.forEach(v => rows.push({
          kind: activeLabourSub === 'all' ? (v.type||'').toLowerCase() : activeLabourSub,
          vendor: v.vendor, activity: v.type || '—',
          present: v.present, committed: v.committed, remarks: '',
        }));
      } catch(e) {
        fetchErrors.push({ label:'MEP Labour', fileId: _monthlyMEPArchive?.fileId || resolvedIds.mep, msg: e.message });
      }
    }

    // ── Build date picker UI ───────────────────────────────────────────────
    // Available months: from the index (only months with real DPR sheets).
    // If no index yet, show no month buttons (just the date picker + today).
    const availableMonths = [...new Set(allIndexEntries.map(e => e.dateISO.slice(0,7)))]
      .sort((a,b) => b.localeCompare(a)); // newest first

    // All available dates for min/max on the date input
    const availableDates = allIndexEntries.map(e => e.dateISO);
    const minDate = availableDates.length ? availableDates[availableDates.length-1] : '';
    const maxDate = todayStr;

    // Days within the selected month
    const selectedMonth = activeLabourDate.slice(0,7);
    const daysInMonth   = allIndexEntries
      .filter(e => e.dateISO.startsWith(selectedMonth))
      .sort((a,b) => a.dateISO.localeCompare(b.dateISO));

    const indexConfigured = !!(FILES.labourIndex || LABOUR_INTERIOR_MONTHLY.length || LABOUR_FACADE_MONTHLY.length);
    const detectedDateStr = reportDates.length > 0
      ? reportDates.map(r => `${r.label}: <b>${escapeHtml(r.date)}</b>`).join(' · ')
      : isToday ? '<span style="color:#94a3b8">today\'s live data</span>' : '<span style="color:#f59e0b">date not in index</span>';

    // Shared pill style used for both Today and Backdate indicators
    const _pillStyle = 'font-size:12px;font-weight:700;border-radius:8px;padding:5px 14px;border:1px solid #2d5986;background:#1e3a5f;color:#fff;cursor:pointer;font-family:inherit';

    const dateBannerHtml = `
      <div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:14px 16px;margin-bottom:16px">

        ${/* ── 1. Month dropdown + Monthly Report toggle (top) ── */ availableMonths.length > 0 ? `
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px">
          <span style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;white-space:nowrap">📆 Month</span>
          <select id="labour-month-select"
            style="border:1px solid var(--card-border);border-radius:8px;padding:6px 12px;font-size:13px;font-family:inherit;background:var(--card-bg);color:var(--body-color);cursor:pointer;font-weight:600;min-width:180px">
            <option value="">Today — Live Data</option>
            ${availableMonths.map(ym => {
              const [yr, mo] = ym.split('-');
              const lbl = new Date(+yr, +mo-1, 1).toLocaleString('en-IN', { month: 'long', year: 'numeric' });
              const cnt = allIndexEntries.filter(e => e.dateISO.startsWith(ym)).length;
              const sel = selectedMonth === ym && !isToday;
              return `<option value="${escapeHtml(ym)}" ${sel ? 'selected' : ''}>${escapeHtml(lbl)} (${cnt} days)</option>`;
            }).join('')}
          </select>
          ${/* Monthly report toggle — only show when a month with an archive is selected */
            (_monthlyArchive || _monthlyFacadeArchive || _monthlyMEPArchive) ? `
          <button id="labour-monthly-toggle"
            style="border:1px solid ${activeLabourViewMode==='monthly'?'#16a34a':'var(--card-border)'};
                   background:${activeLabourViewMode==='monthly'?'#f0fdf4':'var(--sub-btn-bg)'};
                   color:${activeLabourViewMode==='monthly'?'#16a34a':'var(--sub-btn-color)'};
                   border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">
            📊 Monthly Report
          </button>` : ''}
        </div>` : ''}

        ${/* ── 2. Report date input + same-style Today / Backdate pills ── */ ''}
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:${daysInMonth.length > 0 ? '10px' : '4px'}">
          <span style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.2px">📅 Report Date</span>
          <input type="date" id="labour-date-picker" value="${escapeHtml(activeLabourDate)}"
            ${minDate ? `min="${escapeHtml(minDate)}"` : ''} max="${escapeHtml(maxDate)}"
            style="border:1px solid var(--card-border);border-radius:8px;padding:5px 10px;font-size:13px;font-family:inherit;background:var(--card-bg);color:var(--body-color);cursor:pointer;font-weight:600">
          ${!isToday
            ? `<button id="labour-today-btn" style="${_pillStyle}">↩ Today</button>
               <span style="${_pillStyle.replace('cursor:pointer;','')}">📋 ${escapeHtml(activeLabourDate)}</span>`
            : `<span style="${_pillStyle.replace('cursor:pointer;','')}">🟢 Today</span>`}
        </div>

        ${/* ── 3. Day buttons — grayed for future, no "Select Day" header ── */
          daysInMonth.length > 0 ? `
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
          ${daysInMonth.map(e => {
            const day    = +e.dateISO.slice(8);
            const sel    = e.dateISO === activeLabourDate;
            const future = e.dateISO > todayStr;
            const border = sel ? '#2d5986' : 'var(--card-border)';
            const bg     = sel ? '#1e3a5f' : 'var(--sub-btn-bg)';
            const clr    = sel ? '#fff'    : 'var(--sub-btn-color)';
            const extra  = future ? 'opacity:0.35;cursor:not-allowed;pointer-events:none;' : 'cursor:pointer;';
            return `<button class="labour-day-btn" data-date="${escapeHtml(e.dateISO)}"
              ${future ? 'disabled' : ''}
              style="border:1px solid ${border};background:${bg};color:${clr};border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;font-family:inherit;min-width:38px;text-align:center;${extra}">
              ${day}
            </button>`;
          }).join('')}
        </div>` : ''}

        <div style="font-size:11px;color:#94a3b8;margin-top:4px;border-top:1px solid var(--card-border);padding-top:8px">
          🗂 Sheet date: ${detectedDateStr}
          ${indexConfigured && !isToday && !selectedEntry && !_monthlyArchive ? `&nbsp;·&nbsp;<span style="color:#f59e0b">No index entry — showing live data</span>` : ''}
        </div>
      </div>`;

    // Show per-sheet errors as a fixable warning (doesn't block the render)
    const errBanner = fetchErrors.length === 0 ? '' : `
      <div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:12px">
        <div style="font-weight:700;color:#dc2626;font-size:12px;margin-bottom:6px">⚠️ ${fetchErrors.length} sheet(s) could not be loaded — data below is partial</div>
        ${fetchErrors.map(e => `
          <div style="display:flex;align-items:center;gap:8px;font-size:11px;padding:3px 0;border-top:1px solid #fee2e2">
            <span style="color:#dc2626;font-weight:600">🔴 ${escapeHtml(e.label)}</span>
            <span style="color:#6b7280;flex:1">${escapeHtml(e.msg)}</span>
            <a href="https://docs.google.com/spreadsheets/d/${e.fileId}" target="_blank"
               style="color:#1d4ed8;font-weight:600;text-decoration:none;white-space:nowrap">
              Open &amp; Share ↗
            </a>
          </div>`).join('')}
        <div style="font-size:10px;color:#9ca3af;margin-top:6px">Fix: Open the sheet → Share → General access → <strong>Anyone with the link</strong> → Viewer → Done. Then reload.</div>
      </div>`;
    // ── Interior category filter ───────────────────────────────────────────
    // On the Interior sub-tab, the trade rows (POP, TILE/STONE, … STAFF) become
    // clickable category chips. Selecting one shows each contractor's headcount
    // for that single category instead of their multi-trade total.
    const isInterior = activeLabourSub === 'interior';
    if (isInterior && activeInteriorCategory !== 'all' && !interiorTrades.find(t => t.name === activeInteriorCategory)) {
      activeInteriorCategory = 'all'; // selected category not present in this date's data
    }
    const catMode = isInterior && activeInteriorCategory !== 'all';
    const interiorAllPresent = interiorContractors.reduce((s,c) => s + (c.present || 0), 0);
    if (catMode) {
      rows = interiorContractors
        .map(c => ({ kind:'interior', vendor:c.name, activity:String(activeInteriorCategory).trim(),
                     present: c.trades[activeInteriorCategory] || 0, committed: 0, remarks:'' }))
        .filter(r => r.present > 0)
        .sort((a,b) => b.present - a.present);
    }
    const catChipsHtml = isInterior ? `
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px">
        <span style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-right:2px">🗂 Category</span>
        ${[{n:'all',l:'All Categories'}, ...interiorTrades.map(t => ({ n:t.name, l:String(t.name).trim() }))].map(c => {
          const selc = activeInteriorCategory === c.n;
          return `<button class="int-cat-btn" data-cat="${escapeHtml(c.n)}"
            style="border:1px solid ${selc?'#2d5986':'var(--card-border)'};background:${selc?'#1e3a5f':'var(--sub-btn-bg)'};color:${selc?'#fff':'var(--sub-btn-color)'};border-radius:8px;padding:4px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer">${escapeHtml(c.l)}</button>`;
        }).join('')}
      </div>` : '';

    const totalPresent = rows.reduce((s,r) => s + r.present, 0);
    const totalCommitted = rows.reduce((s,r) => s + r.committed, 0);
    const shortage = Math.max(totalCommitted - totalPresent, 0);
    const fullStrength = rows.filter(r => r.committed > 0 && r.present >= r.committed).length;
    const pct = totalCommitted ? Math.round(totalPresent/totalCommitted*100) : 0;
    const kpiHtml = catMode ? `<div class="kpis">
      <div class="kpi" style="background:#f0fdf4;border-color:#86efac"><div class="kpi-icon">👷</div><div class="kpi-num" style="color:#22c55e">${totalPresent}</div><div class="kpi-label">${escapeHtml(String(activeInteriorCategory).trim())} Present</div></div>
      <div class="kpi" style="background:#eff6ff;border-color:#93c5fd"><div class="kpi-icon">🏗️</div><div class="kpi-num" style="color:#3b82f6">${rows.length}</div><div class="kpi-label">Contractors Active</div></div>
      <div class="kpi" style="background:#fffbeb;border-color:#fcd34d"><div class="kpi-icon">📊</div><div class="kpi-num" style="color:#f59e0b">${interiorAllPresent}</div><div class="kpi-label">All Interior Present</div></div>
      <div class="kpi" style="background:#f5f3ff;border-color:#c4b5fd"><div class="kpi-icon">📈</div><div class="kpi-num" style="color:#7c3aed">${interiorAllPresent?Math.round(totalPresent/interiorAllPresent*100):0}%</div><div class="kpi-label">Share of Interior</div></div>
    </div>` : `<div class="kpis">
      <div class="kpi" style="background:#eff6ff;border-color:#93c5fd"><div class="kpi-icon">📋</div><div class="kpi-num" style="color:#3b82f6">${totalCommitted}</div><div class="kpi-label">Committed</div></div>
      <div class="kpi" style="background:#f0fdf4;border-color:#86efac"><div class="kpi-icon">👷</div><div class="kpi-num" style="color:#22c55e">${totalPresent}</div><div class="kpi-label">Present</div></div>
      <div class="kpi" style="background:#fef2f2;border-color:#fca5a5"><div class="kpi-icon">⚠️</div><div class="kpi-num" style="color:#ef4444">${shortage}</div><div class="kpi-label">Shortage</div></div>
      <div class="kpi" style="background:#fffbeb;border-color:#fcd34d"><div class="kpi-icon">✅</div><div class="kpi-num" style="color:#f59e0b">${fullStrength}/${rows.length}</div><div class="kpi-label">Full Strength</div></div>
    </div>`;
    const summaryHtml = catMode ? `<div style="background:#fff;border-radius:13px;padding:14px 18px;margin-bottom:16px;border:1px solid #e2e8f0">
      <span style="font-weight:700;font-size:13px;color:#1e3a5f">🛋️ ${escapeHtml(String(activeInteriorCategory).trim())} — ${totalPresent} present across ${rows.length} contractor${rows.length===1?'':'s'}</span>
    </div>` : `<div style="background:#fff;border-radius:13px;padding:14px 18px;margin-bottom:16px;border:1px solid #e2e8f0">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-weight:700;font-size:13px;color:#1e3a5f">${sub.icon} ${escapeHtml(sub.label)} — Site Strength</span>
        <span style="font-size:12px;color:#6b7280">${totalPresent} of ${totalCommitted} present (${pct}%)</span>
      </div>
      <div class="bar-row"><div class="bar-outer"><div class="bar-inner" style="width:${Math.min(pct,100)}%;background:${pct<100?'#ef4444':'#22c55e'}"></div></div><span class="bar-pct" style="color:${pct<100?'#ef4444':'#16a34a'}">${pct}%</span></div>
    </div>`;
    const tableHtml = catMode
      ? (rows.length === 0
          ? `<div class="empty">No ${escapeHtml(String(activeInteriorCategory).trim())} workers recorded for this date.</div>`
          : `<table><thead><tr><th>#</th><th>Contractor</th><th>Category</th><th style="text-align:center">Present</th><th style="min-width:140px">Share of category</th></tr></thead><tbody>${
            rows.map((r,i) => {
              const sp = totalPresent ? Math.round(r.present/totalPresent*100) : 0;
              return `<tr>
                <td>${i+1}</td>
                <td class="loc">${escapeHtml(r.vendor)}</td>
                <td style="font-size:12px;color:#6b7280">${escapeHtml(r.activity)}</td>
                <td style="text-align:center;font-weight:700;color:#16a34a">${r.present}</td>
                <td><div class="bar-row"><div class="bar-outer"><div class="bar-inner" style="width:${sp}%;background:#3b82f6"></div></div><span class="bar-pct" style="color:#3b82f6">${sp}%</span></div></td>
              </tr>`;
            }).join('')}</tbody></table>`)
      : rows.length === 0
      ? `<div class="empty">No labour data for this section.</div>`
      : `<table><thead><tr><th>#</th><th>Contractor</th><th>Activity</th><th style="text-align:center">Committed</th><th style="text-align:center">Present</th><th style="text-align:center">Short</th><th style="min-width:120px">Strength</th></tr></thead><tbody>${
        rows.map((r,i) => {
          const short = Math.max(r.committed - r.present, 0);
          const pct = r.committed ? Math.round(r.present/r.committed*100) : 0;
          const cappedPct = Math.min(pct, 100);
          const barColor = r.present < r.committed ? '#ef4444' : '#22c55e';
          return `<tr>
            <td>${i+1}</td>
            <td class="loc">${escapeHtml(r.vendor)}</td>
            <td style="font-size:12px;color:#6b7280">${escapeHtml(r.activity)}</td>
            <td style="text-align:center;font-weight:700">${r.committed}</td>
            <td style="text-align:center;font-weight:700;color:${r.present<r.committed?'#ef4444':'#16a34a'}">${r.present}</td>
            <td style="text-align:center">${short>0?`<span class="pill" style="background:#fee2e2;color:#dc2626">-${short}</span>`:`<span class="pill" style="background:#dcfce7;color:#16a34a">Full</span>`}</td>
            <td><div class="bar-row"><div class="bar-outer"><div class="bar-inner" style="width:${cappedPct}%;background:${barColor}"></div></div><span class="bar-pct" style="color:${barColor}">${pct}%</span></div></td>
          </tr>`;
        }).join('')}</tbody></table>`;
    const lastEditPlaceholder = '';
    container.innerHTML = `
      <div class="eyebrow">${sub.icon} ${escapeHtml(sub.label)} Manpower Report <span class="tag live">LIVE</span></div>

function csvParseFields(raw) {
  const out = [];
  let cur = '', inQ = false;
  for (let i = 0; i < raw.length; i++) {
    const c = raw[i];
    if (inQ) {
      if (c === '"' && raw[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQ = false;
      else cur += c;
    } else {
      if (c === ',') { out.push(cur); cur = ''; }
      else if (c === '"') inQ = true;
      else if (c === '\n' || c === '\r') { if (cur || out.length) { out.push(cur); cur=''; } }
      else cur += c;
    }
  }
  out.push(cur);
  return out;
}
function parseElevators(raw) {
  const fields = csvParseFields(raw);
  const HEADER = ['Contractor','Lift Details','Lift No','Detail','Payment','Delivery','Site Ready','Schedule','Slow Speed','Architraves','Operational','Marble','Interior','Handover'];
  for (let i = 0; i < fields.length; i++) {
    const m = (fields[i] || '').match(/^(.+?)\s+(Hybon|Mitsubishi)\s*$/i);
    if (!m) continue;
    const before = m[1].trim();
    if (!before || /^(Hybon|Mitsubishi)$/i.test(before)) continue;
    fields.splice(i, 1, m[1], m[2]);
    i++;
  }
  let hIdx = fields.findIndex(f => /Lift details Contractor/i.test(f));
  if (hIdx < 0) hIdx = 0;
  let cursor = hIdx + 14;
  const lastH = fields[hIdx + 13] || '';
  const mH = lastH.match(/^(\s*HANDOVER\s*)(.*)$/i);
  if (mH && mH[2].trim()) {
    fields[hIdx + 13] = mH[1].trim();
    fields.splice(cursor, 0, mH[2]);
  }
  const rowStart = /^\s*(Hybon|Mitsubishi)\s*$/i;
  const startIdxs = [];
  for (let j = cursor; j < fields.length; j++) {
    if (rowStart.test(fields[j] || '')) startIdxs.push(j);
  }
  const rows = startIdxs.map((s, k) => {
    const e = k+1 < startIdxs.length ? startIdxs[k+1] : fields.length;
    const row = fields.slice(s, e).map(x => (x||'').trim());
    while (row.length < 14) row.push('');
    return row.slice(0, 14);
  });
  return { header: HEADER, rows };
}
function elevatorCellState(v) {
  const raw = String(v || '').trim();
  if (!raw) return { label:'—', plain:true, dim:true };
  const up = raw.toUpperCase();
  if (up === 'TRUE')  return { label:'✓ Completed', pillBg:'#dcfce7', pillColor:'#16a34a' };
  if (up === 'FALSE') return { label:'✗ Pending',   pillBg:'#fef2f2', pillColor:'#dc2626' };
  if (up === 'NA' || up === 'N/A') return { label:'N/A', pillBg:'#f1f5f9', pillColor:'#64748b' };
  if (up.includes('AWAITED') || up.includes('TBD') || up.includes('WIP') || up.includes('MOCKUP'))
    return { label: raw, pillBg:'#fef3c7', pillColor:'#b45309' };
  return { label: raw, plain:true };
}
function elevatorCellHtml(v) {
  const s = elevatorCellState(v);
  if (s.dim) return '<span style="color:#cbd5e1">—</span>';
  if (s.plain) return `<span style="color:#374151">${escapeHtml(s.label)}</span>`;
  return `<span class="pill" style="background:${s.pillBg};color:${s.pillColor}">${escapeHtml(s.label)}</span>`;
}
const STAGE_START   = 4;
const STAGE_END     = 13;
const HANDOVER_IDX  = 13;
function classifyElevator(row) {
  const ho = String(row[HANDOVER_IDX] || '').trim().toUpperCase();
  if (ho === 'TRUE') return 'done';
  for (let i = STAGE_START; i <= STAGE_END; i++) {
    const v = String(row[i] || '').trim().toUpperCase();
    if (v === 'TRUE') return 'inprogress';
  }
  return 'pending';
}
function rowProgress(row) {
  let done = 0, total = 0;
  for (let i = STAGE_START; i <= STAGE_END; i++) {
    const v = String(row[i] || '').trim().toUpperCase();
    if (v === 'NA' || v === 'N/A') continue;
    total++;
    if (v === 'TRUE') done++;
  }
  return { done, total, pct: total ? Math.round((done / total) * 100) : 0 };
}
function cellCompleted(v) {
  const u = String(v || '').trim().toUpperCase();
  if (u === 'NA' || u === 'N/A') return { applicable:false, completed:false };
  return { applicable:true, completed: u === 'TRUE' };
}
function unwrapElevatorContent(res) {
  function walk(o, depth) {
    if (depth > 10 || o == null) return null;
    if (typeof o === 'string') {
      const t = o.trim();
      if (t.startsWith('{') || t.startsWith('[')) {
        try { const r = walk(JSON.parse(o), depth + 1); if (r) return r; } catch {}
      }
      if (/Lift details Contractor|Hybon Club Lift|Hybon,|Mitsubishi,/i.test(o)) return o;
      return null;
    }
    if (Array.isArray(o)) {
      for (const v of o) { const r = walk(v, depth + 1); if (r) return r; }
      return null;
    }
    if (typeof o === 'object') {
      if (typeof o.fileContent === 'string') return o.fileContent;
      for (const v of Object.values(o)) { const r = walk(v, depth + 1); if (r) return r; }
    }
    return null;
  }
  return walk(res, 0);
}

    ...FIRE_FILES.map(f => ({ label:`Fire – ${f.contractor}`, fileId: f.fileId })),
    ...FACADE_FILES.map(f => ({ label:`Facade – ${f.contractor}`, fileId: f.fileId })),
  ];
  const panel = document.getElementById('health-panel');
  panel.style.display = 'block';
  panel.innerHTML = `<div style="font-weight:700;font-size:13px;color:#1e3a5f;margin-bottom:10px">🔍 Checking ${allSheets.length} sheets…</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:8px">Testing each sheet's public CSV endpoint. <strong>🔴 Blocked</strong> = not shared publicly. Open that sheet → Share → Anyone with link → Viewer.</div>
    <div id="health-rows"></div>`;
  const rowsEl = document.getElementById('health-rows');
  let ok = 0, fail = 0;
  for (const s of allSheets) {
    const url = `https://docs.google.com/spreadsheets/d/${s.fileId}/export?format=csv`;

      const text = await r.text();
      const lines = text.split('\n').filter(l => l.trim()).length;
      if (r.ok && lines > 0) {
        ok++;
        row.innerHTML = `<span style="min-width:16px">🟢</span><span style="flex:1;color:#374151">${escapeHtml(s.label)}</span>
          <span style="color:#16a34a;font-weight:600">${lines} rows</span>

        fail++;
        row.innerHTML = `<span style="min-width:16px">🔴</span><span style="flex:1;color:#dc2626;font-weight:600">${escapeHtml(s.label)}</span>
          <span style="color:#dc2626">HTTP ${r.status} — not shared publicly</span>
          <a href="https://docs.google.com/spreadsheets/d/${s.fileId}" target="_blank" style="color:#1d4ed8;font-size:10px;text-decoration:none">fix ↗</a>`;
      }

      fail++;
      row.innerHTML = `<span style="min-width:16px">🔴</span><span style="flex:1;color:#dc2626;font-weight:600">${escapeHtml(s.label)}</span>
        <span style="color:#dc2626">Network error</span>`;
    }
    // Update summary line
    const done = ok + fail;
    panel.querySelector('div').textContent = `🔍 ${done}/${allSheets.length} checked — 🟢 ${ok} OK · 🔴 ${fail} blocked`;
  }
}

// ─── INITIAL — restore navigation state ─────────────────────────────────────
// sessionStorage: survives F5/refresh within the same tab, but NOT new-tab or
// fresh URL opens — those always land on the default tab (Labour Report).
const VALID_TABS      = ['work','drawings','tendering','labour','purchasable','elevators'];
const VALID_WORK_SUBS = WORK_SUBS.map(s => s.key);
const VALID_STATUS    = ['done','delay','pending'];
const _ws  = sessionStorage.getItem('activeWorkSub');
if (_ws  && VALID_WORK_SUBS.includes(_ws))  activeWorkSub      = _ws;
const _wi  = sessionStorage.getItem('activeWorkItem');
if (_wi)                                     activeWorkItem     = _wi;
const _wl  = sessionStorage.getItem('activeWorkLocation');
if (_wl)                                     activeWorkLocation = _wl;
const _wst = sessionStorage.getItem('activeWorkStatus');
if (_wst && VALID_STATUS.includes(_wst))     activeWorkStatus   = _wst;
const _ds  = sessionStorage.getItem('activeDrawingsStatus');
if (_ds  && VALID_STATUS.includes(_ds))      activeDrawingsStatus  = _ds;
const _dl  = sessionStorage.getItem('activeDrawingsLocation');
if (_dl)                                     activeDrawingsLocation = _dl;
const _ls  = sessionStorage.getItem('activeLabourSub');
if (_ls)                                     activeLabourSub = _ls;
const savedTab = sessionStorage.getItem('activeTab');
showTab(VALID_TABS.includes(savedTab) ? savedTab : 'labour');
</script>
