// ─── LABOUR INDEX PARSER ──────────────────────────────────
// Reads the "Labour Index" Google Sheet.
// Expected columns (any order, detected by header keywords):
//   Date  |  Interior Labour File ID  |  Facade Labour File ID  |  MEP Labour File ID
// Date formats accepted: DD-Mon-YY, DD-Mon-YYYY, DD/MM/YYYY, YYYY-MM-DD, "28-May-26", etc.
function parseLabourIndex(csv) {
  const entries = [];
  const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  // Minimal CSV → 2D rows
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i <= csv.length; i++) {
    const ch = i < csv.length ? csv[i] : '\n';
    if (inQ) {
      if (ch === '"' && csv[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') inQ = false;
      else field += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && csv[i+1] === '\n') i++;
        row.push(field.trim());
        if (row.some(c => c)) rows.push(row);
        row = []; field = '';
      } else field += ch;
    }
  }
  if (field || row.length) { row.push(field.trim()); if (row.some(c => c)) rows.push(row); }
  if (rows.length < 2) return entries;

  // Find header row (must have a DATE column)
  let hIdx = -1;
  for (let i = 0; i < Math.min(rows.length, 4); i++) {
    if (rows[i].some(c => /^date$/i.test((c||'').trim()))) { hIdx = i; break; }
  }
  if (hIdx < 0) return entries;

  const H = rows[hIdx].map(c => (c||'').toUpperCase().trim());
  const iDate = H.findIndex(h => h === 'DATE');
  const iInt  = H.findIndex(h => h.includes('INTERIOR'));
  const iFac  = H.findIndex(h => h.includes('FACADE'));
  const iMEP  = H.findIndex(h => h.includes('MEP'));

  function parseEntryDate(s) {
    const v = (s||'').trim();
    if (!v) return null;
    // ISO: YYYY-MM-DD
    const iso = v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (iso) return new Date(+iso[1], +iso[2]-1, +iso[3]);
    // DD-Mon-YY / DD-Mon-YYYY
    const dmy = v.match(/^(\d{1,2})[-\/\s]([a-zA-Z]{3,})[-\/\s]?(\d{2,4})?$/);
    if (dmy) {
      const mon = MONTHS[(dmy[2]||'').slice(0,3).toLowerCase()];
      if (mon === undefined) return null;
      const yr  = dmy[3] ? (+dmy[3] < 100 ? 2000 + +dmy[3] : +dmy[3]) : new Date().getFullYear();
      return new Date(yr, mon, +dmy[1]);
    }
    // DD/MM/YYYY
    const ddmm = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
    if (ddmm) {
      const yr = +ddmm[3] < 100 ? 2000 + +ddmm[3] : +ddmm[3];
      return new Date(yr, +ddmm[2]-1, +ddmm[1]);
    }
    return null;
  }

  for (let i = hIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const dateStr = (r[iDate] || '').trim();
    if (!dateStr) continue;
    const dateObj = parseEntryDate(dateStr);
    if (!dateObj || isNaN(dateObj.getTime())) continue;
    const y = dateObj.getFullYear();
    const m = String(dateObj.getMonth()+1).padStart(2,'0');
    const d = String(dateObj.getDate()).padStart(2,'0');
    entries.push({
      dateStr,
      dateISO: `${y}-${m}-${d}`,
      dateObj,
      interior: iInt >= 0 ? (r[iInt]||'').trim() : '',
      facade:   iFac >= 0 ? (r[iFac]||'').trim() : '',
      mep:      iMEP >= 0 ? (r[iMEP]||'').trim() : '',
    });
  }
  // Newest first
  entries.sort((a,b) => b.dateObj - a.dateObj);
  return entries;
}

// ─── LABOUR TAB ───────────────────────────────────────────
const LABOUR_SUBS = [
  { key:'all',        label:'All',        icon:'📊', live:true },
  { key:'interior',   label:'Interior',   icon:'🛋️', live:true },
  { key:'facade',     label:'Facade',     icon:'🏢', live:true },
  { key:'mechanical', label:'Mechanical', icon:'🔧', live:true },
  { key:'plumbing',   label:'Plumbing',   icon:'🚿', live:true },
  { key:'electrical', label:'Electrical', icon:'⚡',  live:true },
  { key:'fire',       label:'Fire',       icon:'🔥', live:true },
];
async function renderLabour() {
  sessionStorage.setItem('activeLabourSub', activeLabourSub);
  const container = document.getElementById('tab-labour');
  const sub = LABOUR_SUBS.find(s => s.key === activeLabourSub);
  const subnav = subnavHtml(LABOUR_SUBS, activeLabourSub, s => s.live ? '🟢 Live' : `Wave ${s.wave}`);
  if (!sub.live) {
    container.innerHTML = `
      <div class="eyebrow">${sub.icon} ${escapeHtml(sub.label)} Labour</div>
      ${subnav}
      ${placeholderHtml(`${sub.label} labour — wiring up in Wave ${sub.wave}`, `Today's site headcount for ${sub.label.toLowerCase()} contractors will appear here once the daily attendance sheet is linked. Currently estimated values only.`)}`;
    container.querySelectorAll('.sub-btn').forEach(b => {
      b.addEventListener('click', () => { activeLabourSub = b.dataset.key; renderLabour(); });
    });
    return;
  }
  container.innerHTML = `<div class="eyebrow">${sub.icon} ${escapeHtml(sub.label)} Labour</div>${subnav}${liveBar('loading')}<div class="loading">⏳ Pulling from Drive…</div>`;
  container.querySelectorAll('.sub-btn').forEach(b => {
    b.addEventListener('click', () => { activeLabourSub = b.dataset.key; renderLabour(); });
  });
  try {
    let rows = [];
    let sources = [];
    // sourceFiles: parallel array tracking { label, fileId } for each loaded
    // data source so we can fetch and display last-edited times.
    const sourceFiles = [];
    const fetchErrors = []; // collect per-sheet errors — don't crash the whole render

    // ── Load Labour Index (list of daily DPR sheets) ──────────────────────
    // The index is a publicly-shared Google Sheet with columns:
    //   Date | Interior File ID | Facade File ID | MEP File ID
    // Set FILES.labourIndex once the sheet is created and shared.
    if (!window._labourIndexCache) window._labourIndexCache = null;
    if (FILES.labourIndex && window._labourIndexCache === null) {
      try {
        const idxCsv = await fetchSheetTabRaw(FILES.labourIndex, null);
        window._labourIndexCache = parseLabourIndex(idxCsv);
      } catch(e) {
        window._labourIndexCache = [];
      }
    }
    const indexEntries = window._labourIndexCache || [];

    // ── Augment with days from LABOUR_INTERIOR_MONTHLY archives ───────────
    // Populates all days of each configured month so they appear in the picker.
    const allIndexEntries = [...indexEntries];
    LABOUR_INTERIOR_MONTHLY.forEach(({ yearMonth }) => {
      const [yr, mo] = yearMonth.split('-').map(Number);
      const totalDays = new Date(yr, mo, 0).getDate();
      const monAbbr   = new Date(yr, mo-1, 1).toLocaleString('en-US', { month: 'short' }); // "May"
      for (let d = 1; d <= totalDays; d++) {
        const iso = `${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if (!allIndexEntries.find(e => e.dateISO === iso)) {
          allIndexEntries.push({
            dateISO: iso,
            dateStr: `${String(d).padStart(2,'0')}-${monAbbr}`,
            dateObj: new Date(yr, mo-1, d),
            interior: '', facade: '', mep: '',
          });
        }
      }
    });
    allIndexEntries.sort((a,b) => b.dateObj - a.dateObj);

    // ── Date resolution ────────────────────────────────────────────────────
    const todayDate = new Date();
    const todayStr  = `${todayDate.getFullYear()}-${String(todayDate.getMonth()+1).padStart(2,'0')}-${String(todayDate.getDate()).padStart(2,'0')}`;
    if (!activeLabourDate) activeLabourDate = todayStr;
    const isToday = activeLabourDate === todayStr;

    // Find index entry for the selected date
    const selectedEntry = !isToday ? indexEntries.find(e => e.dateISO === activeLabourDate) : null;

    // Resolve file IDs for facade/MEP (from labourIndex or live)
    const resolvedIds = {
      interior: (selectedEntry?.interior) || FILES.interiorLabour,
      facade:   (selectedEntry?.facade)   || FILES.facadeLabour,
      mep:      (selectedEntry?.mep)      || FILES.mepLabour,
    };

    // ── Detect monthly archive for interior ────────────────────────────────
    // If the selected date falls in a LABOUR_INTERIOR_MONTHLY entry, fetch from
    // that workbook's date-named tab (e.g. "15-May") instead of the live sheet.
    let _monthlyArchive = null; // { fileId, tabName }
    if (!isToday && activeLabourDate) {
      for (const arch of LABOUR_INTERIOR_MONTHLY) {
        if (activeLabourDate.startsWith(arch.yearMonth)) {
          const d       = parseInt(activeLabourDate.slice(8));
          const monAbbr = new Date(+arch.yearMonth.slice(0,4), +arch.yearMonth.slice(5,7)-1, 1)
                            .toLocaleString('en-US', { month: 'short' });
          _monthlyArchive = { fileId: arch.fileId, tabName: `${String(d).padStart(2,'0')}-${monAbbr}` };
          break;
        }
      }
    }

    // ── Fetch data using resolved file IDs ─────────────────────────────────
    // For historical dates we fetch directly (bypassing DATA cache which holds live data)
    const reportDates = [];

    if (activeLabourSub === 'interior' || activeLabourSub === 'all') {
      try {
        let md;
        const usedFileId = _monthlyArchive ? _monthlyArchive.fileId : resolvedIds.interior;
        if (_monthlyArchive) {
          // Fetch tab by name from the monthly archive workbook (e.g. "15-May")
          const csv = await fetchSheetTabRawByName(_monthlyArchive.fileId, _monthlyArchive.tabName);
          md = csvToPipeRows(csv);
        } else {
          md = await fetchSheet(resolvedIds.interior);
        }
        const i  = parseInteriorLabour(md);
        sources.push('Interior Labour');
        sourceFiles.push({ label:'Interior', fileId: usedFileId });
        if (i.reportDate) reportDates.push({ label: 'Interior', date: i.reportDate });
        i.contractors.forEach(c => rows.push({ kind:'interior', vendor: c.name, activity: 'Interior — multi-trade', present: c.present, committed: c.committed, remarks: '' }));
      } catch(e) {
        fetchErrors.push({ label:'Interior Labour', fileId: _monthlyArchive?.fileId || resolvedIds.interior, msg: e.message });
      }
    }
    if (activeLabourSub === 'facade' || activeLabourSub === 'all') {
      try {
        const md = await fetchSheet(resolvedIds.facade);
        const f  = parseFacadeLabour(md);
        sources.push('Facade Labour');
        sourceFiles.push({ label:'Facade', fileId: resolvedIds.facade });
        if (f.reportDate) reportDates.push({ label: 'Facade', date: f.reportDate });
        f.vendors.forEach(v => rows.push({ kind:'facade', vendor: v.vendor, activity: v.activity || '—', present: v.present, committed: v.committed, remarks: v.remarks || '' }));
      } catch(e) {
        fetchErrors.push({ label:'Facade Labour', fileId: resolvedIds.facade, msg: e.message });
      }
    }
    const MEP_SUBS = ['mechanical', 'plumbing', 'electrical', 'fire'];
    if (MEP_SUBS.includes(activeLabourSub) || activeLabourSub === 'all') {
      try {
        const md  = await fetchSheet(resolvedIds.mep);
        const mep = parseMEPLabour(md);
        sources.push('MEP Labour');
        sourceFiles.push({ label:'MEP', fileId: resolvedIds.mep });
        if (mep._reportDate) reportDates.push({ label: 'MEP', date: mep._reportDate });
        const filtered = activeLabourSub === 'all'
          ? mep : mep.filter(r => mepTypeMatchesSub(r.type, activeLabourSub));
        filtered.forEach(v => rows.push({
          kind: activeLabourSub === 'all' ? (v.type||'').toLowerCase() : activeLabourSub,
          vendor: v.vendor, activity: v.type || '—',
          present: v.present, committed: v.committed, remarks: '',
        }));
      } catch(e) {
        fetchErrors.push({ label:'MEP Labour', fileId: resolvedIds.mep, msg: e.message });
      }
    }

    // ── Build date picker UI ───────────────────────────────────────────────
    // Available months: from the index (only months with real DPR sheets).
    // If no index yet, show no month buttons (just the date picker + today).
    const availableMonths = [...new Set(allIndexEntries.map(e => e.dateISO.slice(0,7)))]
      .sort((a,b) => b.localeCompare(a)); // newest first

    // All available dates for min/max on the date input
    const availableDates = allIndexEntries.map(e => e.dateISO);
    const minDate = availableDates.length ? availableDates[availableDates.length-1] : '';
    const maxDate = todayStr;

    // Days within the selected month
    const selectedMonth = activeLabourDate.slice(0,7);
    const daysInMonth   = allIndexEntries
      .filter(e => e.dateISO.startsWith(selectedMonth))
      .sort((a,b) => a.dateISO.localeCompare(b.dateISO));

    const indexConfigured = !!(FILES.labourIndex || LABOUR_INTERIOR_MONTHLY.length);
    const detectedDateStr = reportDates.length > 0
      ? reportDates.map(r => `${r.label}: <b>${escapeHtml(r.date)}</b>`).join(' · ')
      : isToday ? '<span style="color:#94a3b8">today\'s live data</span>' : '<span style="color:#f59e0b">date not in index</span>';

    const dateBannerHtml = `
      <div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:14px 16px;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
          <span style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.2px">📅 Report Date</span>
          <input type="date" id="labour-date-picker" value="${escapeHtml(activeLabourDate)}"
            ${minDate ? `min="${escapeHtml(minDate)}"` : ''} max="${escapeHtml(maxDate)}"
            style="border:1px solid var(--card-border);border-radius:8px;padding:5px 10px;font-size:13px;font-family:inherit;background:var(--card-bg);color:var(--body-color);cursor:pointer;font-weight:600">
          ${!isToday
            ? `<button id="labour-today-btn" style="border:1px solid #93c5fd;background:#eff6ff;color:#1d4ed8;border-radius:8px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">↩ Today</button>
               <span style="font-size:11px;color:#b45309;font-weight:600;background:#fef3c7;border-radius:6px;padding:3px 10px">📋 Backdate — ${escapeHtml(activeLabourDate)}</span>`
            : `<span style="font-size:11px;color:#16a34a;font-weight:700;background:#dcfce7;border-radius:6px;padding:3px 10px">🟢 Live — Today</span>`}
        </div>

        ${availableMonths.length > 0 ? `
        <div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Select Month</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
          <button class="labour-month-btn" data-month="${todayStr.slice(0,7)}"
            style="border:1px solid ${selectedMonth===todayStr.slice(0,7)?'#2d5986':'var(--card-border)'};background:${selectedMonth===todayStr.slice(0,7)?'#1e3a5f':'var(--sub-btn-bg)'};color:${selectedMonth===todayStr.slice(0,7)?'#fff':'var(--sub-btn-color)'};border-radius:8px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">
            Today
          </button>
          ${availableMonths.map(ym => {
            const [yr, mo] = ym.split('-');

function csvParseFields(raw) {
  const out = [];
  let cur = '', inQ = false;
  for (let i = 0; i < raw.length; i++) {
    const c = raw[i];
    if (inQ) {
      if (c === '"' && raw[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQ = false;
      else cur += c;
    } else {
      if (c === ',') { out.push(cur); cur = ''; }
      else if (c === '"') inQ = true;
      else if (c === '\n' || c === '\r') { if (cur || out.length) { out.push(cur); cur=''; } }
      else cur += c;
    }
  }
  out.push(cur);
  return out;
}
function parseElevators(raw) {
  const fields = csvParseFields(raw);
  const HEADER = ['Contractor','Lift Details','Lift No','Detail','Payment','Delivery','Site Ready','Schedule','Slow Speed','Architraves','Operational','Marble','Interior','Handover'];
  for (let i = 0; i < fields.length; i++) {
    const m = (fields[i] || '').match(/^(.+?)\s+(Hybon|Mitsubishi)\s*$/i);
    if (!m) continue;
    const before = m[1].trim();
    if (!before || /^(Hybon|Mitsubishi)$/i.test(before)) continue;
    fields.splice(i, 1, m[1], m[2]);
    i++;
  }
  let hIdx = fields.findIndex(f => /Lift details Contractor/i.test(f));
  if (hIdx < 0) hIdx = 0;
  let cursor = hIdx + 14;
  const lastH = fields[hIdx + 13] || '';
  const mH = lastH.match(/^(\s*HANDOVER\s*)(.*)$/i);
  if (mH && mH[2].trim()) {
    fields[hIdx + 13] = mH[1].trim();
    fields.splice(cursor, 0, mH[2]);
  }
  const rowStart = /^\s*(Hybon|Mitsubishi)\s*$/i;
  const startIdxs = [];
  for (let j = cursor; j < fields.length; j++) {
    if (rowStart.test(fields[j] || '')) startIdxs.push(j);
  }
  const rows = startIdxs.map((s, k) => {
    const e = k+1 < startIdxs.length ? startIdxs[k+1] : fields.length;
    const row = fields.slice(s, e).map(x => (x||'').trim());
    while (row.length < 14) row.push('');
    return row.slice(0, 14);
  });
  return { header: HEADER, rows };
}
function elevatorCellState(v) {
  const raw = String(v || '').trim();
  if (!raw) return { label:'—', plain:true, dim:true };
  const up = raw.toUpperCase();
  if (up === 'TRUE')  return { label:'✓ Completed', pillBg:'#dcfce7', pillColor:'#16a34a' };
  if (up === 'FALSE') return { label:'✗ Pending',   pillBg:'#fef2f2', pillColor:'#dc2626' };
  if (up === 'NA' || up === 'N/A') return { label:'N/A', pillBg:'#f1f5f9', pillColor:'#64748b' };
  if (up.includes('AWAITED') || up.includes('TBD') || up.includes('WIP') || up.includes('MOCKUP'))
    return { label: raw, pillBg:'#fef3c7', pillColor:'#b45309' };
  return { label: raw, plain:true };
}
function elevatorCellHtml(v) {
  const s = elevatorCellState(v);
  if (s.dim) return '<span style="color:#cbd5e1">—</span>';
  if (s.plain) return `<span style="color:#374151">${escapeHtml(s.label)}</span>`;
  return `<span class="pill" style="background:${s.pillBg};color:${s.pillColor}">${escapeHtml(s.label)}</span>`;
}
const STAGE_START   = 4;
const STAGE_END     = 13;
const HANDOVER_IDX  = 13;
function classifyElevator(row) {
  const ho = String(row[HANDOVER_IDX] || '').trim().toUpperCase();
  if (ho === 'TRUE') return 'done';
  for (let i = STAGE_START; i <= STAGE_END; i++) {
    const v = String(row[i] || '').trim().toUpperCase();
    if (v === 'TRUE') return 'inprogress';
  }
  return 'pending';
}
function rowProgress(row) {
  let done = 0, total = 0;
  for (let i = STAGE_START; i <= STAGE_END; i++) {
    const v = String(row[i] || '').trim().toUpperCase();
    if (v === 'NA' || v === 'N/A') continue;
    total++;
    if (v === 'TRUE') done++;
  }
  return { done, total, pct: total ? Math.round((done / total) * 100) : 0 };
}
function cellCompleted(v) {
  const u = String(v || '').trim().toUpperCase();
  if (u === 'NA' || u === 'N/A') return { applicable:false, completed:false };
  return { applicable:true, completed: u === 'TRUE' };
}
function unwrapElevatorContent(res) {
  function walk(o, depth) {
    if (depth > 10 || o == null) return null;
    if (typeof o === 'string') {
      const t = o.trim();
      if (t.startsWith('{') || t.startsWith('[')) {
        try { const r = walk(JSON.parse(o), depth + 1); if (r) return r; } catch {}
      }
      if (/Lift details Contractor|Hybon Club Lift|Hybon,|Mitsubishi,/i.test(o)) return o;
      return null;
    }
    if (Array.isArray(o)) {
      for (const v of o) { const r = walk(v, depth + 1); if (r) return r; }
      return null;
    }
    if (typeof o === 'object') {
      if (typeof o.fileContent === 'string') return o.fileContent;
      for (const v of Object.values(o)) { const r = walk(v, depth + 1); if (r) return r; }
    }
    return null;
  }
  return walk(res, 0);
}

      <div style="font-size:11px;color:#64748b;margin-bottom:8px">Pick a contractor, then a LIFT DETAILS category. Completed = HANDOVER marked done. Currently showing: <strong>${escapeHtml(sectionScope)}</strong>.</div>
      <div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin:0 0 4px 2px">Contractor</div>
      ${contractorCardsHtml}
      <div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin:10px 0 4px 2px">Lift Details</div>
      ${cardsHtml}
      ${completedSection}
      ${pendingSection}
      <div style="font-size:11px;color:#94a3b8;text-align:center;margin-top:8px">Strict: only <strong>TRUE</strong> = Done · NA excluded · <a href="https://docs.google.com/spreadsheets/d/1_p6ElHE6TsrEzrSLxpCF_BFcsQhLZmLT/edit" target="_blank" style="color:#1d4ed8">Source</a></div>`;
    container.querySelectorAll('.card').forEach(b => {
      b.addEventListener('click', () => {
        if (b.dataset.contractor !== undefined) { activeContractor = b.dataset.contractor; activeElevatorStage = 'all'; }
        else if (b.dataset.stage !== undefined) { activeElevatorStage = b.dataset.stage; }
        renderElevators();
      });
    });
  } catch (e) {
    container.innerHTML = `<div class="eyebrow">🛗 Elevators</div><div class="error"><strong>Failed to load:</strong> ${escapeHtml(e?.message || String(e))}</div>`;
  }
}
function showTab(key) {
  activeTab = key;
  sessionStorage.setItem('activeTab', key);
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === key));
  ['work','drawings','tendering','labour','purchasable','elevators'].forEach(k => {
    const el = document.getElementById('tab-' + k);
    el.style.display = k === key ? '' : 'none';
  });
  if      (key === 'work')        renderWork();
  else if (key === 'drawings')    renderDrawings();
  else if (key === 'tendering')   renderTendering();
  else if (key === 'labour')      renderLabour();
  else if (key === 'purchasable') renderPurchasableTab();
  else if (key === 'elevators')   renderElevators();
}
document.querySelectorAll('.tab-btn').forEach(b => {
  b.addEventListener('click', () => showTab(b.dataset.tab));
});

// ─── SHEET HEALTH CHECK ───────────────────────────────────
async function runHealthCheck() {
  const allSheets = [
    { label:'Tendering',         fileId: FILES.tendering },
    { label:'Interior Labour',   fileId: FILES.interiorLabour },
    { label:'Facade Labour',     fileId: FILES.facadeLabour },
    { label:'MEP Labour',        fileId: FILES.mepLabour },
    { label:'Waterproofing',     fileId: FILES.waterproof },
    { label:'Drawings',          fileId: FILES.drawings },
    { label:'Civil',             fileId: FILES.civil },
    { label:'Civil Facade',      fileId: FILES.civilFacade },
    { label:'Landscape',         fileId: FILES.landscape },
    { label:'Interior Execution',fileId: FILES.interior },
    { label:'Elevators',         fileId: FILES.elevators },
    { label:'Commercial Kitchen',fileId: FILES.commercialKitchen },
    { label:'Planner (Common/Watcon)', fileId: FILES.planner },
    ...PLUMBING_FILES.map(f => ({ label:`Plumbing – ${f.contractor}`, fileId: f.fileId })),
    ...MECHANICAL_FILES.map(f => ({ label:`Mechanical – ${f.contractor}`, fileId: f.fileId })),
    ...ELECTRICAL_FILES.map(f => ({ label:`Electrical – ${f.contractor}`, fileId: f.fileId })),
    ...FIRE_FILES.map(f => ({ label:`Fire – ${f.contractor}`, fileId: f.fileId })),
    ...FACADE_FILES.map(f => ({ label:`Facade – ${f.contractor}`, fileId: f.fileId })),
  ];
  const panel = document.getElementById('health-panel');
  panel.style.display = 'block';
  panel.innerHTML = `<div style="font-weight:700;font-size:13px;color:#1e3a5f;margin-bottom:10px">🔍 Checking ${allSheets.length} sheets…</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:8px">Testing each sheet's public CSV endpoint. <strong>🔴 Blocked</strong> = not shared publicly. Open that sheet → Share → Anyone with link → Viewer.</div>
    <div id="health-rows"></div>`;
  const rowsEl = document.getElementById('health-rows');
  let ok = 0, fail = 0;
  for (const s of allSheets) {
    const url = `https://docs.google.com/spreadsheets/d/${s.fileId}/export?format=csv`;
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f1f5f9;font-size:11px';
    row.innerHTML = `<span style="min-width:16px">⏳</span><span style="flex:1;color:#374151">${escapeHtml(s.label)}</span><span style="color:#94a3b8;font-family:monospace;font-size:10px">checking…</span>`;
    rowsEl.appendChild(row);
    try {
      const r = await fetch(url, { credentials: 'omit' });
      const text = await r.text();
      const lines = text.split('\n').filter(l => l.trim()).length;
      if (r.ok && lines > 0) {
        ok++;
        row.innerHTML = `<span style="min-width:16px">🟢</span><span style="flex:1;color:#374151">${escapeHtml(s.label)}</span>
          <span style="color:#16a34a;font-weight:600">${lines} rows</span>
          <a href="https://docs.google.com/spreadsheets/d/${s.fileId}" target="_blank" style="color:#6b7280;font-size:10px;text-decoration:none">open ↗</a>`;
      } else {
        fail++;
        row.innerHTML = `<span style="min-width:16px">🔴</span><span style="flex:1;color:#dc2626;font-weight:600">${escapeHtml(s.label)}</span>
          <span style="color:#dc2626">HTTP ${r.status} — not shared publicly</span>
          <a href="https://docs.google.com/spreadsheets/d/${s.fileId}" target="_blank" style="color:#1d4ed8;font-size:10px;text-decoration:none">fix ↗</a>`;
      }
    } catch(e) {
      fail++;
      row.innerHTML = `<span style="min-width:16px">🔴</span><span style="flex:1;color:#dc2626;font-weight:600">${escapeHtml(s.label)}</span>
        <span style="color:#dc2626">Network error</span>`;
    }
    // Update summary line
    const done = ok + fail;
    panel.querySelector('div').textContent = `🔍 ${done}/${allSheets.length} checked — 🟢 ${ok} OK · 🔴 ${fail} blocked`;
  }
}

// ─── INITIAL — restore navigation state ─────────────────────────────────────
// sessionStorage: survives F5/refresh within the same tab, but NOT new-tab or
// fresh URL opens — those always land on the default tab (Labour Report).
const VALID_TABS      = ['work','drawings','tendering','labour','purchasable','elevators'];
const VALID_WORK_SUBS = WORK_SUBS.map(s => s.key);
const VALID_STATUS    = ['done','delay','pending'];
const _ws  = sessionStorage.getItem('activeWorkSub');
if (_ws  && VALID_WORK_SUBS.includes(_ws))  activeWorkSub      = _ws;
const _wi  = sessionStorage.getItem('activeWorkItem');
if (_wi)                                     activeWorkItem     = _wi;
const _wl  = sessionStorage.getItem('activeWorkLocation');
if (_wl)                                     activeWorkLocation = _wl;
const _wst = sessionStorage.getItem('activeWorkStatus');
if (_wst && VALID_STATUS.includes(_wst))     activeWorkStatus   = _wst;
const _ds  = sessionStorage.getItem('activeDrawingsStatus');
if (_ds  && VALID_STATUS.includes(_ds))      activeDrawingsStatus  = _ds;
const _dl  = sessionStorage.getItem('activeDrawingsLocation');
if (_dl)                                     activeDrawingsLocation = _dl;
const _ls  = sessionStorage.getItem('activeLabourSub');
if (_ls)                                     activeLabourSub = _ls;
const savedTab = sessionStorage.getItem('activeTab');
showTab(VALID_TABS.includes(savedTab) ? savedTab : 'labour');
</script>
